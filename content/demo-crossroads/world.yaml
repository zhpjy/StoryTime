gameTitle: 时空故事
packId: demo_crossroads
version: 0.1.0
schemaVersion: 1.0.0
id: world_demo_crossroads
name: 雾灯驿站
summary: 两天内，送信人要在雾起前校准路口雾灯，决定旅人能否安全通过。
editorBackground: 雾灯驿站是一个用于测试内容包切换的极简故事包。故事范围限制在一处路口、一名守灯人、一盏雾灯和一次短对话内；所有事件都围绕雾灯信号是否清晰展开。它不承载复杂主线，只用于验证内容包 manifest、玩家身份、地图、行动、会话、事件和结局能够在客户端中完整串联。
playerIntroduction: 你抵达雾灯驿站时，薄雾已经漫过路边石标。守灯人说，今夜会有一队旅人经过，雾灯若不校准，他们很可能错过安全道路。
maxDays: 2
segments:
  - morning
  - noon
  - night
actionPointsPerSegment: 2
