- id: conversation_a_yuan_daily_23
  npcId: npc_a_yuan
  title: 童言无忌
  entryNodeId: node_entry
  priority: 38
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 一个孩子问了句大人不敢问的话，四下顿时无声。阿圆说：“沉默片刻，说孩子常常比大人诚实。”
      replies:
        - id: reply_as_merchant
          text: 孩子问的是米还是路？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 孩子问的是谁会护住他们？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 孩子问的是病会否死？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 问的是明天还有没有饭。这个问题比任何账都难。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_23_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 问的是守门的人会不会也跑。你看，孩子知说害怕什么。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_23_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 问的是会不会传给娘亲。你若听见了，就别用空话糊弄。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_23_completed
              value: true
  conditions:
