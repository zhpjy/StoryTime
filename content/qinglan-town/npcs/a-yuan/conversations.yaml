              key: conversation_a_yuan_daily_41_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 看风向。烟往哪边去，人多半也往哪边藏。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_41_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 先让咳得厉害的人避开。查案也要给活人让路。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_41_completed
              value: true
