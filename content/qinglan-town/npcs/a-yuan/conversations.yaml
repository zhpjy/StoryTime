          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_40_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 长上以后还会留疤。留疤不丢人，怕的是反复撕开。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_40_completed
              value: true
