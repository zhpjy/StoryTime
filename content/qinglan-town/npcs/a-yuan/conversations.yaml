# YAML 兼容 JSON 格式，可直接由制作工具解析
- id: conversation_a_yuan_market_rumors
  npcId: npc_a_yuan
  title: 市声碎线
  entryNodeId: node_entry
  conditions:
    all:
      - fact: facts.market_rumor_heard
        not_equals: true
  priority: 99
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 集市上讨价声一阵高过一阵，阿圆把摊布边角压住，低声说，今日的闲话不只关粮价，也关山路和人心。
      replies:
        - id: reply_ask_food_price
          text: 先说粮价，谁在借乱抬价？
          nextNodeId: node_food_price
        - id: reply_ask_trade_route
          text: 先说商路，最近哪条传闻最不寻常？
          nextNodeId: node_trade_route
        - id: reply_ask_panic
          text: 先说镇民恐慌，哪里最容易起冲突？
          nextNodeId: node_panic
    - id: node_food_price
      speaker: npc_a_yuan
      text: 她说米铺门前的人越来越急，有人买不起，有人却越买越多。买卖若只剩怕，价钱就会自己长腿。
      replies:
        - id: reply_market_rumors_close_food
          text: 我记下，粮价背后也有线索。
          nextNodeId: node_close
    - id: node_trade_route
      speaker: npc_a_yuan
      text: 她说赶车人不敢明说黑岭，只说绕路的人回来少，带旧箱的人更少。话传到集市，就只剩涨价的理由。
      replies:
        - id: reply_market_rumors_close_route
          text: 我记下，商路风声不能只当闲话。
          nextNodeId: node_close
    - id: node_panic
      speaker: npc_a_yuan
      text: 她看向米铺和镇门方向，说人最怕没饭，也怕病人挤到门前。只要有人喊一声，集市就可能先乱。
      replies:
        - id: reply_market_rumors_close_panic
          text: 我记下，先稳人心再查真相。
          nextNodeId: node_close
    - id: node_close
      speaker: npc_a_yuan
      text: 阿圆把话头收回针线里，不再多说。集市仍旧喧闹，可你已经听出几处不该重合的风声。
      replies:
        - id: reply_confirm_market_rumors
          text: 这些话够用了。
          effects:
            - type: add_fact
              key: market_rumor_heard
              value: true
            - type: change_variable
              key: truth_progress
              delta: 1
            - type: change_relationship
              source: player
              target: npc_zhao_sanniang
              path: trust
              delta: 1
          endConversation: true
- id: conversation_a_yuan_daily_01
  npcId: npc_a_yuan
  title: 晨市轻响
  entryNodeId: node_entry
  priority: 60
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 阿圆把针线包按得整齐，钱匣里一声轻响。阿圆说：“一边把针线包按颜色排好，一边示意你有话便快些讲。”
      replies:
        - id: reply_as_merchant
          text: 先问今日的买卖和路上动静。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 先问这里最需要防的是什么。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 先问可有人身体不适。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 买卖看着是买卖，背后全是人心。今日最该留意的，是每一文钱都变得更难挣。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_01_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 要防的不只刀，还有慌。集市起哄时小摊被掀翻一旦成真，谁都别想安稳。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_01_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 有不适的人不少，只是许多人怕花钱，先忍着。你若肯看，先从讨价还价的买主看起。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_01_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 1
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_a_yuan_daily_01_completed
        not_equals: true
- id: conversation_a_yuan_daily_02
  npcId: npc_a_yuan
  title: 暑气成患
  entryNodeId: node_entry
  priority: 59
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 摊布被热气烘得发软，阿圆抬手遮了遮日头。阿圆说：“这种天气最容易把小患拖成大祸。”
      replies:
        - id: reply_as_merchant
          text: 潮气会否影响货物和储备？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 坏天气会让巡守和防备更难吗？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 受潮后最该防哪类病症？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 会。货坏了还能赔，针线、火折和跑腿消息坏了，赔的就是人命和信任。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_02_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 难。风雨一遮，脚印、火光和人声都会骗人。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_02_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 先防寒热和咳症。别让讨价还价的买主在风口等太久。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_02_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 1
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_a_yuan_daily_02_completed
        not_equals: true
- id: conversation_a_yuan_daily_03
  npcId: npc_a_yuan
  title: 半块糖糕
  entryNodeId: node_entry
  priority: 58
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 半块糖糕凉在一旁，甜气淡得像快散的梦。阿圆说：“看了一眼饭食，说如今吃饭也像在做选择。”
      replies:
        - id: reply_as_merchant
          text: 粮价这样下去，小户人家还能撑几天？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 饿急的人会先冲哪里？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 吃不饱会让病势更糟。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 撑几天要看米价，也看谁愿意先分一点出来。给母亲抓药的花费比官样告示更管用。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_03_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 先冲看得见粮食的地方，再冲他们觉得没人护的地方。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_03_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 对。药能压病，饭才托命。没有午后才舍得买的半块糖糕，药下去也虚。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_03_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 1
          - fact: time.segment
            equals: night
      - fact: facts.conversation_a_yuan_daily_03_completed
        not_equals: true
- id: conversation_a_yuan_daily_04
  npcId: npc_a_yuan
  title: 闲话如飞
  entryNodeId: node_entry
  priority: 57
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 几个买主压低声音，见你近前又各自散开。阿圆说：“镇上闲话跑得比马还快。”
      replies:
        - id: reply_as_merchant
          text: 闲话里可有能当线头的真货？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 闲话会否引出冲突？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 闲话会让病人不敢就医。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 真货常藏在夸张里。你别听他们怎么骂，听他们反复提到什么。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_04_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 会。人一怕，就要找个能看见的人出气。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_04_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 已经有了。有人把病说成报应，这比发热还难治。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_04_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 2
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_a_yuan_daily_04_completed
        not_equals: true
- id: conversation_a_yuan_daily_05
  npcId: npc_a_yuan
  title: 账薄人情
  entryNodeId: node_entry
  priority: 56
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 卷边的账页压在手边，药钱一笔一笔扎眼。阿圆说：“账本记得清，人情却总算不明白。”
      replies:
        - id: reply_as_merchant
          text: 账清才不会乱，你最怕哪笔账爆出来？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 人情账若逼到头，会否变成仇？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 欠账的人会否因此拖着不求助？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 最怕不是欠得多，是欠得久。旧账一翻，谁都说自己有理。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_05_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 会。人情变仇，只差一句“你当年也欠我”。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_05_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 会。有人宁可忍病，也不愿再添一笔欠情。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_05_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 2
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_a_yuan_daily_05_completed
        not_equals: true
- id: conversation_a_yuan_daily_06
  npcId: npc_a_yuan
  title: 山路风声
  entryNodeId: node_entry
  priority: 55
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 后巷那头有人提到山路，话音立刻低了。阿圆说：“山路从来不只运货，也运消息。”
      replies:
        - id: reply_as_merchant
          text: 哪类消息最影响货队？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 山路上现在最像陷阱的是哪里？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 山路会否带来新的病根？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 影响最大的不是匪，是不知说谁和匪有来往。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_06_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 最像陷阱的是人人都说安全的那段。太安静了。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_06_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 会。水、草药、货布，都可能把病带进镇。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_06_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 2
          - fact: time.segment
            equals: night
      - fact: facts.conversation_a_yuan_daily_06_completed
        not_equals: true
- id: conversation_a_yuan_daily_07
  npcId: npc_a_yuan
  title: 旧庙疑云
  entryNodeId: node_entry
  priority: 54
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 说到旧庙，阿圆穿针的手顿了一下。阿圆说：“的手慢了一拍。 阿圆说旧庙的事，镇里不是没人知说，是没人愿意说全。”
      replies:
        - id: reply_as_merchant
          text: 旧庙牵着哪条旧账？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 谁会为了旧庙动刀？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 旧庙和病、药可有牵连？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 牵着命账，也牵着名声账。两种账都比银钱难讨。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_07_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 拔刀的人未必最恨，最怕的人才会先动手。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_07_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 有牵连。至少给母亲续命的药汤和小时候集市还热闹安稳的时候都绕不开它。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_07_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 3
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_a_yuan_daily_07_completed
        not_equals: true
- id: conversation_a_yuan_daily_08
  npcId: npc_a_yuan
  title: 告示纸冷
  entryNodeId: node_entry
  priority: 53
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 新贴的告示被人念到一半，街面反倒更静。阿圆说：“告示写得齐整，日子却不照字走。”
      replies:
        - id: reply_as_merchant
          text: 告示会影响交易和价格吗？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 告示能让人守规矩吗？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 告示可有安排病人和弱者？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 会影响一阵。可若针线、火折和跑腿消息跟不上，纸上的价就只是纸。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_08_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 能让想守规矩的人有个台阶，拦不住已经急红眼的人。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_08_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 写了几句，远远不够。真正照顾人的，是谁肯把门打开。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_08_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 3
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_a_yuan_daily_08_completed
        not_equals: true
- id: conversation_a_yuan_daily_09
  npcId: npc_a_yuan
  title: 夜巷微声
  entryNodeId: node_entry
  priority: 52
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 钱匣之外，夜里还有几声说不清的响动。阿圆说：“最近没人睡得太沉。”
      replies:
        - id: reply_as_merchant
          text: 夜里可有异常车马或陌生人？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 夜里哪个方向最该有人守？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 夜里病人会否无人照应？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 有。不是每辆车都会报号，也不是每个脚印都往门里走。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_09_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 守集市通往旧酒肆的后巷，也守人心最松的后门。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_09_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 会。夜里一句“明早再说”，有时就等不到明早。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_09_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 3
          - fact: time.segment
            equals: night
      - fact: facts.conversation_a_yuan_daily_09_completed
        not_equals: true
- id: conversation_a_yuan_daily_10
  npcId: npc_a_yuan
  title: 老幼先行
  entryNodeId: node_entry
  priority: 51
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 老人扶着墙走，孩子牵着衣角，队伍慢得让人心酸。阿圆说：“看着他们，说镇子的好坏先落在这些人身上。”
      replies:
        - id: reply_as_merchant
          text: 物资要先给谁才不乱？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 护送时先护哪一类人？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 老人孩子要分开照看。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 先给不能等的人，再给能维持秩序的人。别让分配看起来像偏心。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_10_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 先护走不快的。能跑的人还有路，走不动的人只有别人。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_10_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 对。小孩病急，老人病沉，混在一起只会互相拖。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_10_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 4
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_a_yuan_daily_10_completed
        not_equals: true
- id: conversation_a_yuan_daily_11
  npcId: npc_a_yuan
  title: 旧名如刺
  entryNodeId: node_entry
  priority: 50
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 阿圆提起一个旧名字，又像被针尖扎到似的收住。阿圆说：“提到一个旧名字，又很快把话收住。 那名字像一根刺，没人愿意碰得太深。”
      replies:
        - id: reply_as_merchant
          text: 名字若能对上旧账，就不该含糊。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 名字若指向活人，我得知说凶险。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 旧名字也可能是病根线头。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 你要对账，就别只问名字，还要问他最后被谁看见。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_11_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 凶险在问出口后。许多人怕的不是名字，是有人还记得。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_11_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 有时一个名字比一味药难找，但找到后，方子才完整。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_11_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 4
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_a_yuan_daily_11_completed
        not_equals: true
- id: conversation_a_yuan_daily_12
  npcId: npc_a_yuan
  title: 一桶清水
  entryNodeId: node_entry
  priority: 49
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 水桶晃过墙根，清光一闪，来路却不一定清。阿圆说：“水看着清，不代表来路清。”
      replies:
        - id: reply_as_merchant
          text: 水源若出问题，铺面和货队都会停。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 谁能靠近水源而不被盘问？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 水源须得查，病常从这里起。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 一停就不是一家铺子的事。你若查水，先查谁最近改了取水点。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_12_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 挑水人、送货人、巡夜人，都能靠近。最不起眼的最难查。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_12_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 你说到要处了。病若沿水走，药铺再忙也只是追着尾巴跑。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_12_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 4
          - fact: time.segment
            equals: night
      - fact: facts.conversation_a_yuan_daily_12_completed
        not_equals: true
- id: conversation_a_yuan_daily_13
  npcId: npc_a_yuan
  title: 灯油将尽
  entryNodeId: node_entry
  priority: 48
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 灯油见底，火苗缩成豆大，影子便长了。阿圆说：“灯一暗，人就容易做错事。”
      replies:
        - id: reply_as_merchant
          text: 能调灯油，但要知说最缺哪里。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 黑处最适合藏刀。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 病人夜里也需要灯。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 最缺的不是灯油，是愿意把灯点在别人门口的人。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_13_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 藏刀也藏眼泪。夜里生变，天亮后人人都说没看见。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_13_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 是。没灯，连药量都容易看错，更别说分辨脸色。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_13_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 5
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_a_yuan_daily_13_completed
        not_equals: true
- id: conversation_a_yuan_daily_14
  npcId: npc_a_yuan
  title: 顺手小差
  entryNodeId: node_entry
  priority: 47
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 阿圆替火折裹好油纸，顺手把零碎物件摆正。阿圆说：“顺路把旁边的东西摆正。 阿圆问你愿不愿意帮一个不显眼的小忙。”
      replies:
        - id: reply_as_merchant
          text: 小忙也要讲清要送到谁手里。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 小忙若有风险，我先走前面。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 小忙若关系病人，我现在就去。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 送给米铺门前排队的大娘，别让太多人看见。不是见不得光，是怕被传歪。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_14_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 不用拔刀，帮我看住后路就行。有时候不让人挤上来，比冲出去更难。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_14_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 关系不大，却能省一条腿脚。病人那边，少等一刻都是好事。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_14_completed
              value: true
