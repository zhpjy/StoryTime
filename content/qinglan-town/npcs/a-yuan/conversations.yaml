            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 明天要先防哪里？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 明天要先看谁？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 先保集市通往旧酒肆的后巷，再保针线、火折和跑腿消息。这两样一断，别的全是空话。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_47_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 先防看似安静的地方。乱处人人盯着，静处才容易漏。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_47_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 先看撑了一夜的人。能撑一夜，不代表还能撑一天。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_47_completed
              value: true
  conditions:
    all:
