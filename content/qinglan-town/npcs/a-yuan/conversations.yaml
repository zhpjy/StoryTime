              key: conversation_a_yuan_daily_28_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 对。许多药不是没有方子，是没人有热水慢慢服。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
