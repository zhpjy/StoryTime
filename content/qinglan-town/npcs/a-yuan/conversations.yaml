          - fact: time.day
            greater_than_or_equal: 8
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_a_yuan_daily_23_completed
        not_equals: true
- id: conversation_a_yuan_daily_24
  npcId: npc_a_yuan
  title: 墙根新泥
  entryNodeId: node_entry
  priority: 37
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 墙根新补的泥还潮着，像伤口没结痂。阿圆说：“墙会破，规矩也会破。”
      replies:
        - id: reply_as_merchant
          text: 破口若能走私货，就会有人利用。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 破墙也是防线缺口。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 破墙透风，病人受不了。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 利用的人一定有，不一定是大奸大恶，也可能只是饿急了。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_24_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 缺口要补，也要看谁常在附近徘徊。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_24_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 先挡风，再问责。人病着的时候，风比说理快。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_24_completed
              value: true
