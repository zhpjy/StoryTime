    - id: node_merchant
      speaker: npc_a_yuan
      text: 标准说清，怨气少一半。剩下一半，靠人慢慢劝。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
