            equals: noon
      - fact: facts.conversation_a_yuan_daily_41_completed
        not_equals: true
- id: conversation_a_yuan_daily_42
  npcId: npc_a_yuan
  title: 作证代价
  entryNodeId: node_entry
  priority: 19
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 提到作证，空气像被人一把按住。阿圆说：“作证不是说一句话，是把往后日子押上去。”
