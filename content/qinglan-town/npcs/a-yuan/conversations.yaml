            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 锁住的若是药和病案，就要慎重。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 信任比锁贵。锁坏了能换，信任坏了难补。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
