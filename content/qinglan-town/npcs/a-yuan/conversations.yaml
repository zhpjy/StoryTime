            greater_than_or_equal: 13
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_a_yuan_daily_38_completed
        not_equals: true
- id: conversation_a_yuan_daily_39
  npcId: npc_a_yuan
  title: 怕字难认
  entryNodeId: node_entry
  priority: 22
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 她说话仍稳，手却在钱匣边停了停。阿圆说：“把话说得平稳，手却在一只竹编钱匣旁停住。 阿圆说镇里很多人怕，却不愿承认自己怕。”
      replies:
        - id: reply_as_merchant
          text: 害怕会推高价钱。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 害怕会让人先下手。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 害怕会让人藏病。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 价钱只是表面。真正涨的是彼此的防备。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_39_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 先下手的人常说自己是自保。你要看他保的到底是什么。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_39_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 藏病最祸端。藏到后来，不止害自己。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_39_completed
              value: true
