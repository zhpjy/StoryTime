            greater_than_or_equal: 13
          - fact: time.segment
            equals: night
      - fact: facts.conversation_a_yuan_daily_39_completed
        not_equals: true
- id: conversation_a_yuan_daily_40
  npcId: npc_a_yuan
  title: 补衣三色
  entryNodeId: node_entry
  priority: 21
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 袖口三色补线歪歪斜斜，日子也像这样缝着过。阿圆说：“日子破了，人就学会把不合适的布缝在一起。”
      replies:
