            greater_than_or_equal: 14
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_a_yuan_daily_40_completed
        not_equals: true
- id: conversation_a_yuan_daily_41
  npcId: npc_a_yuan
  title: 旧火新烟
  entryNodeId: node_entry
  priority: 20
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 湿柴烟味飘来，呛得人分不清旧火新火。阿圆说：“烟味最会骗人，像旧火又像新火。”
      replies:
