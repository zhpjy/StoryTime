          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_48_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 可靠不是不害怕，是害怕也不乱开门。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
