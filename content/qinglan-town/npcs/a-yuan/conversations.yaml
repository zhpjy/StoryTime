    - id: node_doctor
      speaker: npc_a_yuan
      text: 病情决定，这是底线。若让关系决定，药就变味了。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
