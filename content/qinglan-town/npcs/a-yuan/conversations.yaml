            greater_than_or_equal: 12
          - fact: time.segment
            equals: night
      - fact: facts.conversation_a_yuan_daily_36_completed
        not_equals: true
- id: conversation_a_yuan_daily_37
  npcId: npc_a_yuan
  title: 小争执
  entryNodeId: node_entry
  priority: 24
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
