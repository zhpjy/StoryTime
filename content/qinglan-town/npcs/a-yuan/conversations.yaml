              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 这话该让他们都听听。咳声不会等他们吵完。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
