              key: conversation_a_yuan_daily_28_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 是。别小看送水，夜里拎桶的人最容易被误伤。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
