- id: conversation_a_yuan_daily_15
  npcId: npc_a_yuan
  title: 街坊脸色
  entryNodeId: node_entry
  priority: 46
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 来往的人脸色各异，嘴上客气，眼里却藏着算盘。阿圆说：“最近看人脸，比听人话更准。”
      replies:
        - id: reply_as_merchant
          text: 看脸色能看出谁要囤货？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 看脸色能看出谁要闹事？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 看脸色能看出谁在硬撑。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 能。眼睛总往针线、火折和跑腿消息上飘的人，多半心里已经起了算盘。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_15_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 能。真正要闹的人常不喊，喊得最大声的反而等别人先动。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_15_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 能。硬撑的人最怕被叫住，你若温和些，他们才肯承认。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_15_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 5
          - fact: time.segment
            equals: night
      - fact: facts.conversation_a_yuan_daily_15_completed
        not_equals: true
- id: conversation_a_yuan_daily_16
  npcId: npc_a_yuan
  title: 一阵咳声
  entryNodeId: node_entry
  priority: 45
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 远处一阵咳，几个人不由自主退了半步。阿圆说：“皱了皱眉，说怕病也怕被病名吓坏。”
      replies:
        - id: reply_as_merchant
          text: 若恐慌传开，买卖会先崩。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 恐慌会让人不听号令。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 退开不是办法，要分症状。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 买卖崩了，粮药也会断。你若能说服人别乱传，等于保住半条路。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_16_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 对。怕到极处，人会把救他的人也当敌人。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_16_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 分得清，心就稳一半。你来说，他们比听我说更容易信。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_16_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 6
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_a_yuan_daily_16_completed
        not_equals: true
- id: conversation_a_yuan_daily_17
  npcId: npc_a_yuan
  title: 缺口旧匣
  entryNodeId: node_entry
  priority: 44
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 竹编钱匣缺了一角，旧得让人舍不得换。阿圆说：“镇上许多东西都是这样，破了还得用。”
      replies:
        - id: reply_as_merchant
          text: 旧器物能撑，旧规矩未必能撑。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 破口不补，迟早伤手。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 旧伤不看，也会反复疼。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 你们外来人看得快，本地人舍不得。舍不得有时是情分，有时是祸端。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_17_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 补也要看谁来补。手太重，器物没补好，先碎了。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_17_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 疼久了，人会把疼当成日常。镇子也是。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_17_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 6
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_a_yuan_daily_17_completed
        not_equals: true
- id: conversation_a_yuan_daily_18
  npcId: npc_a_yuan
  title: 谎言源头
  entryNodeId: node_entry
  priority: 43
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 一句传闻转了三遍，每回都添一截尾巴。阿圆说：“谎话不怕新，怕的是有人故意让它像真话。”
      replies:
        - id: reply_as_merchant
          text: 假消息会害车队，我要辨源头。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 撒谎的人往往躲在后面。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 假病因会害死人。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 源头常常不在说得最大声的人那里，而在第一个问“你听说了吗”的人那里。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_18_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 躲在后面，也会留下目的。看谎话想把人赶向哪里。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_18_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 是。病因一错，药越勤，错得越深。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_18_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 6
          - fact: time.segment
            equals: night
      - fact: facts.conversation_a_yuan_daily_18_completed
        not_equals: true
- id: conversation_a_yuan_daily_19
  npcId: npc_a_yuan
  title: 信字难立
  entryNodeId: node_entry
  priority: 42
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 阿圆环顾四周，像在掂量哪句话还能出口。阿圆说：“看了看周围，像是在衡量哪句话能放出来。 阿圆说现在不是没人说话，是没人敢担保谁可信。”
      replies:
        - id: reply_as_merchant
          text: 信任也要有抵押，谁的抵押最实？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 看行动，不看漂亮话。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 肯让人看病的人，至少还有求生心。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 抵押最实的是退路。没退路的人，说真话也可能变卦。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_19_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 行动要看连续几天，不看一时热血。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_19_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 求生心很真，可求生也会让人隐瞒。别全信，也别全疑。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_19_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 7
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_a_yuan_daily_19_completed
        not_equals: true
- id: conversation_a_yuan_daily_20
  npcId: npc_a_yuan
  title: 镇外来影
  entryNodeId: node_entry
  priority: 41
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 有人提到镇外，摊前的人声忽然矮了下去。阿圆说：“镇外不是远方，是随时会推门进来的事。”
      replies:
        - id: reply_as_merchant
          text: 外来的货和人，哪一个更可疑？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 外头的威胁已经进镇了吗？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 外来人可有被妥善安置？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 货不会自己说谎，人会。可货上留下的痕迹，比人嘴可靠。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_20_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 进来了。不是人人拿刀才叫威胁，有人带的是恐慌和口信。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_20_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 安置得不够。挤在一起，再小的病也会被放大。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_20_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 7
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_a_yuan_daily_20_completed
        not_equals: true
- id: conversation_a_yuan_daily_21
  npcId: npc_a_yuan
  title: 午后困意
  entryNodeId: node_entry
  priority: 40
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 日头偏西，阿圆的动作慢了半拍。阿圆说：“的动作慢了一点。 阿圆说人累的时候最容易答应不该答应的事。”
      replies:
        - id: reply_as_merchant
          text: 疲惫会让人卖掉底线。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 疲惫会让守卫露空。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 疲惫会让病情恶化。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 底线不是一下卖掉的，是一点点让出去的。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_21_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 露空时最怕有人正等着。你若能替人歇一刻，就能补一个缺口。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_21_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 你说得对。许多人不是病倒，是熬倒。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_21_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 7
          - fact: time.segment
            equals: night
      - fact: facts.conversation_a_yuan_daily_21_completed
        not_equals: true
- id: conversation_a_yuan_daily_22
  npcId: npc_a_yuan
  title: 未寄之信
  entryNodeId: node_entry
  priority: 39
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 折好的信压在钱匣旁，纸角被摸得起毛。阿圆说：“有些信写好了，却不知说还能不能送到。”
      replies:
        - id: reply_as_merchant
          text: 能带信，但要知说收信人在哪条路上。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 若送信有凶险，先说凶险来自谁。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 信若关系病人家属，别再拖。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 能带当然好。可路上若有人查，别把信和账本放在一起。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_22_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 凶险来自想知说别人说了什么的人。如今一句家常，也可能被当成证词。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_22_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 关系家属，也关系人心。人若不知说亲人死活，会先在心里病起来。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
