  npcId: npc_a_yuan
  title: 收摊暮色
  entryNodeId: node_entry
  priority: 16
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 天色压下来，摊影被拉得很长。阿圆说：“白天的话到了夜里，会换一副脸。”
