          - fact: time.day
            greater_than_or_equal: 16
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_a_yuan_daily_47_completed
        not_equals: true
- id: conversation_a_yuan_daily_48
  npcId: npc_a_yuan
  title: 钥匙轻响
  entryNodeId: node_entry
  priority: 13
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 钥匙轻轻一响，几双眼睛同时抬起。阿圆说：“现在每把钥匙都像能打开祸端。”
      replies:
