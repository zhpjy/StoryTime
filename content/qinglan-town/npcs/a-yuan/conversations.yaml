            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 作证的人也会怕，也会病。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 印证越多，单个人背的压力越小。这是正经办法。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
