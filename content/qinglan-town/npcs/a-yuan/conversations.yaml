      - all:
          - fact: time.day
            greater_than_or_equal: 16
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_a_yuan_daily_46_completed
        not_equals: true
- id: conversation_a_yuan_daily_47
  npcId: npc_a_yuan
  title: 留到明日
  entryNodeId: node_entry
  priority: 14
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 阿圆把没做完的事挪到一边，眉头没有松。阿圆说：“把没做完的事往旁边挪了挪。 阿圆说有些事只能留给明天，但明天未必肯等。”
      replies:
        - id: reply_as_merchant
          text: 明天要先保哪条线？
          conditions:
