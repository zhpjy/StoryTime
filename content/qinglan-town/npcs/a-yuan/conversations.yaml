              key: conversation_a_yuan_daily_42_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 护住不是站在他旁边亮刀，也包括让他家里有饭。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_42_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 是。吓坏的人说不清话，先让他能睡一觉。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
