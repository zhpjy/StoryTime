          text: 躲闪的人可能藏病，也可能藏事。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 痕迹在鞋底、袖口和他不肯看的地方。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_49_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 记脸，也记他看谁。眼神比脚步诚实。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_49_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 藏病和藏事都怕被叫住。你若叫，别让他觉得无路可退。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
