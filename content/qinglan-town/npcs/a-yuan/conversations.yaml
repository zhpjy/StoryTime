        not_equals: true
- id: conversation_a_yuan_daily_49
  npcId: npc_a_yuan
  title: 借道客
  entryNodeId: node_entry
  priority: 12
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 那人来得不是时候，停了停，又装作只是借道。阿圆说：“等那人走后，说路过的人有时最不路过。”
      replies:
