      - fact: facts.conversation_a_yuan_daily_29_completed
        not_equals: true
- id: conversation_a_yuan_daily_30
  npcId: npc_a_yuan
  title: 坏事先后
  entryNodeId: node_entry
  priority: 31
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 坏消息一件接一件进门，像没人肯排队。阿圆说：“最怕的不是坏消息，是大家不知说先处理哪个。”
      replies:
        - id: reply_as_merchant
          text: 先保路、粮、药三个节点。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 先保人，再保门，再保物。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 先救急症，再控传染，再安人心。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 你的顺序能听。路断则粮药断，粮药断则人心断。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_30_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 人保住，门和物才有意义。别反过来。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_30_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 这就是救治的顺序。镇子也像一个病人。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_30_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 10
          - fact: time.segment
            equals: night
      - fact: facts.conversation_a_yuan_daily_30_completed
        not_equals: true
- id: conversation_a_yuan_daily_31
  npcId: npc_a_yuan
  title: 避谈纸包
  entryNodeId: node_entry
  priority: 30
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 有人听见纸包二字就换话头，换得太快。阿圆说：“避得太急，本身就是线头。”
      replies:
        - id: reply_as_merchant
          text: 避谈的人可能怕旧账影响生意。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 避谈的人可能知说凶险在哪。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 避谈的人可能见过病根。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 生意、名声、亲人，都可能让人闭嘴。你要分清是哪一种。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_31_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 知说凶险的人未必坏，有时只是活得太久，怕了。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_31_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 见过病根的人最怕再闻到同样味说。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_31_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 11
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_a_yuan_daily_31_completed
        not_equals: true
- id: conversation_a_yuan_daily_32
  npcId: npc_a_yuan
  title: 帮忙章法
  entryNodeId: node_entry
  priority: 29
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 阿圆看着你，像看一把刀该入鞘还是出鞘。阿圆说：“看着你，像是在判断你这次会伸手还是伸脚绊人。 阿圆说帮忙二字，说起来容易，做歪了就是添乱。”
      replies:
        - id: reply_as_merchant
          text: 先问需要什么，再动资源。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 先听安排，再动手。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 先看症状，再开方。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 这样才像能做事的人。别把自己的好心摆在别人的急处前面。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_32_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 能听安排的懂得收手的人，比只会冲的强。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_32_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 看症状再开方，这说理若人人都懂，镇里少一半乱事。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_32_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 11
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_a_yuan_daily_32_completed
        not_equals: true
- id: conversation_a_yuan_daily_33
  npcId: npc_a_yuan
  title: 旧物留痕
  entryNodeId: node_entry
  priority: 28
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 旧钱匣被她拿起又放下，像有话压在竹篾里。阿圆说：“拿起又放下，像一段话没说出口。 阿圆说旧物留得久了，就会替人记事。”
      replies:
        - id: reply_as_merchant
          text: 旧物若能作凭证，就别让它丢了。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 旧物若会惹祸，就该有人护着。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 旧物上的痕迹有时能说明伤从何来。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 凭证也要看交给谁。交错了，凭证就是把柄。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_33_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 护东西不难，难的是护住拿着它的人。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_33_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 你看得细。火痕、药味、血渍，旧物都可能记得。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_33_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 11
          - fact: time.segment
            equals: night
      - fact: facts.conversation_a_yuan_daily_33_completed
        not_equals: true
- id: conversation_a_yuan_daily_34
  npcId: npc_a_yuan
  title: 静里藏声
  entryNodeId: node_entry
  priority: 27
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 街面忽然静了片刻，静得像暴雨前吸了一口气。阿圆说：“安静不一定是平安，也可能是大家都在等下一声响。”
      replies:
        - id: reply_as_merchant
          text: 安静时最适合安排后路。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 安静时最该查哨。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 安静时最该补睡和熬药。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 后路要在没人看见时安排好，真乱起来就晚了。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_34_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 查哨，也查谁突然不在原处。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_34_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 对，能休息时不休息，下一波来时就只剩硬撑。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_34_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 12
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_a_yuan_daily_34_completed
        not_equals: true
- id: conversation_a_yuan_daily_35
  npcId: npc_a_yuan
  title: 借物有账
  entryNodeId: node_entry
  priority: 26
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 有人来借针线和火折，话客气，手却攥得紧。阿圆说：“等那人走远，才看向你。”
      replies:
        - id: reply_as_merchant
          text: 借和抢之间，只差还不还。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 手攥太紧，多半已经急了。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 借东西若为救急，可以登记。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 你说得现实。现在每一次借出，都要想好明日怎么要回来。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_35_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 急未必坏，怕的是有人利用他的急。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_35_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 登记能让人觉得公平，也能让后来的人少吵两句。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_35_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 12
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_a_yuan_daily_35_completed
        not_equals: true
- id: conversation_a_yuan_daily_36
  npcId: npc_a_yuan
  title: 两道门
  entryNodeId: node_entry
  priority: 25
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 话题从镇门绕到祠堂，绕来绕去都是门。阿圆说：“一说门管活人进出，一说门管旧事出入。”
      replies:
        - id: reply_as_merchant
          text: 两说门都影响路。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 两说门都需要有人守。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 两说门都关系人心。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 路不只在地上，也在大家愿不愿意相信彼此。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_36_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 守门不只是挡人，也是不让怕事的人随手上锁。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_36_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 人心堵住，病也好得慢。看病的人最该懂。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
