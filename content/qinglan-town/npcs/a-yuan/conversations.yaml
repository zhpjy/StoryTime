          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 烟会让咳症更重。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 有人翻旧账，也有人想让你以为是旧账自己烧起来。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
