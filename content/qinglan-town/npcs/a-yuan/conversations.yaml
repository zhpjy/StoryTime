        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_48_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 慎重是对的。但锁太久，里头的东西也会坏。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
