        not_equals: true
- id: conversation_a_yuan_daily_38
  npcId: npc_a_yuan
  title: 远方留话
  entryNodeId: node_entry
  priority: 23
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 阿圆忽然问远方若能收信，你会留下什么话。阿圆说：“忽然问你，若能给远方的人留句话，你会写什么。 这个问题来得突兀，却不像玩笑。”
      replies:
        - id: reply_as_merchant
          text: 会写路况和价钱，也写人是否平安。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 会写别轻信太安静的路。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 会写水要烧开，病要早看。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 平安这两个字，比价钱更难写真。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_38_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 这句能救命。太安静的路，总有人先替你清过声音。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_38_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 朴素，却管用。许多人死在不肯早看。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_38_completed
              value: true
  conditions:
