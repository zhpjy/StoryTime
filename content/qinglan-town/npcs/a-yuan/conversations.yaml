          text: 夜里运货的人通常有不得已的理由。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 半夜脚步要查，但不可先惊动。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 夜里求药的人也会偷偷走。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 理由有真有假。看他们绕开什么，比看他们搬什么更有用。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_26_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 你说得对。先记路，再问人，别一嗓子把线头喊散了。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_26_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 求药的人怕欠账，也怕被人说染病。你若拦，记得先问急不急。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_26_completed
              value: true
