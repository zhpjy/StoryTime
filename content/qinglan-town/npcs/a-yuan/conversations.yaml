              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 靠说到做到。守门的人不乱拿，进门的人不乱闯。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
