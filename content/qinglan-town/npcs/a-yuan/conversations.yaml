          - fact: time.day
            greater_than_or_equal: 9
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_a_yuan_daily_26_completed
        not_equals: true
- id: conversation_a_yuan_daily_27
  npcId: npc_a_yuan
  title: 旧日集市
  entryNodeId: node_entry
