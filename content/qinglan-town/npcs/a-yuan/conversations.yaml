              key: conversation_a_yuan_daily_27_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 靠邻里。谁家熬药，隔壁会送水，不会先问报酬。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
