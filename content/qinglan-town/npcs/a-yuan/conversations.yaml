      speaker: npc_a_yuan
      text: 站中间的人最容易挨骂。可没人站，事就会往刀上走。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
