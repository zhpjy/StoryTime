          - fact: time.day
            greater_than_or_equal: 9
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_a_yuan_daily_25_completed
        not_equals: true
- id: conversation_a_yuan_daily_26
  npcId: npc_a_yuan
  title: 半夜脚步
  entryNodeId: node_entry
  priority: 35
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 昨夜脚步声还挂在人嘴边，说法却各不相同。阿圆说：“半夜走路的人，不一定是贼，也可能是怕白天被看见。”
      replies:
