    - id: node_warrior
      speaker: npc_a_yuan
      text: 说得好。有人用旧话劝人稳，有人用旧话劝人闭嘴。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
