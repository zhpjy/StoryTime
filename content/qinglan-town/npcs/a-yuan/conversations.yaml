          text: 夜里最容易出现私下交易。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 夜里最容易出事。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 夜里最怕急症。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 私下交易不可怕，可怕的是交易内容和镇子的命绑在一起。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_45_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 生变前总有预兆，只是白天没人愿意承认。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_45_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 急症要提前备。人心也是，别等彻底乱了才找药。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_45_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 15
          - fact: time.segment
            equals: night
      - fact: facts.conversation_a_yuan_daily_45_completed
        not_equals: true
- id: conversation_a_yuan_daily_46
  npcId: npc_a_yuan
  title: 笑声不合时
  entryNodeId: node_entry
  priority: 15
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 有人笑了一声，笑完自己也怔住。阿圆说：“人太紧时，笑也像哭。”
      replies:
        - id: reply_as_merchant
          text: 紧绷的人很容易做错买卖。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 紧绷的人也容易误伤。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 紧绷久了会垮。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 错买卖还能补，错把人当敌人就难补。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_46_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 所以动手前要多看一眼。那一眼能救命。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_46_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 垮之前常有征兆，手抖、睡不着、听不得响。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_46_completed
              value: true
  conditions:
