      - fact: facts.conversation_a_yuan_daily_24_completed
        not_equals: true
- id: conversation_a_yuan_daily_25
  npcId: npc_a_yuan
  title: 讨价如争命
  entryNodeId: node_entry
  priority: 36
  nodes:
    - id: node_entry
      speaker: npc_a_yuan
      text: 讨价声越抬越尖，几枚铜钱像要敲出火星。阿圆说：“讨价还价本是日常，如今却像吵命。”
      replies:
        - id: reply_as_merchant
          text: 价要稳，得先稳供给。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 吵到动手前会有什么征兆？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 买不起药和米的人会同时变多。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_a_yuan
      text: 供给是一头，信任是另一头。只补一头，价还会乱。 买卖场也是江湖，银钱、人情、退路，少算一样都要吃亏。她说到这里便收声，像把一根细线藏回袖中。
      replies:
        - id: reply_merchant_close
          text: 记下了，这笔人情与风险，都要算得清楚。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_25_completed
              value: true
    - id: node_warrior
      speaker: npc_a_yuan
      text: 征兆是没人再听完整句话，只听见自己吃亏。 刀在鞘里时，先稳人心；人心稳住，路才守得住。她眼神清亮，说完便不再多添一句。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_25_completed
              value: true
    - id: node_doctor
      speaker: npc_a_yuan
      text: 会。所以救病不能只靠药铺，也得靠米袋。 病有脉象，人心也有脉象；迟一步，药味就会变苦。她垂下眼，把话说得轻，却落得很重。
      replies:
        - id: reply_doctor_close
          text: 记下，先救急症，再查病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_a_yuan_daily_25_completed
              value: true
