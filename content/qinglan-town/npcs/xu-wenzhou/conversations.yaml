            greater_than_or_equal: 10
          - fact: time.segment
            equals: night
      - fact: facts.conversation_xu_wenzhou_daily_30_completed
        not_equals: true
- id: conversation_xu_wenzhou_daily_31
  npcId: npc_xu_wenzhou
  title: 半夜的脚步
  entryNodeId: node_entry
  priority: 30
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 昨夜的脚步声还被人挂在嘴边，道法却不一样。 许闻舟道半夜走路的人，不一定是贼，也可能是怕白天被看见。
      replies:
        - id: reply_as_merchant
          text: 夜里运货的人通常有不得已的理由。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 半夜脚步要查，但不能先惊动。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 夜里求药的人也会偷偷走。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xu_wenzhou
      text: 理由有真有假。看他们绕开什么，比看他们搬什么更有用。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_merchant_close
          text: 账我记下，情分和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_31_completed
              value: true
    - id: node_warrior
      speaker: npc_xu_wenzhou
      text: 你说得对。先记路，再问人，别一嗓子把线头喊散了。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_31_completed
              value: true
    - id: node_doctor
      speaker: npc_xu_wenzhou
      text: 求药的人怕欠账，也怕被人道染病。阁下若拦，记得先问急不急。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急，再寻病根。
          endConversation: true
          effects:
