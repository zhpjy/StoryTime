- id: conversation_xu_wenzhou_daily_50
  npcId: npc_xu_wenzhou
  title: 收摊前
  entryNodeId: node_entry
  priority: 11
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 天色往晚里沉，酒肆角桌的影子被拉长。 许闻舟道白天的话到了夜里，会换一副脸。
      replies:
        - id: reply_as_merchant
          text: 夜里最容易出现私下交易。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 夜里最容易出事。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 夜里最怕急症。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xu_wenzhou
      text: 私下交易并不可怕，可怕的是交易内容和镇子的命绑在一起。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_merchant_close
          text: 账我记下，情分和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_50_completed
              value: true
    - id: node_warrior
      speaker: npc_xu_wenzhou
      text: 生变前总有预兆，只是白天没人愿意承认。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_50_completed
              value: true
    - id: node_doctor
      speaker: npc_xu_wenzhou
      text: 急症要提前备。人心也是，别等彻底乱了才找药。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_50_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 17
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_xu_wenzhou_daily_50_completed
        not_equals: true
