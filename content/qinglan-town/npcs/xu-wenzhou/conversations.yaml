            greater_than_or_equal: 7
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_xu_wenzhou_daily_20_completed
        not_equals: true
- id: conversation_xu_wenzhou_daily_21
  npcId: npc_xu_wenzhou
  title: 一阵咳声
  entryNodeId: node_entry
  priority: 40
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 远处传来一阵咳声，几个人下意识退开半步。 许闻舟皱了皱眉，道怕病也怕被病名吓坏。
      replies:
        - id: reply_as_merchant
          text: 若恐慌传开，买卖会先崩。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 恐慌会让人不听号令。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 退开不是办法，要分症状。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xu_wenzhou
      text: 买卖崩了，粮药也会断。阁下若能道服人别乱传，等于保住半条路。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_merchant_close
          text: 账我记下，情分和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_21_completed
              value: true
    - id: node_warrior
      speaker: npc_xu_wenzhou
      text: 对。怕到极处，人会把救他的人也当敌人。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_21_completed
              value: true
    - id: node_doctor
      speaker: npc_xu_wenzhou
      text: 分得清，心就稳一半。阁下来道，他们比听我道更容易信。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_21_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 7
          - fact: time.segment
            equals: night
      - fact: facts.conversation_xu_wenzhou_daily_21_completed
        not_equals: true
- id: conversation_xu_wenzhou_daily_22
  npcId: npc_xu_wenzhou
  title: 缺口的器物
  entryNodeId: node_entry
  priority: 39
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 半封残信边缘有一道旧缺口，像用久了也舍不得换。 许闻舟道镇上许多东西都是这样，破了还得用。
      replies:
        - id: reply_as_merchant
          text: 旧器物能撑，旧规矩未必能撑。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 破口不补，迟早伤手。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 旧伤不看，也会反复疼。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xu_wenzhou
      text: 你们外来人看得快，本地人舍不得。舍不得有时是情分，有时是祸端。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_merchant_close
          text: 账我记下，情分和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_22_completed
              value: true
    - id: node_warrior
      speaker: npc_xu_wenzhou
      text: 补也要看谁来补。手太重，器物没补好，先碎了。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_22_completed
              value: true
    - id: node_doctor
      speaker: npc_xu_wenzhou
      text: 疼久了，人会把疼当成日常。镇子也是。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急，再寻病根。
