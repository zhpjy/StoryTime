            greater_than_or_equal: 11
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_xu_wenzhou_daily_31_completed
        not_equals: true
- id: conversation_xu_wenzhou_daily_32
  npcId: npc_xu_wenzhou
  title: 旧日好时光
  entryNodeId: node_entry
  priority: 29
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 父亲留下信时的笔迹被提起时，许闻舟的神色软了一点。 许闻舟道从前也不是没有难处，只是大家还肯慢慢道。
      replies:
        - id: reply_as_merchant
          text: 从前商路最安稳的时候靠什么？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 从前巡守和镇民怎么互相信？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 从前病人如何互相照应？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xu_wenzhou
      text: 靠熟人，也靠不把每一文钱都逼到尽头。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_merchant_close
          text: 账我记下，情分和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_32_completed
              value: true
    - id: node_warrior
      speaker: npc_xu_wenzhou
      text: 靠说到做到。守门的人不乱拿，进门的人不乱闯。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_32_completed
              value: true
    - id: node_doctor
      speaker: npc_xu_wenzhou
      text: 靠邻里。谁家熬药，隔壁会送水，不会先问报酬。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急，再寻病根。
          endConversation: true
          effects:
