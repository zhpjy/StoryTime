            greater_than_or_equal: 8
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_xu_wenzhou_daily_22_completed
        not_equals: true
- id: conversation_xu_wenzhou_daily_23
  npcId: npc_xu_wenzhou
  title: 谁在撒谎
  entryNodeId: node_entry
  priority: 38
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 一句传闻被重复了三遍，每次都多一个细节。 许闻舟道谎话不怕新，怕的是有人故意让它像真话。
      replies:
