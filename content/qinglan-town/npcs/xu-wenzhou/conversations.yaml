          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 假病因会害死人。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xu_wenzhou
      text: 源头常常不在说得最大声的人那里，而在第一个问“你听说了吗”的人那里。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_merchant_close
          text: 账我记下，情分和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_23_completed
              value: true
    - id: node_warrior
      speaker: npc_xu_wenzhou
      text: 躲在后面，也会留下目的。看谎话想把人赶向哪里。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_23_completed
              value: true
    - id: node_doctor
      speaker: npc_xu_wenzhou
      text: 是。病因一错，药越勤，错得越深。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_23_completed
              value: true
  conditions:
