  npcId: npc_xu_wenzhou
  title: 给远方的人留话
  entryNodeId: node_entry
  priority: 18
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 许闻舟忽然问你，若能给远方的人留句话，你会写什么。 这个问题来得突兀，却不像玩笑。
