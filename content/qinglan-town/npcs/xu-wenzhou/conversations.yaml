          - fact: time.day
            greater_than_or_equal: 10
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_xu_wenzhou_daily_28_completed
        not_equals: true
- id: conversation_xu_wenzhou_daily_29
  npcId: npc_xu_wenzhou
  title: 一处破墙
  entryNodeId: node_entry
  priority: 32
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 不远处的墙根有一块新补的泥，颜色还没干透。 许闻舟道墙会破，规矩也会破。
      replies:
        - id: reply_as_merchant
          text: 破口若能走私货，就会有人利用。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 破墙也是防线缺口。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 破墙透风，病人受不了。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xu_wenzhou
      text: 利用的人一定有，不一定是大奸大恶，也可能只是饿急了。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_merchant_close
          text: 账我记下，情分和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_29_completed
              value: true
    - id: node_warrior
      speaker: npc_xu_wenzhou
      text: 缺口要补，也要看谁常在附近徘徊。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_29_completed
              value: true
    - id: node_doctor
      speaker: npc_xu_wenzhou
      text: 先挡风，再问责。人病着的时候，风比道理快。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_29_completed
              value: true
  conditions:
