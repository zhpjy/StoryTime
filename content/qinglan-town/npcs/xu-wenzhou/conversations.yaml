- id: conversation_xu_wenzhou_daily_17
  npcId: npc_xu_wenzhou
  title: 换水的时辰
  entryNodeId: node_entry
  priority: 44
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 有人拎着水桶经过，桶沿晃出一圈水光。 许闻舟道水看着清，不代表来路清。
      replies:
        - id: reply_as_merchant
          text: 水源若出问题，铺面和货队都会停。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 谁能靠近水源而不被盘问？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 水源须得查，病常从这里起。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xu_wenzhou
      text: 一停就不是一家铺子的事。阁下若查水，先查谁最近改了取水点。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_merchant_close
          text: 账我记下，情分和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_17_completed
              value: true
    - id: node_warrior
      speaker: npc_xu_wenzhou
      text: 挑水人、送货人、巡夜人，都能靠近。最不起眼的最难查。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_17_completed
              value: true
    - id: node_doctor
      speaker: npc_xu_wenzhou
      text: 你说到要处了。病若沿水走，药铺再忙也只是追着尾巴跑。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_17_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 6
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_xu_wenzhou_daily_17_completed
        not_equals: true
- id: conversation_xu_wenzhou_daily_18
  npcId: npc_xu_wenzhou
  title: 火把和灯油
  entryNodeId: node_entry
  priority: 43
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 一盏灯的油快见底，火苗缩成豆大一点。 许闻舟道灯一暗，人就容易做错事。
      replies:
        - id: reply_as_merchant
          text: 灯油可以调来，但得先知道哪处最缺。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 黑处最适合藏刀。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 病人夜里也需要灯。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xu_wenzhou
      text: 最缺的不是灯油，是愿意把灯点在别人门口的人。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_merchant_close
          text: 账我记下，情分和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_18_completed
              value: true
    - id: node_warrior
      speaker: npc_xu_wenzhou
      text: 藏刀也藏眼泪。夜里生变，天亮后人人都道没看见。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_18_completed
              value: true
    - id: node_doctor
      speaker: npc_xu_wenzhou
      text: 是。没灯，连药量都容易看错，更别道分辨脸色。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_18_completed
              value: true
