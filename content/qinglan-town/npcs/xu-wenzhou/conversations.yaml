            greater_than_or_equal: 10
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_xu_wenzhou_daily_29_completed
        not_equals: true
- id: conversation_xu_wenzhou_daily_30
  npcId: npc_xu_wenzhou
  title: 讨价还价
  entryNodeId: node_entry
  priority: 31
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 街坊对外来书生的猜疑的话头又被人翻出来，声音越来越尖。 许闻舟道讨价还价本是日常，如今却像吵命。
      replies:
