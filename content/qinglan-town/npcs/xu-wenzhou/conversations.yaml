            greater_than_or_equal: 11
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_xu_wenzhou_daily_32_completed
        not_equals: true
- id: conversation_xu_wenzhou_daily_33
  npcId: npc_xu_wenzhou
  title: 一口热水
  entryNodeId: node_entry
  priority: 28
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 热水被倒进粗碗里，碗沿冒着白气。 许闻舟道热水不值钱，可乱起来时，连热水都难得。
      replies:
