      - all:
          - fact: time.day
            greater_than_or_equal: 9
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_xu_wenzhou_daily_25_completed
        not_equals: true
- id: conversation_xu_wenzhou_daily_26
  npcId: npc_xu_wenzhou
  title: 午后的疲惫
  entryNodeId: node_entry
  priority: 35
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 日头偏过去，许闻舟的动作慢了一点。 许闻舟道人累的时候最容易答应不该答应的事。
      replies:
        - id: reply_as_merchant
          text: 疲惫会让人卖掉底线。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 疲惫会让守卫露空。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 疲惫会让病情恶化。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xu_wenzhou
      text: 底线不是一下卖掉的，是一点点让出去的。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_merchant_close
          text: 账我记下，情分和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_26_completed
              value: true
    - id: node_warrior
      speaker: npc_xu_wenzhou
      text: 露空时最怕有人正等着。阁下若能替人歇一刻，就能补一个缺口。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_26_completed
              value: true
    - id: node_doctor
      speaker: npc_xu_wenzhou
      text: 你说得对。许多人不是病倒，是熬倒。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_26_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 9
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_xu_wenzhou_daily_26_completed
        not_equals: true
- id: conversation_xu_wenzhou_daily_27
  npcId: npc_xu_wenzhou
  title: 一封没送出的信
  entryNodeId: node_entry
  priority: 34
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 半封残信旁压着一张折好的纸，纸角已经起毛。 许闻舟道有些信写好了，却不知道还能不能送到。
      replies:
        - id: reply_as_merchant
          text: 信可以带，但收信人在哪条路上，得先说清。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 若送信有凶险，先说凶险来自谁。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 信若关系病人家属，别再拖。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xu_wenzhou
      text: 能带当然好。可路上若有人查，别把信和账本放在一起。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_merchant_close
          text: 账我记下，情分和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_27_completed
              value: true
    - id: node_warrior
      speaker: npc_xu_wenzhou
      text: 凶险来自想知道别人说了什么的人。如今一句家常，也可能被当成证词。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_27_completed
              value: true
    - id: node_doctor
      speaker: npc_xu_wenzhou
      text: 关系家属，也关系人心。人若不知道亲人死活，会先在心里病起来。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_27_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 9
          - fact: time.segment
            equals: night
      - fact: facts.conversation_xu_wenzhou_daily_27_completed
        not_equals: true
- id: conversation_xu_wenzhou_daily_28
  npcId: npc_xu_wenzhou
  title: 孩子问的问题
  entryNodeId: node_entry
  priority: 33
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 有个孩子在旁边问了一句大人都不敢问的话。 许闻舟沉默片刻，道孩子常常比大人诚实。
      replies:
        - id: reply_as_merchant
          text: 孩子问的是米还是路？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 孩子问的是谁会护住他们？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 孩子问的是病会不会死？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xu_wenzhou
      text: 问的是明天还有没有饭。这个问题比任何账都难。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_merchant_close
          text: 账我记下，情分和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_28_completed
              value: true
    - id: node_warrior
      speaker: npc_xu_wenzhou
      text: 问的是守门的人会不会也跑。你看，孩子知道害怕什么。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_28_completed
              value: true
    - id: node_doctor
      speaker: npc_xu_wenzhou
      text: 问的是会不会传给娘亲。阁下若听见了，就别用空话糊弄。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_28_completed
              value: true
  conditions:
