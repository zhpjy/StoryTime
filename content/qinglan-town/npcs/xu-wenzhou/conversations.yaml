          - fact: time.day
            greater_than_or_equal: 7
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_xu_wenzhou_daily_19_completed
        not_equals: true
- id: conversation_xu_wenzhou_daily_20
  npcId: npc_xu_wenzhou
  title: 街坊的脸色
  entryNodeId: node_entry
  priority: 41
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 肯吐半句旧事的老人从旁边经过，脸色各不相同。 许闻舟道最近看人脸，比听人话更准。
      replies:
        - id: reply_as_merchant
          text: 看脸色能看出谁要囤货？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 看脸色能看出谁要闹事？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 看脸色能看出谁在硬撑。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xu_wenzhou
      text: 能。眼睛总往手稿、残信和可作证的人上飘的人，多半心里已经起了算盘。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_merchant_close
          text: 账我记下，情分和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_20_completed
              value: true
    - id: node_warrior
      speaker: npc_xu_wenzhou
      text: 能。真正要闹的人常不喊，喊得最大声的反而等别人先动。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_20_completed
              value: true
    - id: node_doctor
      speaker: npc_xu_wenzhou
      text: 能。硬撑的人最怕被叫住，阁下若温和些，他们才肯承认。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急，再寻病根。
          endConversation: true
          effects:
