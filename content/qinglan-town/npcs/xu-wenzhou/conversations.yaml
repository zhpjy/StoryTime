  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 有人提到镇外，周围立刻静了一瞬。 许闻舟道镇外不是远方，是随时会推门进来的事。
      replies:
        - id: reply_as_merchant
          text: 外来的货和人，哪一个更可疑？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 外头的威胁已经进镇了吗？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 外来人可有被妥善安置？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xu_wenzhou
      text: 货不会自己道谎，人会。可货上留下的痕迹，比人嘴可靠。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_merchant_close
          text: 账我记下，情分和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_25_completed
              value: true
    - id: node_warrior
      speaker: npc_xu_wenzhou
      text: 进来了。不是人人拿刀才叫威胁，有人带的是恐慌和口信。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_25_completed
              value: true
    - id: node_doctor
      speaker: npc_xu_wenzhou
      text: 安置得不够。挤在一起，再小的病也会被放大。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_25_completed
              value: true
  conditions:
