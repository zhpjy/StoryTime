            greater_than_or_equal: 6
          - fact: time.segment
            equals: night
      - fact: facts.conversation_xu_wenzhou_daily_18_completed
        not_equals: true
- id: conversation_xu_wenzhou_daily_19
  npcId: npc_xu_wenzhou
  title: 一件小差事
  entryNodeId: node_entry
  priority: 42
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 蘸墨补一处小字的空当，许闻舟顺路把旁边的东西摆正。 许闻舟问你愿不愿意帮一个不显眼的小忙。
      replies:
        - id: reply_as_merchant
          text: 小忙也要讲清要送到谁手里。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 小忙若有风险，我先走前面。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 小忙若关系病人，我现在就去。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xu_wenzhou
      text: 送给酒肆里装睡的客人，别让太多人看见。不是见不得光，是怕被传歪。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_merchant_close
          text: 账我记下，情分和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_19_completed
              value: true
    - id: node_warrior
      speaker: npc_xu_wenzhou
      text: 不用拔刀，帮我看住后路就行。有时候不让人挤上来，比冲出去更难。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_19_completed
              value: true
    - id: node_doctor
      speaker: npc_xu_wenzhou
      text: 关系不大，却能省一条腿脚。病人那边，少等一刻都是好事。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_19_completed
              value: true
  conditions:
    all:
