            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 在下看行动，不看漂亮话。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 肯让人看病的人，至少还有求生心。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xu_wenzhou
      text: 抵押最实的是退路。没退路的人，道真话也可能变卦。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_merchant_close
          text: 账我记下，情分和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_24_completed
              value: true
    - id: node_warrior
      speaker: npc_xu_wenzhou
      text: 行动要看连续几天，不看一时热血。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_24_completed
              value: true
    - id: node_doctor
      speaker: npc_xu_wenzhou
      text: 求生心很真，可求生也会让人隐瞒。别全信，也别全疑。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急，再寻病根。
          endConversation: true
          effects:
