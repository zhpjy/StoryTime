          - fact: time.day
            greater_than_or_equal: 8
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_xu_wenzhou_daily_23_completed
        not_equals: true
- id: conversation_xu_wenzhou_daily_24
  npcId: npc_xu_wenzhou
  title: 能信谁
  entryNodeId: node_entry
  priority: 37
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 许闻舟看了看周围，像是在衡量哪句话能放出来。 许闻舟道现在不是没人说话，是没人敢担保谁可信。
      replies:
