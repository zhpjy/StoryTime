# YAML 兼容 JSON 格式，可直接由制作工具解析
- id: conversation_xu_first_meet
  npcId: npc_xu_wenzhou
  title: 角桌上的手稿
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 1
      - fact: facts.conversation_xu_first_meet_completed
        not_equals: true
  priority: 100
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 许闻舟把手稿压在茶碗下，笑意微涩。 他压低声音道自己不过借道而来，顺路查些旧年掌故。
      replies:
        - id: reply_as_merchant
          text: 路过的人不会把手稿编号到这种程度。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 阁下若惹上旧案，至少该说清谁在追阁下。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 阁下脸色不好，多久没睡了？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xu_wenzhou
      text: 行商看账看得准。我的确不是顺路，只是不愿叫前堂那些耳朵听去。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_merchant_close
          text: 账我记下，情分和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_first_meet_completed
              value: true
    - id: node_warrior
      speaker: npc_xu_wenzhou
      text: 追我的人未必露面。越是笑着请阁下喝茶的人，越可能把消息递出去。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_first_meet_completed
              value: true
    - id: node_doctor
      speaker: npc_xu_wenzhou
      text: 两夜。别劝我睡，我一闭眼就想起这半封信少掉的那半页。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_first_meet_completed
              value: true
- id: conversation_xu_letter
  npcId: npc_xu_wenzhou
  title: 半封残信
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: relationship.player.npc_xu_wenzhou.trust
            greater_than_or_equal: 20
      - fact: facts.conversation_xu_letter_completed
        not_equals: true
  priority: 99
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 他把残信展开，边角被反复折过。 他压低声音道上面的地名确是青岚旧驿。
      replies:
        - id: reply_as_merchant
          text: 旧驿若牵着商路，残信可能是货路记录。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 信里可有能指向凶徒的字？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 纸上可有药渍或烟熏痕？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xu_wenzhou
      text: 有可能。父亲写过一串数字，不像日期，更像箱号。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_merchant_close
          text: 账我记下，情分和风险，一样不能糊涂。
          effects:
            - type: add_fact
              key: xu_showed_letter
              value: true
            - type: change_variable
              key: truth_progress
              delta: 10
            - type: add_fact
              key: conversation_xu_letter_completed
              value: true
          endConversation: true
    - id: node_warrior
      speaker: npc_xu_wenzhou
      text: 没有凶徒名字，只有一句“人还在”。这比名字更让我睡不着。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳住人，再稳住路。
          effects:
            - type: add_fact
              key: xu_showed_letter
              value: true
            - type: change_variable
              key: truth_progress
              delta: 10
            - type: add_fact
              key: conversation_xu_letter_completed
              value: true
          endConversation: true
    - id: node_doctor
      speaker: npc_xu_wenzhou
      text: 有烟痕，也有一点苦味。我曾以为是墨坏了，现在听阁下一说，像药渍。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急，再寻病根。
          effects:
            - type: add_fact
              key: xu_showed_letter
              value: true
            - type: change_variable
              key: truth_progress
              delta: 10
            - type: add_fact
              key: conversation_xu_letter_completed
              value: true
          endConversation: true
- id: conversation_xu_warned
  npcId: npc_xu_wenzhou
  title: 劝他谨慎
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: facts.xu_warned
            equals: true
      - fact: facts.conversation_xu_warned_completed
        not_equals: true
  priority: 98
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 他把笔搁下，像终于承认自己太急。 他压低声音道你说得对，他若太急，只会让他们先动手。
      replies:
        - id: reply_as_merchant
          text: 证据要分散保存，别把全部身家放一车。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 夜里别独自去档房，我能安排退路。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 先把身体养住，真相不差这一夜。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xu_wenzhou
      text: 你说得像押货。那我把残信和手稿分开放，至少不让一把火全烧干净。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_merchant_close
          text: 账我记下，情分和风险，一样不能糊涂。
          effects:
            - type: change_npc_state
              npcId: npc_xu_wenzhou
              path: protected
              value: true
            - type: add_fact
              key: conversation_xu_warned_completed
              value: true
          endConversation: true
    - id: node_warrior
      speaker: npc_xu_wenzhou
      text: 我愿意听安排。只要不是让我什么都不做。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳住人，再稳住路。
          effects:
            - type: change_npc_state
              npcId: npc_xu_wenzhou
              path: protected
              value: true
            - type: add_fact
              key: conversation_xu_warned_completed
              value: true
          endConversation: true
    - id: node_doctor
      speaker: npc_xu_wenzhou
      text: 真相也许不差一夜，可我差一点就撑不住这口气。好，我先歇半个时辰。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急，再寻病根。
          effects:
            - type: change_npc_state
              npcId: npc_xu_wenzhou
              path: protected
              value: true
            - type: add_fact
              key: conversation_xu_warned_completed
              value: true
          endConversation: true
- id: conversation_xu_betrayed
  npcId: npc_xu_wenzhou
  title: 被出卖后的冷话
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: facts.player_betrayed_xu
            equals: true
      - fact: facts.conversation_xu_betrayed_completed
        not_equals: true
  priority: 97
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 他把手稿收进怀里，连称呼都变得生硬。 他压低声音道原来你也觉得，有些真相不配见光。
      replies:
        - id: reply_as_merchant
          text: 若我做错，日后补偿；眼下先让你活着。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 在下不求你信，只求阁下别单独冒险。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 怨我可以，先让我看你的伤。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xu_wenzhou
      text: 补偿？有些账不是银钱能补的。阁下若真想补，就别再替他们省祸端。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_merchant_close
          text: 账我记下，情分和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_betrayed_completed
              value: true
    - id: node_warrior
      speaker: npc_xu_wenzhou
      text: 你们总说别冒险，然后替我决定该不该知道。这样的护住，我见够了。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_betrayed_completed
              value: true
    - id: node_doctor
      speaker: npc_xu_wenzhou
      text: 伤不重，心里那处你治不了。可阁下若真是医者，就别再把我当病案摆弄。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_betrayed_completed
              value: true
- id: conversation_xu_wenzhou_daily_05
  npcId: npc_xu_wenzhou
  title: 墨迹未干
  entryNodeId: node_entry
  priority: 56
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 他小心吹干新写的一行字，眼神终于稳了些。 他压低声音道证词要像桥，能让后来的人走过去。
      replies:
        - id: reply_as_merchant
          text: 桥要承重，证词也要能对得上账。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 桥那头若有人埋伏，你也得活着过桥。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 桥不能只通向审判，也要通向疗伤。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xu_wenzhou
      text: 对得上。时间、地点、货箱、见证人，我会逐条排。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_merchant_close
          text: 账我记下，情分和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_05_completed
              value: true
    - id: node_warrior
      speaker: npc_xu_wenzhou
      text: 我会活着。至少写完之前，不能把自己也写进证据里。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_05_completed
              value: true
    - id: node_doctor
      speaker: npc_xu_wenzhou
      text: 你这句我也写下。若真相只会让人继续流血，那我也算写错了。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_05_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 2
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_xu_wenzhou_daily_05_completed
        not_equals: true
- id: conversation_xu_wenzhou_daily_06
  npcId: npc_xu_wenzhou
  title: 晨间杂务
  entryNodeId: node_entry
  priority: 55
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 酒肆角桌一早就不得安生，笔尖刮过纸面。 许闻舟一边把手稿按页码重新排好，一边示意阁下有话便快些讲。
      replies:
        - id: reply_as_merchant
          text: 且先问今日的买卖和路上动静。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 且问这里最需要防的是什么。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 且先问可有人身体不适。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xu_wenzhou
      text: 买卖看着是买卖，背后全是人心。今日最该留意的，是街坊对外来书生的猜疑。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_merchant_close
          text: 账我记下，情分和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_06_completed
              value: true
    - id: node_warrior
      speaker: npc_xu_wenzhou
      text: 要防的不只刀，还有慌。夜探旧档后的退路一旦成真，谁都别想安稳。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_06_completed
              value: true
    - id: node_doctor
      speaker: npc_xu_wenzhou
      text: 有不适的人不少，只是许多人怕花钱，先忍着。阁下若肯看，先从肯吐半句旧事的老人看起。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_06_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 2
          - fact: time.segment
            equals: night
      - fact: facts.conversation_xu_wenzhou_daily_06_completed
        not_equals: true
- id: conversation_xu_wenzhou_daily_07
  npcId: npc_xu_wenzhou
  title: 天气和小病
  entryNodeId: node_entry
  priority: 54
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 墨迹在潮气里干得慢，连半封残信都像沾了潮气。 许闻舟道这种天气最容易把小患拖成大祸。
      replies:
        - id: reply_as_merchant
          text: 潮气会不会影响货物和储备？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 坏天气会让巡守和防备更难吗？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 受潮后最该防哪类病症？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xu_wenzhou
      text: 会。货坏了还能赔，手稿、残信和可作证的人坏了，赔的就是人命和信任。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_merchant_close
          text: 账我记下，情分和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_07_completed
              value: true
    - id: node_warrior
      speaker: npc_xu_wenzhou
      text: 难。风雨一遮，脚印、火光和人声都会骗人。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_07_completed
              value: true
    - id: node_doctor
      speaker: npc_xu_wenzhou
      text: 先防寒热和咳症。别让肯吐半句旧事的老人在风口等太久。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_07_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 3
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_xu_wenzhou_daily_07_completed
        not_equals: true
- id: conversation_xu_wenzhou_daily_08
  npcId: npc_xu_wenzhou
  title: 一顿饭的分量
  entryNodeId: node_entry
  priority: 53
  nodes:
    - id: node_entry
      speaker: npc_xu_wenzhou
      text: 一碗冷面和半盏茶摆在旁边，热气很快散了。 许闻舟看了一眼饭食，道如今吃饭也像在做选择。
      replies:
        - id: reply_as_merchant
          text: 粮价这样下去，小户人家还能撑几天？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 饿急的人会先冲哪里？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 吃不饱会让病势更糟。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xu_wenzhou
      text: 撑几天要看米价，也看谁愿意先分一点出来。他给证词编的页码比官样告示更管用。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_merchant_close
          text: 账我记下，情分和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_08_completed
              value: true
    - id: node_warrior
      speaker: npc_xu_wenzhou
      text: 先冲看得见粮食的地方，再冲他们觉得没人护的地方。 旧案水深，落笔如出剑，先要看清会伤着谁。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳住人，再稳住路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xu_wenzhou_daily_08_completed
              value: true
    - id: node_doctor
      speaker: npc_xu_wenzhou
