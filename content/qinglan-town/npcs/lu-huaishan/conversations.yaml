        not_equals: true
- id: conversation_lu_huaishan_daily_44
  npcId: npc_lu_huaishan
  title: 怕字难认
  entryNodeId: node_entry
  priority: 17
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 陆怀山把话说得平稳，手却在巡夜木牌旁停住。陆怀山说镇里很多人怕，却不愿承认自己怕。
