            greater_than_or_equal: 9
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_lu_huaishan_daily_26_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_27
  npcId: npc_lu_huaishan
  title: 未寄之信
  entryNodeId: node_entry
  priority: 34
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 巡夜木牌旁压着一张折好的纸，纸角已经起毛。陆怀山说有些信写好了，却不知道还能不能送到。
      replies:
        - id: reply_as_merchant
          text: 我能带信，但要知道收信人在哪条路上。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 若送信有凶险，先说凶险来自谁。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 信若关系病人家属，别再拖。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 能带当然好。可路上若有人查，别把信和账本放在一起。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_27_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 凶险来自想知道别人说了什么的人。如今一句家常，也可能被当成证词。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_27_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 关系家属，也关系人心。人若不知道亲人死活，会先在心里病起来。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_27_completed
              value: true
  conditions:
    all:
