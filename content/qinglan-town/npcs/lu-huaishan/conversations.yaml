          - fact: time.day
            greater_than_or_equal: 9
          - fact: time.segment
            equals: night
      - fact: facts.conversation_lu_huaishan_daily_27_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_28
  npcId: npc_lu_huaishan
  title: 稚问如刀
  entryNodeId: node_entry
  priority: 33
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 有个孩子在旁边问了一句大人都不敢问的话。陆怀山沉默片刻，说孩子常常比大人诚实。
      replies:
        - id: reply_as_merchant
          text: 孩子问的是米还是路？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 孩子问的是谁会护住他们？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 孩子问的是病会否死？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 问的是明天还有没有饭。这个问题比任何账都难。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
