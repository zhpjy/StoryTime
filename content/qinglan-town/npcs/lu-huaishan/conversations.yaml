              key: conversation_lu_huaishan_daily_46_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 先让咳得厉害的人避开。查案也要给活人让路。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
