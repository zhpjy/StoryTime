- id: conversation_lu_huaishan_daily_43
  npcId: npc_lu_huaishan
  title: 寄语远人
  entryNodeId: node_entry
  priority: 18
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 陆怀山忽然问你，若能给远方的人留句话，你会写什么。 这个问题来得突兀，却不像玩笑。
      replies:
