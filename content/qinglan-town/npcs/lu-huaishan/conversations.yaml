              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 这句能救命。太安静的路，总有人先替你清过声音。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_43_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 朴素，却管用。许多人死在不肯早看。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
