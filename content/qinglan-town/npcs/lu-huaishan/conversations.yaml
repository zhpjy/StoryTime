          text: 我先听安排，再动手。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 我先看症状，再开方。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 这样才像能做事的人。别把自己的好心摆在别人的急处前面。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
