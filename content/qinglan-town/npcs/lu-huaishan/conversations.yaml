        not_equals: true
- id: conversation_lu_huaishan_daily_33
  npcId: npc_lu_huaishan
  title: 热水微暖
  entryNodeId: node_entry
  priority: 28
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 热水被倒进粗碗里，碗沿冒着白气。陆怀山说热水不值钱，可乱起来时，连热水都难得。
      replies:
        - id: reply_as_merchant
          text: 热水和柴火也要纳入调度。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 送水的人也要护住。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 热水能救很多小病。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 你若能调柴火，许多怨气会少一半。冷饭冷水最磨人。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_33_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 是。别小看送水，夜里拎桶的人最容易被误伤。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_33_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 对。许多药不是没有方子，是没人有热水慢慢服。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
