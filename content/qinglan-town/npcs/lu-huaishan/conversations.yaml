        not_equals: true
- id: conversation_lu_huaishan_daily_25
  npcId: npc_lu_huaishan
  title: 镇外影近
  entryNodeId: node_entry
  priority: 36
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 有人提到镇外，周围立刻静了一瞬。陆怀山说镇外不是远方，是随时会推门进来的事。
      replies:
        - id: reply_as_merchant
          text: 外来的货和人，哪一个更可疑？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 外头的威胁已经进镇了吗？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 外来人可有被妥善安置？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 货不会自己撒谎，人会。可货上留下的痕迹，比人嘴可靠。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_25_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 进来了。不是人人拿刀才叫威胁，有人带的是恐慌和口信。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_25_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 安置得不够。挤在一起，再小的病也会被放大。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_25_completed
              value: true
  conditions:
