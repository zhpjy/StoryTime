              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 能听安排的武人，比只会冲的强。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_37_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 看症状再开方，这道理若人人都懂，镇里少一半乱事。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
