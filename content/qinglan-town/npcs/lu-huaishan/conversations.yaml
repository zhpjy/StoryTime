              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 先下手的人常说自己是自保。你要看他保的到底是什么。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_44_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 藏病最要命。藏到后来，不止害自己。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
