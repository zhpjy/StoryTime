              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 看风向。烟往哪边去，人多半也往哪边藏。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
