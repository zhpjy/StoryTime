            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 作证的人也会怕，也会病。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 印证越多，单个人背的压力越小。这是正经办法。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_47_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 护住不是站在他旁边亮刀，也包括让他家里有饭。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_47_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 是。吓坏的人说不清话，先让他能睡一觉。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
