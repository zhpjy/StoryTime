        - id: reply_as_doctor
          text: 害怕会让人藏病。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 价钱只是表面。真正涨的是彼此的防备。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
