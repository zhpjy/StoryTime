# YAML 兼容 JSON 格式，可直接由制作工具解析
- id: conversation_lu_first_meet
  npcId: npc_lu_huaishan
  title: 镇门试客
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 1
      - fact: facts.conversation_lu_first_meet_completed
        not_equals: true
  priority: 100
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 陆怀山立在镇门阴影里，半旧皮甲压着肩。他抬眼看你，目光像刀背一掂，分不清你是帮手，还是麻烦。
      replies:
        - id: reply_as_merchant
          text: 且问哪条商路还能走，免得把货队送进险处。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 若山路有匪，我可以跟你巡一段。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 流民里若有人发热，镇门该怎么分流？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 商路能走，但不能按老规矩走。你让车队别贪近路，进门前先报人数和货物。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_first_meet_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 有胆子是好事，别把胆子当眼睛。跟巡可以，先听号令。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_first_meet_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 发热的先别挤进门洞。你若能看诊，我让人腾出告示棚，免得一乱全乱。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_first_meet_completed
              value: true
- id: conversation_lu_bandit_warning
  npcId: npc_lu_huaishan
  title: 黑岭暗线
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: variables.bandit_power
            greater_than_or_equal: 45
      - fact: facts.conversation_lu_bandit_warning_completed
        not_equals: true
  priority: 99
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 他把巡路草图按在门墩上，炭圈黑得刺眼。他压低声音说，黑岭盗最要命的不是狠，是准。
      replies:
        - id: reply_as_merchant
          text: 他们盯的是贵货，还是某些固定车队？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 准就说明有人给他们递路。你怀疑谁？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 被劫药材多不多？这会影响药铺救人。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 他们不只挑贵货，有时专挑不起眼的药包和旧木箱。像是在找东西。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          effects:
            - type: change_variable
              key: truth_progress
              delta: 2
            - type: add_fact
              key: conversation_lu_bandit_warning_completed
              value: true
          endConversation: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 怀疑不能当证据。可镇里知道巡路表的人，不多。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          effects:
            - type: change_variable
              key: truth_progress
              delta: 2
            - type: add_fact
              key: conversation_lu_bandit_warning_completed
              value: true
          endConversation: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 药材丢过两回。若再丢，药铺不是少赚，是少救命。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          effects:
            - type: change_variable
              key: truth_progress
              delta: 2
            - type: add_fact
              key: conversation_lu_bandit_warning_completed
              value: true
          endConversation: true
- id: conversation_lu_truth_line
  npcId: npc_lu_huaishan
  title: 档中缺页
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: variables.truth_progress
            greater_than_or_equal: 30
      - fact: facts.conversation_lu_truth_line_completed
        not_equals: true
  priority: 98
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 他目光越过祠堂，声音压得很低。有些案卷不是虫蛀，是有人伸手拿走了。
      replies:
        - id: reply_as_merchant
          text: 缺页若牵出旧债，谁会最怕账被翻开？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 拿走案卷的人还在镇里吗？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 旧案和现在的病、药、山路有关系吗？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 怕的人不止一个。有人怕丢脸，有人怕丢命，还有人怕镇子撑不住。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          effects:
            - type: change_variable
              key: truth_progress
              delta: 5
            - type: add_fact
              key: conversation_lu_truth_line_completed
              value: true
          endConversation: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 在不在镇里难说，但命令一定从镇里出去过。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          effects:
            - type: change_variable
              key: truth_progress
              delta: 5
            - type: add_fact
              key: conversation_lu_truth_line_completed
              value: true
          endConversation: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 我没有证据，只知道旧庙、药材和山路被太多人同时避开，这不正常。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          effects:
            - type: change_variable
              key: truth_progress
              delta: 5
            - type: add_fact
              key: conversation_lu_truth_line_completed
              value: true
          endConversation: true
- id: conversation_lu_low_trust
  npcId: npc_lu_huaishan
  title: 门前疑云
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: relationship.player.npc_lu_huaishan.suspicion
            greater_than_or_equal: 30
      - fact: facts.conversation_lu_low_trust_completed
        not_equals: true
  priority: 97
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 他把木牌翻过来，背面刻着今夜更次，指腹在刻痕上停了停。他问你，为何总在要紧处现身。
      replies:
        - id: reply_as_merchant
          text: 哪里有风险我就往哪里问，这不是心虚。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 你若怀疑我，就让我站到最凶险的位置。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 病人不会等你们查清我从哪里来。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 会问价的人未必会卖镇子。可你要记住，镇门不是买卖桌。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_low_trust_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 最凶险的位置不是最能证明清白的位置。能守住嘴，也能守住刀，才算。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_low_trust_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 我知道。药铺那边我会放行，但你别借看病去碰不该碰的锁。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_low_trust_completed
              value: true
- id: conversation_lu_huaishan_daily_05
  npcId: npc_lu_huaishan
  title: 冷饼夜巡
  entryNodeId: node_entry
  priority: 56
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 他咬着冷干饼，嚼得很慢，像连力气也要省着用。他说夜里少一支火把，守门人心里就少一寸底。
      replies:
        - id: reply_as_merchant
          text: 可以捐油和火把，但要知道用在哪几处。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 我守外侧，你们守门洞。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 我备伤药，别让小伤拖成大事。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 油给北门、旧桥和粮车停处。你若真捐，别让人敲锣打鼓替你扬名。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_05_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 可以。外侧看脚印，门洞看人心，别只盯山。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_05_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 伤药放门房左柜。夜里有人受伤，别问谁的错，先止血。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_05_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 2
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_lu_huaishan_daily_05_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_06
  npcId: npc_lu_huaishan
  title: 晨门忙声
  entryNodeId: node_entry
  priority: 55
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 镇门一早就不得安生，木栓一响，排队的人都抬头。陆怀山一边检查过路人的路引，一边抬手示意：有话就快些讲。
      replies:
        - id: reply_as_merchant
          text: 且先问今日的买卖和路上动静。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 且问这里最需要防的是什么。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 且先问可有人身体不适。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 买卖看着是买卖，背后全是人心。今日最该留意的，是集市里越来越急的粮价争吵。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_06_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 要防的不只刀，还有慌。夜巡时没人照应的路口一旦成真，谁都别想安稳。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_06_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 有不适的人不少，只是许多人怕花钱，先忍着。你若肯看，先从排队入镇的流民和商旅看起。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_06_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 2
          - fact: time.segment
            equals: night
      - fact: facts.conversation_lu_huaishan_daily_06_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_07
  npcId: npc_lu_huaishan
  title: 山风小恙
  entryNodeId: node_entry
  priority: 54
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 山口的风裹着湿土味吹来，巡夜木牌也像浸了潮。陆怀山说，这种天最会把小病拖成大祸。
      replies:
        - id: reply_as_merchant
          text: 潮气会否影响货物和储备？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 坏天气会让巡守和防备更难吗？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 受潮后最该防哪类病症？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 会。货坏了还能赔，人手和火把坏了，赔的就是人命和信任。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_07_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 难。风雨一遮，脚印、火光和人声都会骗人。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_07_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 先防寒热和咳症。别让排队入镇的流民和商旅在风口等太久。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_07_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 3
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_lu_huaishan_daily_07_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_08
  npcId: npc_lu_huaishan
  title: 一碗饭重
  entryNodeId: node_entry
  priority: 53
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 巡守的干饼冷在一旁，热气散得比人心还快。陆怀山看了一眼饭食，说如今吃一口饭，也像在做取舍。
      replies:
        - id: reply_as_merchant
          text: 粮价这样下去，小户人家还能撑几天？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 饿急的人会先冲哪里？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 吃不饱会让病势更糟。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 撑几天要看米价，也看谁愿意先分一点出来。巡逻更次簿比官样告示更管用。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_08_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 先冲看得见粮食的地方，再冲他们觉得没人护的地方。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_08_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 对。药能压病，饭才托命。没有巡守冷掉的干饼，药下去也虚。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_08_completed
              value: true
  conditions:
