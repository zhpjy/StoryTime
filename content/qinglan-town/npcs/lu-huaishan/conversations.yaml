            greater_than_or_equal: 11
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_lu_huaishan_daily_31_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_32
  npcId: npc_lu_huaishan
  title: 旧日慢谈
  entryNodeId: node_entry
  priority: 29
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 刚来镇上时被拦在门外的那天被提起时，陆怀山的神色软了一点。陆怀山说从前也不是没有难处，只是大家还肯坐下慢慢说。
      replies:
        - id: reply_as_merchant
          text: 从前商路最安稳的时候靠什么？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 从前巡守和镇民怎么互相信？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 从前病人如何互相照应？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 靠熟人，也靠不把每一文钱都逼到尽头。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
