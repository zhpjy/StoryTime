          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_39_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 对，能休息时不休息，下一波来时就只剩硬撑。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
