      - all:
          - fact: time.day
            greater_than_or_equal: 3
          - fact: time.segment
            equals: night
      - fact: facts.conversation_lu_huaishan_daily_09_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_10
  npcId: npc_lu_huaishan
  title: 账簿人情
  entryNodeId: node_entry
  priority: 51
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 巡逻更次簿被压在手边，纸页边缘已经卷起。陆怀山说账本记得清，人情却总算不明白。
      replies:
        - id: reply_as_merchant
          text: 账清才不会乱，你最怕哪笔账爆出来？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 人情账若逼到头，会否变成仇？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 欠账的人会否因此拖着不求助？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 最怕不是欠得多，是欠得久。旧账一翻，谁都说自己有理。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_10_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 会。人情变仇，只差一句“你当年也欠我”。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_10_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 会。有人宁可忍病，也不愿再添一笔欠情。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_10_completed
              value: true
  conditions:
