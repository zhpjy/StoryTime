        not_equals: true
- id: conversation_lu_huaishan_daily_37
  npcId: npc_lu_huaishan
  title: 伸手添乱
  entryNodeId: node_entry
  priority: 24
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 陆怀山看着你，像是在判断你这次会伸手还是伸脚绊人。陆怀山说帮忙二字，说起来容易，做歪了就是添乱。
      replies:
