          - fact: time.day
            greater_than_or_equal: 10
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_lu_huaishan_daily_29_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_30
  npcId: npc_lu_huaishan
  title: 价声如沸
  entryNodeId: node_entry
  priority: 31
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 集市里越来越急的粮价争吵的话头又被人翻出来，声音越来越尖。陆怀山说讨价还价本是日常，如今却像吵命。
      replies:
        - id: reply_as_merchant
          text: 价要稳，得先稳供给。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 吵到动手前会有什么征兆？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 买不起药和米的人会同时变多。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 供给是一头，信任是另一头。只补一头，价还会乱。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_30_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 征兆是没人再听完整句话，只听见自己吃亏。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_30_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 会。所以救病不能只靠药铺，也得靠米袋。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_30_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 10
          - fact: time.segment
            equals: night
      - fact: facts.conversation_lu_huaishan_daily_30_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_31
  npcId: npc_lu_huaishan
  title: 夜半脚声
  entryNodeId: node_entry
  priority: 30
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 昨夜的脚步声还被人挂在嘴边，几个人说法各不相同。陆怀山说，半夜走路的人不一定是贼，也可能是怕白天被看见。
      replies:
        - id: reply_as_merchant
          text: 夜里运货的人通常有不得已的理由。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 半夜脚步要查，但不可先惊动。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 夜里求药的人也会偷偷走。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 理由有真有假。看他们绕开什么，比看他们搬什么更有用。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_31_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 你说得对。先记路，再问人，别一嗓子把线头喊散了。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_31_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 求药的人怕欠账，也怕被人说染病。你若拦，记得先问急不急。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
