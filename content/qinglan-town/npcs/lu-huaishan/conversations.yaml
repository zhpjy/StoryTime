            - type: add_fact
              key: conversation_lu_huaishan_daily_34_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 站中间的人最容易挨骂。可没人站，事就会往刀上走。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
