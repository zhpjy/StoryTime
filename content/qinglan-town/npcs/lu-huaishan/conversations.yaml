          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 夜里哪个方向最该有人守？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 夜里病人会否无人照应？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 有。不是每辆车都会报号，也不是每个脚印都往门里走。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_14_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 守商路北段，也守人心最松的后门。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_14_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 会。夜里一句“明早再说”，有时就等不到明早。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
