      - all:
          - fact: time.day
            greater_than_or_equal: 3
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_lu_huaishan_daily_08_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_09
  npcId: npc_lu_huaishan
  title: 门前风言
  entryNodeId: node_entry
  priority: 52
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 排队入镇的流民和商旅在不远处压低声音，说到你来时又散开。陆怀山说镇上闲话跑得比马还快。
      replies:
        - id: reply_as_merchant
          text: 闲话里可有能当线头的真货？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 闲话会否引出冲突？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 闲话会让病人不敢就医。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 真货常藏在夸张里。你别听他们怎么骂，听他们反复提到什么。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_09_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 会。人一怕，就要找个能看见的人出气。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_09_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 已经有了。有人把病说成报应，这比发热还难治。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_09_completed
              value: true
  conditions:
