- id: conversation_lu_huaishan_daily_41
  npcId: npc_lu_huaishan
  title: 两道门槛
  entryNodeId: node_entry
  priority: 20
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 话题从镇门绕到祠堂，像绕不开两道门。陆怀山说一道门管活人进出，一道门管旧事出入。
