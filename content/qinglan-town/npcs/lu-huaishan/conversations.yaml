              key: conversation_lu_huaishan_daily_36_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 知道凶险的人未必坏，有时只是活得太久，怕了。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_36_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 见过病根的人最怕再闻到同样味道。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
