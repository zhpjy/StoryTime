    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 6
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_lu_huaishan_daily_16_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_17
  npcId: npc_lu_huaishan
  title: 水路清浊
  entryNodeId: node_entry
  priority: 44
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 有人拎着水桶经过，桶沿晃出一圈水光。陆怀山说水看着清，不代表来路清。
      replies:
        - id: reply_as_merchant
          text: 水源若出问题，铺面和货队都会停。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 谁能靠近水源而不被盘问？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 水源须得查，病常从这里起。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 一停就不是一家铺子的事。你若查水，先查谁最近改了取水点。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_17_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 挑水人、送货人、巡夜人，都能靠近。最不起眼的最难查。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_17_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 你说到要处了。病若沿水走，药铺再忙也只是追着尾巴跑。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_17_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 6
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_lu_huaishan_daily_17_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_18
  npcId: npc_lu_huaishan
  title: 灯油将尽
  entryNodeId: node_entry
  priority: 43
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 一盏灯的油快见底，火苗缩成豆大一点。陆怀山说灯一暗，人就容易做错事。
      replies:
        - id: reply_as_merchant
          text: 我能调些灯油，但要知道最缺哪里。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 黑处最适合藏刀。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 病人夜里也需要灯。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 最缺的不是灯油，是愿意把灯点在别人门口的人。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_18_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 藏刀也藏眼泪。夜里生变，天亮后人人都说没看见。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_18_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 是。没灯，连药量都容易看错，更别说分辨脸色。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_18_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 6
          - fact: time.segment
            equals: night
      - fact: facts.conversation_lu_huaishan_daily_18_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_19
  npcId: npc_lu_huaishan
  title: 小差不小
  entryNodeId: node_entry
  priority: 42
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 擦去刀鞘上的灰的空当，陆怀山顺路把旁边的东西摆正。陆怀山问你愿不愿意帮一个不显眼的小忙。
      replies:
        - id: reply_as_merchant
          text: 小忙也要讲清要送到谁手里。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 小忙若有风险，我先走前面。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 小忙若关系病人，我现在就去。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 送给守门的年轻巡丁，别让太多人看见。不是见不得光，是怕被传歪。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_19_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 不用拔刀，帮我看住后路就行。有时候不让人挤上来，比冲出去更难。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_19_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 关系不大，却能省一条腿脚。病人那边，少等一刻都是好事。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_19_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 7
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_lu_huaishan_daily_19_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_20
  npcId: npc_lu_huaishan
  title: 看脸听心
  entryNodeId: node_entry
  priority: 41
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 排队入镇的流民和商旅从旁边经过，脸色各不相同。陆怀山说最近看人脸，比听人话更准。
      replies:
        - id: reply_as_merchant
          text: 看脸色能看出谁要囤货？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 看脸色能看出谁要闹事？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 看脸色能看出谁在硬撑。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 能。眼睛总往人手和火把上飘的人，多半心里已经起了算盘。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_20_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 能。真正要闹的人常不喊，喊得最大声的反而等别人先动。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_20_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 能。硬撑的人最怕被叫住，你若温和些，他们才肯承认。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_20_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 7
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_lu_huaishan_daily_20_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_21
  npcId: npc_lu_huaishan
  title: 咳声惊人
  entryNodeId: node_entry
  priority: 40
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 远处一阵咳声传来，几个人下意识退开半步。陆怀山皱眉说，人怕病，也怕先被病名吓倒。
      replies:
        - id: reply_as_merchant
          text: 若恐慌传开，买卖会先崩。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 恐慌会让人不听号令。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 退开不是办法，要分症状。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 买卖崩了，粮药也会断。你若能说服人别乱传，等于保住半条路。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_21_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 对。怕到极处，人会把救他的人也当敌人。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_21_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 分得清，心就稳一半。你来说，他们比听我说更容易信。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_21_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 7
          - fact: time.segment
            equals: night
      - fact: facts.conversation_lu_huaishan_daily_21_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_22
  npcId: npc_lu_huaishan
  title: 旧牌缺口
  entryNodeId: node_entry
  priority: 39
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 巡夜木牌边缘有一道旧缺口，像用久了也舍不得换。陆怀山说镇上许多东西都是这样，破了还得用。
      replies:
        - id: reply_as_merchant
          text: 旧器物能撑，旧规矩未必能撑。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 破口不补，迟早伤手。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 旧伤不看，也会反复疼。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 你们外来人看得快，本地人舍不得。舍不得有时是情分，有时是祸端。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_22_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 补也要看谁来补。手太重，器物没补好，先碎了。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_22_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 疼久了，人会把疼当成日常。镇子也是。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_22_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 8
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_lu_huaishan_daily_22_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_23
  npcId: npc_lu_huaishan
  title: 谎从何起
  entryNodeId: node_entry
  priority: 38
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 一句传闻被重复了三遍，每次都多一个细节。陆怀山说谎话不怕新，怕的是有人故意让它像真话。
      replies:
        - id: reply_as_merchant
          text: 假消息会害车队，我要辨源头。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 撒谎的人往往躲在后面。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 假病因会害死人。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 源头常常不在说得最大声的人那里，而在第一个问“你听说了吗”的人那里。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_23_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 躲在后面，也会留下目的。看谎话想把人赶向哪里。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_23_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 是。病因一错，药越勤，错得越深。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_23_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 8
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_lu_huaishan_daily_23_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_24
  npcId: npc_lu_huaishan
  title: 信字难写
  entryNodeId: node_entry
  priority: 37
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 陆怀山看了看周围，像在掂量哪句话能放出口。他说，现在不是没人说话，是没人敢担保谁可信。
      replies:
        - id: reply_as_merchant
          text: 信任也要有抵押，谁的抵押最实？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 我看行动，不看漂亮话。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 肯让人看病的人，至少还有求生心。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 抵押最实的是退路。没退路的人，说了真话也可能变卦。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
