              key: conversation_lu_huaishan_daily_42_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 慌会传，比病还快。你若能安一句，就是帮忙。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
