      - all:
          - fact: time.day
            greater_than_or_equal: 9
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_lu_huaishan_daily_25_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_26
  npcId: npc_lu_huaishan
  title: 午后力尽
  entryNodeId: node_entry
  priority: 35
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 日头偏过去，陆怀山的动作慢了一点。陆怀山说人累的时候最容易答应不该答应的事。
      replies:
        - id: reply_as_merchant
          text: 疲惫会让人卖掉底线。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 疲惫会让守卫露空。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 疲惫会让病情恶化。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 底线不是一下卖掉的，是一点点让出去的。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_26_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 露空时最怕有人正等着。你若能替人歇一刻，就能补一个缺口。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_26_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 你说得对。许多人不是病倒，是熬倒。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
