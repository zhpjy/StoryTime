        not_equals: true
- id: conversation_lu_huaishan_daily_34
  npcId: npc_lu_huaishan
  title: 让步难开
  entryNodeId: node_entry
  priority: 27
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 陆怀山看着两拨人互不相让，叹了口气。陆怀山说谁都觉得自己让一步就会被吞掉。
      replies:
