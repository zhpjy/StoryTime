          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 烟会让咳症更重。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 有人翻旧账，也有人想让你以为是旧账自己烧起来。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
