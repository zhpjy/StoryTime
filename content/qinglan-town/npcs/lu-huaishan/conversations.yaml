              key: conversation_lu_huaishan_daily_24_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 行动要看连续几天，不看一时热血。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_24_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 求生心很真，可求生也会让人隐瞒。别全信，也别全疑。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
