            greater_than_or_equal: 5
          - fact: time.segment
            equals: night
      - fact: facts.conversation_lu_huaishan_daily_15_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_16
  npcId: npc_lu_huaishan
  title: 旧名如刺
  entryNodeId: node_entry
  priority: 45
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 陆怀山提到一个旧名字，又很快把话收住。 那名字像一根刺，没人愿意碰得太深。
      replies:
        - id: reply_as_merchant
          text: 名字若能对上旧账，就不该含糊。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 名字若指向活人，我得知道凶险。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 旧名字也可能是病根线头。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 你要对账，就别只问名字，还要问他最后被谁看见。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_16_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 凶险在问出口后。许多人怕的不是名字，是有人还记得。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_16_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 有时一个名字比一味药难找，但找到后，方子才完整。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_16_completed
              value: true
