        not_equals: true
- id: conversation_lu_huaishan_daily_36
  npcId: npc_lu_huaishan
  title: 闭口藏线
  entryNodeId: node_entry
  priority: 25
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 有人一听缺页的旧案记录就换了话头，换得太快。陆怀山说避得太急，本身就是线头。
      replies:
