          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_28_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 问的是守门的人会不会也跑。你看，孩子知道害怕什么。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_28_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 问的是会不会传给娘亲。你若听见了，就别用空话糊弄。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_28_completed
              value: true
  conditions:
