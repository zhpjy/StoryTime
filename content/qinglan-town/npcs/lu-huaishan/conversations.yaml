        not_equals: true
- id: conversation_lu_huaishan_daily_39
  npcId: npc_lu_huaishan
  title: 静里听声
  entryNodeId: node_entry
  priority: 22
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 周围忽然安静了一小会儿，像镇子终于喘了口气。陆怀山说安静不一定是平安，也可能是大家都在等下一声响。
      replies:
