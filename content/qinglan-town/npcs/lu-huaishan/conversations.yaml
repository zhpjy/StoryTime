          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_14_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 5
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_lu_huaishan_daily_14_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_15
  npcId: npc_lu_huaishan
  title: 老幼在前
  entryNodeId: node_entry
  priority: 46
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 排队入镇的人里，有人扶着老人，也有人牵着孩子。陆怀山看着他们说，镇子的好坏，最先落在这些人身上。
      replies:
        - id: reply_as_merchant
          text: 物资要先给谁才不乱？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 护送时先护哪一类人？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 老人孩子要分开照看。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 先给不能等的人，再给能维持秩序的人。别让分配看起来像偏心。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_15_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 先护走不快的。能跑的人还有路，走不动的人只有别人。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_15_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 对。小孩病急，老人病沉，混在一起只会互相拖。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
