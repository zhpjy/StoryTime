- id: conversation_lu_huaishan_daily_42
  npcId: npc_lu_huaishan
  title: 小争渐长
  entryNodeId: node_entry
  priority: 19
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 旁边起了一场小争执，很快又被人劝开。陆怀山说小争执若没人管，就会学会长大。
