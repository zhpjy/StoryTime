            greater_than_or_equal: 10
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_lu_huaishan_daily_28_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_29
  npcId: npc_lu_huaishan
  title: 墙破风入
  entryNodeId: node_entry
  priority: 32
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 不远处的墙根有一块新补的泥，颜色还没干透。陆怀山说墙会破，规矩也会破。
      replies:
        - id: reply_as_merchant
          text: 破口若能走私货，就会有人利用。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 破墙也是防线缺口。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 破墙透风，病人受不了。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 利用的人一定有，不一定是大奸大恶，也可能只是饿急了。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_29_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 缺口要补，也要看谁常在附近徘徊。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_29_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 先挡风，再问责。人病着的时候，风比道理快。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_29_completed
              value: true
  conditions:
