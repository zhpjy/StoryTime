          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 告示能让人守规矩吗？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 告示可有安排病人和弱者？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 会影响一阵。可若人手和火把跟不上，纸上的价就只是纸。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_13_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 能让想守规矩的人有个台阶，拦不住已经急红眼的人。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_13_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 写了几句，远远不够。真正照顾人的，是谁肯把门打开。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_13_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 5
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_lu_huaishan_daily_13_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_14
  npcId: npc_lu_huaishan
  title: 夜声难辨
  entryNodeId: node_entry
  priority: 47
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 镇门木栓吱呀作响之外，夜里还夹着几声辨不清的动静。陆怀山说，最近没人敢睡得太沉。
      replies:
        - id: reply_as_merchant
