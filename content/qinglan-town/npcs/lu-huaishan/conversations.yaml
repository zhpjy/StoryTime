      - all:
          - fact: time.day
            greater_than_or_equal: 4
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_lu_huaishan_daily_10_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_11
  npcId: npc_lu_huaishan
  title: 山路风声
  entryNodeId: node_entry
  priority: 50
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 外头有人提到商路北段，声音立刻低了下去。陆怀山说山路从来不只运货，也运消息。
      replies:
        - id: reply_as_merchant
          text: 哪类消息最影响货队？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 山路上现在最像陷阱的是哪里？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 山路会否带来新的病根？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 影响最大的不是匪，是不知道谁和匪有来往。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_11_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 最像陷阱的是人人都说安全的那段。太安静了。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_11_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 会。水、草药、货布，都可能把病带进镇。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_11_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 4
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_lu_huaishan_daily_11_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_12
  npcId: npc_lu_huaishan
  title: 旧庙吞声
  entryNodeId: node_entry
  priority: 49
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 缺页的旧案记录这个话头一出来，陆怀山的手慢了一拍。陆怀山说旧庙的事，镇里不是没人知道，是没人愿意说全。
      replies:
        - id: reply_as_merchant
          text: 旧庙牵着哪条旧账？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 谁会为了旧庙动刀？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 旧庙和病、药可有牵连？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_lu_huaishan
      text: 牵着命账，也牵着名声账。两种账都比银钱难讨。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_merchant_close
          text: 我记下了。人情归人情，风险也得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_12_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 拔刀的人未必最恨，最怕的人才会先动手。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_12_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 有牵连。至少巡守常备的伤药和刚来镇上时被拦在门外的那天都绕不开它。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急症，再顺藤摸病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_12_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 4
          - fact: time.segment
            equals: night
      - fact: facts.conversation_lu_huaishan_daily_12_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_13
  npcId: npc_lu_huaishan
  title: 告示如纸
  entryNodeId: node_entry
  priority: 48
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 不远处有人念着新贴的告示，念到一半就笑不出来了。陆怀山说告示写得齐整，日子却不照字走。
      replies:
        - id: reply_as_merchant
          text: 告示会影响交易和价格吗？
          conditions:
            fact: player.identity
