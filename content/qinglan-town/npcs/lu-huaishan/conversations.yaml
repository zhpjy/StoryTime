        not_equals: true
- id: conversation_lu_huaishan_daily_35
  npcId: npc_lu_huaishan
  title: 坏信先后
  entryNodeId: node_entry
  priority: 26
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 坏消息像排队一样，一个接一个进门。陆怀山说最怕的不是坏消息，是大家不知道先处理哪个。
      replies:
        - id: reply_as_merchant
          text: 先保路、粮、药三个节点。
          conditions:
