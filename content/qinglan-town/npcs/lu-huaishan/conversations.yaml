          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_32_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 靠说到做到。守门的人不乱拿，进门的人不乱闯。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
