          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_34_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 这话该让他们都听听。咳声不会等他们吵完。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
