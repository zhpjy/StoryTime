        not_equals: true
- id: conversation_lu_huaishan_daily_38
  npcId: npc_lu_huaishan
  title: 旧物记事
  entryNodeId: node_entry
  priority: 23
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 巡夜木牌被陆怀山拿起又放下，像有一句话卡在喉间。他说，旧物留得久了，就会替人记事。
      replies:
