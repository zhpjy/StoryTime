      - fact: facts.conversation_lu_huaishan_daily_45_completed
        not_equals: true
- id: conversation_lu_huaishan_daily_46
  npcId: npc_lu_huaishan
  title: 旧火新烟
  entryNodeId: node_entry
  priority: 15
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 远处有人烧湿柴，烟味忽然重了起来。陆怀山说烟味最会骗人，像旧火又像新火。
      replies:
