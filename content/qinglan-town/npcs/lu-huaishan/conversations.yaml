        not_equals: true
- id: conversation_lu_huaishan_daily_45
  npcId: npc_lu_huaishan
  title: 补衣旧线
  entryNodeId: node_entry
  priority: 16
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 有人袖口补了三种颜色的线，看上去有些狼狈。陆怀山说日子破了，人就学会把不合适的布缝在一起。
