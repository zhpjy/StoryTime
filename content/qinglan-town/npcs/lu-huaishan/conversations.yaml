              key: conversation_lu_huaishan_daily_35_completed
              value: true
    - id: node_warrior
      speaker: npc_lu_huaishan
      text: 人保住，门和物才有意义。别反过来。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心，再守住路口。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_lu_huaishan_daily_35_completed
              value: true
    - id: node_doctor
      speaker: npc_lu_huaishan
      text: 这就是救治的顺序。镇子也像一个病人。这话我收下。眼下线头多，得一根根捋清，不能急，也不能躲。
      replies:
