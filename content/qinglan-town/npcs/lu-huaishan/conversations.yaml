        not_equals: true
- id: conversation_lu_huaishan_daily_47
  npcId: npc_lu_huaishan
  title: 证言如担
  entryNodeId: node_entry
  priority: 14
  nodes:
    - id: node_entry
      speaker: npc_lu_huaishan
      text: 话说到证人时，空气像被按住。陆怀山说作证不是说一句话，是把往后日子押上去。
      replies:
        - id: reply_as_merchant
          text: 证词要能互相印证，不可只靠胆子。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 作证的人需要护住。
          conditions:
