# YAML 兼容 JSON 格式，可直接由制作工具解析
- id: conversation_ritualist_first
  npcId: npc_old_ritualist
  title: 香灰里的第一句话
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 1
      - fact: facts.conversation_ritualist_first_completed
        not_equals: true
  priority: 100
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 周敬用竹片拨平香灰，动作慢得像在量年月。 他低声说祠堂里供的是死人，最怕活人拿死人做刀。
      replies:
        - id: reply_as_merchant
          text: 只想问清旧账，不想搅乱香火。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 若有人拿死人作刀，我就该拦。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 死人不可说话，活人的病却可能因沉默而起。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_old_ritualist
      text: 旧账不是算盘珠，拨错一颗能重来。阁下若问，就先学会收声。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_merchant_close
          text: 我记下了，人情要还，风险也要算。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_ritualist_first_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 刀拦得住手，拦不住怨。阁下要先分清，谁是真怨，谁是借怨行凶。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_ritualist_first_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 沉默也有病气，这话不假。可开口的人若护不住自己，病气会更重。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢挖。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_ritualist_first_completed
              value: true
- id: conversation_ritualist_records
  npcId: npc_old_ritualist
  title: 袖中旧钥
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: variables.truth_progress
            greater_than_or_equal: 10
      - fact: facts.conversation_ritualist_records_completed
        not_equals: true
  priority: 99
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 他站在档房门前，钥匙在袖中轻轻碰响。 他低声说旧档不是不能看，是看了以后要知道怎么收场。
      replies:
        - id: reply_as_merchant
          text: 看账要有见证，旧档也该如此。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 若里面有罪证，就不可永远锁着。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 病案锁久了，后人就只能乱猜。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_old_ritualist
      text: 见证要找得稳，别找只会添油加醋的人。旧档最怕被当成酒肆闲话。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_merchant_close
          text: 我记下了，人情要还，风险也要算。
          effects:
            - type: change_relationship
              source: player
              target: npc_old_ritualist
              path: trust
              delta: 5
            - type: add_fact
              key: conversation_ritualist_records_completed
              value: true
          endConversation: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 不能永远锁着，也不能当街摔开。阁下若能保证不乱，我会考虑。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          effects:
            - type: change_relationship
              source: player
              target: npc_old_ritualist
              path: trust
              delta: 5
            - type: add_fact
              key: conversation_ritualist_records_completed
              value: true
          endConversation: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 你拿病案比旧档，倒也贴切。只是这病案里，每个名字都有后人。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢挖。
          effects:
            - type: change_relationship
              source: player
              target: npc_old_ritualist
              path: trust
              delta: 5
            - type: add_fact
              key: conversation_ritualist_records_completed
              value: true
          endConversation: true
- id: conversation_ritualist_registry
  npcId: npc_old_ritualist
  title: 牌位后的册子
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: facts.old_registry_revealed
            equals: true
      - fact: facts.conversation_ritualist_registry_completed
        not_equals: true
  priority: 98
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 他回头看了一眼正堂，眼里有很深的疲惫。 他低声说这册子藏了多年，不是不想交，是没等到能接住的人。
      replies:
        - id: reply_as_merchant
          text: 接住它需要什么条件？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 若有人来抢，我能护你和名册。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 名册若能救现在的人，我愿意担风险。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_old_ritualist
      text: 需要你不把它卖成一场热闹。也需要你知道，名字后面都是家门。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_merchant_close
          text: 我记下了，人情要还，风险也要算。
          effects:
            - type: add_fact
              key: old_case_record_found
              value: true
            - type: add_fact
              key: conversation_ritualist_registry_completed
              value: true
          endConversation: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 护得了一晚，护不了一世。阁下要护的不是册子，是它出来后的秩序。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          effects:
            - type: add_fact
              key: old_case_record_found
              value: true
            - type: add_fact
              key: conversation_ritualist_registry_completed
              value: true
          endConversation: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 救人未必只靠药。有时让一桩旧冤落地，活人才能睡一觉。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢挖。
          effects:
            - type: add_fact
              key: old_case_record_found
              value: true
            - type: add_fact
              key: conversation_ritualist_registry_completed
              value: true
          endConversation: true
- id: conversation_ritualist_low_trust
  npcId: npc_old_ritualist
  title: 问得太急
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: relationship.player.npc_old_ritualist.suspicion
            greater_than_or_equal: 30
      - fact: facts.conversation_ritualist_low_trust_completed
        not_equals: true
  priority: 97
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 他把香插正，语气忽然冷下来。 他低声说你问得太急，急着翻旧事的人未必为公道。
      replies:
        - id: reply_as_merchant
          text: 急是因为风险在涨，不是为了赚话。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 急是因为有人还在害人。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 急是因为病势不会等旧人点头。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_old_ritualist
      text: 风险在涨，也要看谁推着它涨。阁下若只看价，容易漏看推手。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_merchant_close
          text: 我记下了，人情要还，风险也要算。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_ritualist_low_trust_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 有人害人，你更要稳。血气一冲，正好给别人递刀。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_ritualist_low_trust_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 病势不等人，可医者下针前也要摸脉。旧事就是这镇子的脉。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢挖。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_ritualist_low_trust_completed
              value: true
- id: conversation_ritualist_unlock_records
  npcId: npc_old_ritualist
  title: 开档房
  entryNodeId: node_entry
  conditions:
    all:
      - any:
          - fact: relationship.player.npc_old_ritualist.trust
            greater_than_or_equal: 20
          - fact: relationship.player.npc_lu_huaishan.trust
            greater_than_or_equal: 30
      - fact: facts.record_room_unlocked
        not_equals: true
  priority: 98
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 周敬站在档房门前，袖中钥匙碰出轻响。他说，旧档不是不能开，是开了以后，谁都不能装作没看见。
      replies:
        - id: reply_unlock_by_trust
          text: 我不会把旧档当闲话传出去，只按证据查。
          nextNodeId: node_unlock_trust
        - id: reply_unlock_by_lu
          text: 陆怀山也要查这条线，档房不能再锁着。
          nextNodeId: node_unlock_lu
    - id: node_unlock_trust
      speaker: npc_old_ritualist
      text: 他看了你许久，像是在衡量这句话有几分重量。最后，钥匙从袖中落到掌心。
      replies:
        - id: reply_confirm_unlock_by_trust
          text: 开门吧，旧账要有见证。
          nextNodeId: node_unlock_confirm
    - id: node_unlock_lu
      speaker: npc_old_ritualist
      text: 听见陆怀山的名字，他叹了一口气。巡守若也愿担这份风险，档房就不该只压在祠堂门内。
      replies:
        - id: reply_confirm_unlock_by_lu
          text: 开门吧，这条线不能断在这里。
          nextNodeId: node_unlock_confirm
    - id: node_unlock_confirm
      speaker: npc_old_ritualist
      text: 木锁被打开时声音很轻，却像惊动了整间祠堂。旧纸气从门缝里散出来，火案的影子终于有了可查的地方。
      replies:
        - id: reply_confirm_unlock_records
          text: 我会看清楚，也会担住后果。
          effects:
            - type: change_location_state
              locationId: loc_ancestral_hall
              path: record_locked
              value: false
            - type: change_building_state
              buildingId: building_record_room
              path: locked
              value: false
            - type: add_fact
              key: record_room_unlocked
              value: true
            - type: trigger_event
              eventId: event_record_room_unlocked
          endConversation: true
- id: conversation_old_ritualist_daily_05
  npcId: npc_old_ritualist
  title: 冷糕与归处
  entryNodeId: node_entry
  priority: 56
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 祭桌撤下几块冷糕，他掰了一小块递给门口的孩子。 他低声说祠堂不只藏旧事，也要让活人觉得还有归处。
      replies:
        - id: reply_as_merchant
          text: 归处若要靠粮和香火维持，我可以帮忙调度。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 我守门，别让求安的人被驱散。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 老人孩子来上香时，也能顺便看一眼病色。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_old_ritualist
      text: 调度可以，别把祠堂变成买卖场。人来这里，是因为外头太乱。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_merchant_close
          text: 我记下了，人情要还，风险也要算。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_05_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 守门时刀收一点。祠堂门口的安稳，不靠吓出来。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_05_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 阁下若肯看，我给你留个小凳。许多人嘴上求平安，身上其实已经病了。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢挖。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_05_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 2
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_old_ritualist_daily_05_completed
        not_equals: true
- id: conversation_old_ritualist_daily_06
  npcId: npc_old_ritualist
  title: 清晨香灰
  entryNodeId: node_entry
  priority: 55
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 祠堂一早就不得安生，香灰落进炉里的细响。 周敬一边拂去牌位前的香灰，一边示意阁下有话便快些讲。
      replies:
        - id: reply_as_merchant
          text: 且先问今日的买卖和路上动静。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 且问这里最需要防的是什么。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 且先问可有人身体不适。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_old_ritualist
      text: 买卖看着是买卖，背后全是人心。今日最该留意的，是镇民在集市上越传越歪的旧事。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_merchant_close
          text: 我记下了，人情要还，风险也要算。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_06_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 要防的不只刀，还有慌。旧档一开后的众怒一旦成真，谁都别想安稳。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_06_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 有不适的人不少，只是许多人怕花钱，先忍着。阁下若肯看，先从来祠堂求平安的镇民看起。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢挖。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_06_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 2
          - fact: time.segment
            equals: night
      - fact: facts.conversation_old_ritualist_daily_06_completed
        not_equals: true
- id: conversation_old_ritualist_daily_07
  npcId: npc_old_ritualist
  title: 潮气入骨
  entryNodeId: node_entry
  priority: 54
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 祠堂里常年有股阴凉，连一串旧钥匙都像沾了潮气。 周敬说这种天气最容易把小患拖成大祸。
      replies:
        - id: reply_as_merchant
          text: 潮气会否影响货物和储备？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 坏天气会让巡守和防备更难吗？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 受潮后最该防哪类病症？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_old_ritualist
      text: 会。货坏了还能赔，旧档、名册和香火坏了，赔的就是人命和信任。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_merchant_close
          text: 我记下了，人情要还，风险也要算。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_07_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 难。风雨一遮，脚印、火光和人声都会骗人。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_07_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 先防寒热和咳症。别让来祠堂求平安的镇民在风口等太久。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢挖。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_07_completed
              value: true
  conditions:
    all:
      - all:
