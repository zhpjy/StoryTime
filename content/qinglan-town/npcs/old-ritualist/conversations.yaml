        not_equals: true
- id: conversation_old_ritualist_daily_42
  npcId: npc_old_ritualist
  title: 小争执长大
  entryNodeId: node_entry
  priority: 19
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 旁边起了一场小争执，很快又被人劝开。 周敬说小争执若没人管，就会学会长大。
