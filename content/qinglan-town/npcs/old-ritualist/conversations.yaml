        not_equals: true
- id: conversation_old_ritualist_daily_44
  npcId: npc_old_ritualist
  title: 不肯认怕
  entryNodeId: node_entry
  priority: 17
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 周敬把话说得平稳，手却在一串旧钥匙旁停住。 周敬说镇里很多人怕，却不愿承认自己怕。
