            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_old_ritualist
      text: 理由有真有假。看他们绕开什么，比看他们搬什么更有用。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_merchant_close
          text: 我记下了，人情要还，风险也要算。
          endConversation: true
