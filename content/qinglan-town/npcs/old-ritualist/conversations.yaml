          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_30_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 会。所以救病不能只靠药铺，也得靠米袋。 话到这里就够了，剩下的，出了门自会见分晓。
