      - all:
          - fact: time.day
            greater_than_or_equal: 3
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_old_ritualist_daily_08_completed
        not_equals: true
- id: conversation_old_ritualist_daily_09
  npcId: npc_old_ritualist
  title: 门前风声
  entryNodeId: node_entry
  priority: 52
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 来祠堂求平安的镇民在不远处压低声音，说到阁下来时又散开。 周敬说镇上闲话跑得比马还快。
      replies:
