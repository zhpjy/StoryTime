          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_13_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 写了几句，远远不够。真正照顾人的，是谁肯把门打开。 话到这里就够了，剩下的，出了门自会见分晓。
