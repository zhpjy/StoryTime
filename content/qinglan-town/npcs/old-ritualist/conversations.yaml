          - fact: time.day
            greater_than_or_equal: 6
          - fact: time.segment
            equals: night
      - fact: facts.conversation_old_ritualist_daily_18_completed
        not_equals: true
- id: conversation_old_ritualist_daily_19
  npcId: npc_old_ritualist
  title: 不显眼的小忙
  entryNodeId: node_entry
  priority: 42
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 把旧钥匙串拢进袖中的空当，周敬顺路把旁边的东西摆正。 周敬问你愿不愿意帮一个不显眼的小忙。
      replies:
        - id: reply_as_merchant
          text: 小忙也要讲清要送到谁手里。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 小忙若有风险，我先走前面。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 小忙若关系病人，我现在就去。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_old_ritualist
      text: 送给来上香的老人，别让太多人看见。不是见不得光，是怕被传歪。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_merchant_close
          text: 我记下了，人情要还，风险也要算。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_19_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 不用拔刀，帮我看住后路就行。有时候不让人挤上来，比冲出去更难。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_19_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 关系不大，却能省一条腿脚。病人那边，少等一刻都是好事。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢挖。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_19_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 7
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_old_ritualist_daily_19_completed
        not_equals: true
- id: conversation_old_ritualist_daily_20
  npcId: npc_old_ritualist
  title: 看脸胜听话
  entryNodeId: node_entry
  priority: 41
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 来祠堂求平安的镇民从旁边经过，脸色各不相同。 周敬说最近看人脸，比听人话更准。
      replies:
        - id: reply_as_merchant
          text: 看脸色能看出谁要囤货？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 看脸色能看出谁要闹事？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 看脸色能看出谁在硬撑。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_old_ritualist
      text: 能。眼睛总往旧档、名册和香火上飘的人，多半心里已经起了算盘。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_merchant_close
          text: 我记下了，人情要还，风险也要算。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_20_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 能。真正要闹的人常不喊，喊得最大声的反而等别人先动。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_20_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 能。硬撑的人最怕被叫住，阁下若温和些，他们才肯承认。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢挖。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_20_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 7
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_old_ritualist_daily_20_completed
        not_equals: true
- id: conversation_old_ritualist_daily_21
  npcId: npc_old_ritualist
  title: 咳声惊人
  entryNodeId: node_entry
  priority: 40
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 远处传来一阵咳声，几个人下意识退开半步。 周敬皱了皱眉，道怕病也怕被病名吓坏。
      replies:
        - id: reply_as_merchant
          text: 若恐慌传开，买卖会先崩。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 恐慌会让人不听号令。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 退开不是办法，要分症状。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_old_ritualist
      text: 买卖崩了，粮药也会断。阁下若能道服人别乱传，等于保住半条路。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_merchant_close
          text: 我记下了，人情要还，风险也要算。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_21_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 对。怕到极处，人会把救他的人也当敌人。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_21_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 分得清，心就稳一半。阁下来说，他们比听我道更容易信。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢挖。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_21_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 7
          - fact: time.segment
            equals: night
      - fact: facts.conversation_old_ritualist_daily_21_completed
        not_equals: true
- id: conversation_old_ritualist_daily_22
  npcId: npc_old_ritualist
  title: 旧器缺口
  entryNodeId: node_entry
  priority: 39
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 一串旧钥匙边缘有一道旧缺口，像用久了也舍不得换。 周敬说镇上许多东西都是这样，破了还得用。
      replies:
        - id: reply_as_merchant
          text: 旧器物能撑，旧规矩未必能撑。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 破口不补，迟早伤手。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 旧伤不看，也会反复疼。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_old_ritualist
      text: 你们外来人看得快，本地人舍不得。舍不得有时是情分，有时是祸端。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_merchant_close
          text: 我记下了，人情要还，风险也要算。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_22_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 补也要看谁来补。手太重，器物没补好，先碎了。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_22_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 疼久了，人会把疼当成日常。镇子也是。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢挖。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_22_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 8
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_old_ritualist_daily_22_completed
        not_equals: true
- id: conversation_old_ritualist_daily_23
  npcId: npc_old_ritualist
  title: 谎从何来
  entryNodeId: node_entry
  priority: 38
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 一句传闻被重复了三遍，每次都多一个细节。 周敬说谎话不怕新，怕的是有人故意让它像真话。
      replies:
        - id: reply_as_merchant
          text: 假消息会害车队，我要辨源头。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 撒谎的人往往躲在后面。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 假病因会害死人。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_old_ritualist
      text: 源头常常不在说得最大声的人那里，而在第一个问“你听说了吗”的人那里。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_merchant_close
          text: 我记下了，人情要还，风险也要算。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_23_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 躲在后面，也会留下目的。看谎话想把人赶向哪里。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_23_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 是。病因一错，药越勤，错得越深。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢挖。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_23_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 8
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_old_ritualist_daily_23_completed
        not_equals: true
- id: conversation_old_ritualist_daily_24
  npcId: npc_old_ritualist
  title: 信谁半分
  entryNodeId: node_entry
  priority: 37
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 周敬看了看周围，像是在衡量哪句话能放出来。 周敬说现在不是没人道话，是没人敢担保谁可信。
      replies:
        - id: reply_as_merchant
          text: 信任也要有抵押，谁的抵押最实？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 漂亮话不算数，得看他连着几日做什么。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
