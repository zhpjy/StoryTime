            - type: add_fact
              key: conversation_old_ritualist_daily_41_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 人心堵住，病也好得慢。你们医者最该懂。 话到这里就够了，剩下的，出了门自会见分晓。
