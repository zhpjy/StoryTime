          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_25_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 安置得不够。挤在一起，再小的病也会被放大。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
