              key: conversation_old_ritualist_daily_31_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 求药的人怕欠账，也怕被人道染病。阁下若拦，记得先问急不急。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
