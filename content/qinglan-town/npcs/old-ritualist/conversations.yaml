        not_equals: true
- id: conversation_old_ritualist_daily_45
  npcId: npc_old_ritualist
  title: 补线三色
  entryNodeId: node_entry
  priority: 16
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 有人袖口补了三种颜色的线，看上去有些狼狈。 周敬说日子破了，人就学会把不合适的布缝在一起。
