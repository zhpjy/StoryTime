              key: conversation_old_ritualist_daily_33_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 对。许多药不是没有方子，是没人有热水慢慢服。 话到这里就够了，剩下的，出了门自会见分晓。
