        not_equals: true
- id: conversation_old_ritualist_daily_29
  npcId: npc_old_ritualist
  title: 新泥补墙
  entryNodeId: node_entry
  priority: 32
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 不远处的墙根有一块新补的泥，颜色还没干透。 周敬说墙会破，规矩也会破。
