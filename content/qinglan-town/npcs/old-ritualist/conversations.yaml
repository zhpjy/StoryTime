              key: conversation_old_ritualist_daily_12_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 拔刀的人未必最恨，最怕的人才会先动手。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_12_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 有牵连。至少老人随身带的清凉油和火案后有人半夜来取证词都绕不开它。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢挖。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_12_completed
              value: true
  conditions:
