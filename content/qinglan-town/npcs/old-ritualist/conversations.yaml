          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_11_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 最像陷阱的是人人都道安全的那段。太安静了。 话到这里就够了，剩下的，出了门自会见分晓。
