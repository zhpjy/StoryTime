- id: conversation_old_ritualist_daily_25
  npcId: npc_old_ritualist
  title: 镇外影子
  entryNodeId: node_entry
  priority: 36
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 有人提到镇外，周围立刻静了一瞬。 周敬说镇外不是远方，是随时会推门进来的事。
      replies:
