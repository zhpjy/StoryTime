        not_equals: true
- id: conversation_old_ritualist_daily_30
  npcId: npc_old_ritualist
  title: 价声如争命
  entryNodeId: node_entry
  priority: 31
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 镇民在集市上越传越歪的旧事的话头又被人翻出来，声音越来越尖。 周敬说讨价还价本是日常，如今却像吵命。
