            greater_than_or_equal: 4
          - fact: time.segment
            equals: night
      - fact: facts.conversation_old_ritualist_daily_12_completed
        not_equals: true
- id: conversation_old_ritualist_daily_13
  npcId: npc_old_ritualist
  title: 告示背后
  entryNodeId: node_entry
  priority: 48
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 不远处有人念着新贴的告示，念到一半就笑不出来了。 周敬说告示写得齐整，日子却不照字走。
