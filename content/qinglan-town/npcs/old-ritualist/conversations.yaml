- id: conversation_old_ritualist_daily_35
  npcId: npc_old_ritualist
  title: 坏消息进门
  entryNodeId: node_entry
  priority: 26
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 坏消息像排队一样，一个接一个进门。 周敬说最怕的不是坏消息，是大家不知道先处理哪个。
