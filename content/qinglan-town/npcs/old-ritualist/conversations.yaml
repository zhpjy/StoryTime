- id: conversation_old_ritualist_daily_08
  npcId: npc_old_ritualist
  title: 一口饭的轻重
  entryNodeId: node_entry
  priority: 53
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 祭后分给孩子的冷糕摆在旁边，热气很快散了。 周敬看了一眼饭食，道如今吃饭也像在做选择。
      replies:
        - id: reply_as_merchant
          text: 粮价这样下去，小户人家还能撑几天？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 饿急的人会先冲哪里？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 吃不饱会让病势更糟。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_old_ritualist
      text: 撑几天要看米价，也看谁愿意先分一点出来。香火簿和旧族册比官样告示更管用。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_merchant_close
          text: 我记下了，人情要还，风险也要算。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_08_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 先冲看得见粮食的地方，再冲他们觉得没人护的地方。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_08_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 对。药能压病，饭才托命。没有祭后分给孩子的冷糕，药下去也虚。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢挖。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_08_completed
              value: true
  conditions:
