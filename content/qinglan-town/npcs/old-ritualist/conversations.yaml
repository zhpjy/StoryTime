    - id: node_warrior
      speaker: npc_old_ritualist
      text: 守通往档房的小廊，也守人心最松的后门。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_14_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 会。夜里一句“明早再道”，有时就等不到明早。 话到这里就够了，剩下的，出了门自会见分晓。
