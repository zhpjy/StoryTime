              key: conversation_old_ritualist_daily_25_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 进来了。不是人人拿刀才叫威胁，有人带的是恐慌和口信。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
