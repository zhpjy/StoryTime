      replies:
        - id: reply_merchant_close
          text: 我记下了，人情要还，风险也要算。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_43_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 这句能救命。太安静的路，总有人先替你清过声音。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_43_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 朴素，却管用。许多人死在不肯早看。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢挖。
          endConversation: true
