    - id: node_entry
      speaker: npc_old_ritualist
      text: 周敬提到一个旧名字，又很快把话收住。 那名字像一根刺，没人愿意碰得太深。
      replies:
        - id: reply_as_merchant
          text: 名字若能对上旧账，就不该含糊。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 名字若指向活人，我得知道凶险。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 旧名字也可能是病根线头。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_old_ritualist
      text: 阁下要对账，就别只问名字，还要问他最后被谁看见。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_merchant_close
          text: 我记下了，人情要还，风险也要算。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_16_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 凶险在问出口后。许多人怕的不是名字，是有人还记得。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_16_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 有时一个名字比一味药难找，但找到后，方子才完整。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢挖。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_16_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 6
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_old_ritualist_daily_16_completed
        not_equals: true
- id: conversation_old_ritualist_daily_17
  npcId: npc_old_ritualist
  title: 水桶微光
  entryNodeId: node_entry
  priority: 44
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 有人拎着水桶经过，桶沿晃出一圈水光。 周敬说水看着清，不代表来路清。
      replies:
        - id: reply_as_merchant
          text: 水源若出问题，铺面和货队都会停。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 谁能靠近水源而不被盘问？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 水源须得查，病常从这里起。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_old_ritualist
      text: 一停就不是一家铺子的事。阁下若查水，先查谁最近改了取水点。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_merchant_close
          text: 我记下了，人情要还，风险也要算。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_17_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 挑水人、送货人、巡夜人，都能靠近。最不起眼的最难查。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_17_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 你说到要处了。病若沿水走，药铺再忙也只是追着尾巴跑。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢挖。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_17_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 6
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_old_ritualist_daily_17_completed
        not_equals: true
- id: conversation_old_ritualist_daily_18
  npcId: npc_old_ritualist
  title: 灯油将尽
  entryNodeId: node_entry
  priority: 43
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 一盏灯的油快见底，火苗缩成豆大一点。 周敬说灯一暗，人就容易做错事。
      replies:
        - id: reply_as_merchant
          text: 灯油可以调，先告诉我哪里最缺。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 黑处最适合藏刀。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 病人夜里也需要灯。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_old_ritualist
      text: 最缺的不是灯油，是愿意把灯点在别人门口的人。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_merchant_close
          text: 我记下了，人情要还，风险也要算。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_18_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 藏刀也藏眼泪。夜里生变，天亮后人人都道没看见。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_18_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 是。没灯，连药量都容易看错，更别说分辨脸色。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢挖。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_18_completed
              value: true
  conditions:
