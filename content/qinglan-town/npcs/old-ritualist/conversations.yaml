- id: conversation_old_ritualist_daily_12
  npcId: npc_old_ritualist
  title: 旧庙旧火
  entryNodeId: node_entry
  priority: 49
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 藏在牌位后的旧案名册这个话头一出来，周敬的手慢了一拍。 周敬说旧庙的事，镇里不是没人知道，是没人愿意道全。
