            - type: add_fact
              key: conversation_old_ritualist_daily_46_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 先让咳得厉害的人避开。查案也要给活人让路。 话到这里就够了，剩下的，出了门自会见分晓。
