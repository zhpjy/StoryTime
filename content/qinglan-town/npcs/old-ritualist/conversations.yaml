          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_41_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 守门不只是挡人，也是不让怕事的人随手上锁。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
