- id: conversation_old_ritualist_daily_27
  npcId: npc_old_ritualist
  title: 未寄之信
  entryNodeId: node_entry
  priority: 34
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 一串旧钥匙旁压着一张折好的纸，纸角已经起毛。 周敬说有些信写好了，却不知道还能不能送到。
