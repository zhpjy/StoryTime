        not_equals: true
- id: conversation_old_ritualist_daily_26
  npcId: npc_old_ritualist
  title: 午后困局
  entryNodeId: node_entry
  priority: 35
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 日头偏过去，周敬的动作慢了一点。 周敬说人累的时候最容易答应不该答应的事。
      replies:
