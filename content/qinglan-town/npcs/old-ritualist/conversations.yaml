  npcId: npc_old_ritualist
  title: 粗碗热气
  entryNodeId: node_entry
  priority: 28
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 热水被倒进粗碗里，碗沿冒着白气。 周敬说热水不值钱，可乱起来时，连热水都难得。
