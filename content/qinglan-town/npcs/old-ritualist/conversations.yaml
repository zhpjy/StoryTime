    - id: node_warrior
      speaker: npc_old_ritualist
      text: 凶险来自想知道别人说了什么的人。如今一句家常，也可能被当成证词。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_27_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 关系家属，也关系人心。人若不知道亲人死活，会先在心里病起来。 话到这里就够了，剩下的，出了门自会见分晓。
