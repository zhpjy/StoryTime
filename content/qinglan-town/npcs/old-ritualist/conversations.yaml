    - id: node_warrior
      speaker: npc_old_ritualist
      text: 露空时最怕有人正等着。阁下若能替人歇一刻，就能补一个缺口。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_26_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 你说得对。许多人不是病倒，是熬倒。 话到这里就够了，剩下的，出了门自会见分晓。
