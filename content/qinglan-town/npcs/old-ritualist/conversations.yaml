              key: conversation_old_ritualist_daily_42_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 压住不是吼住，是让双方都有台阶。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_42_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 慌会传，比病还快。阁下若能安一句，就是帮忙。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
