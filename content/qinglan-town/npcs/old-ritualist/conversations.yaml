        not_equals: true
- id: conversation_old_ritualist_daily_28
  npcId: npc_old_ritualist
  title: 孩子的直问
  entryNodeId: node_entry
  priority: 33
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 有个孩子在旁边问了一句大人都不敢问的话。 周敬沉默片刻，道孩子常常比大人诚实。
