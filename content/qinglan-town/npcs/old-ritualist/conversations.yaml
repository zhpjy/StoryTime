          - fact: time.day
            greater_than_or_equal: 4
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_old_ritualist_daily_10_completed
        not_equals: true
- id: conversation_old_ritualist_daily_11
  npcId: npc_old_ritualist
  title: 山路风声
  entryNodeId: node_entry
  priority: 50
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 外头有人提到通往档房的小廊，声音立刻低了下去。 周敬说山路从来不只运货，也运消息。
      replies:
