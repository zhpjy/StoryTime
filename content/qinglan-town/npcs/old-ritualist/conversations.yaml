        not_equals: true
- id: conversation_old_ritualist_daily_47
  npcId: npc_old_ritualist
  title: 作证如押命
  entryNodeId: node_entry
  priority: 14
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 话说到证人时，空气像被按住。 周敬说作证不是道一句话，是把往后日子押上去。
