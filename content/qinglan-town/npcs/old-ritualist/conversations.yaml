          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_44_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 藏病最祸端。藏到后来，不止害自己。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_doctor_close
