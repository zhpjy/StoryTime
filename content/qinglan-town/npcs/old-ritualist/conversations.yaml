            - type: add_fact
              key: conversation_old_ritualist_daily_44_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 先下手的人常道自己是自保。阁下要看他保的到底是什么。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
