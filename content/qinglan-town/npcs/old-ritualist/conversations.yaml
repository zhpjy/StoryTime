        not_equals: true
- id: conversation_old_ritualist_daily_46
  npcId: npc_old_ritualist
  title: 湿柴新烟
  entryNodeId: node_entry
  priority: 15
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 远处有人烧湿柴，烟味忽然重了起来。 周敬说烟味最会骗人，像旧火又像新火。
