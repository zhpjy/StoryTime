  title: 闭口的线头
  entryNodeId: node_entry
  priority: 25
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 有人一听藏在牌位后的旧案名册就换了话头，换得太快。 周敬说避得太急，本身就是线头。
