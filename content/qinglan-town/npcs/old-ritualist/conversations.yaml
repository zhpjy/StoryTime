          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_35_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 这就是救治的顺序。镇子也像一个病人。 话到这里就够了，剩下的，出了门自会见分晓。
