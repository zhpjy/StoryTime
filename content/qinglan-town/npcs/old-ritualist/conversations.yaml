    - id: node_warrior
      speaker: npc_old_ritualist
      text: 看风向。烟往哪边去，人多半也往哪边藏。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
