          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_47_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 护住不是站在他旁边亮刀，也包括让他家里有饭。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_47_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 是。吓坏的人道不清话，先让他能睡一觉。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_doctor_close
