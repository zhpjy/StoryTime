        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_11_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 会。水、草药、货布，都可能把病带进镇。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
