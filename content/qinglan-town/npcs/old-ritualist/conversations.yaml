        not_equals: true
- id: conversation_old_ritualist_daily_10
  npcId: npc_old_ritualist
  title: 账上人情
  entryNodeId: node_entry
  priority: 51
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 香火簿和旧族册被压在手边，纸页边缘已经卷起。 周敬说账本记得清，人情却总算不明白。
      replies:
        - id: reply_as_merchant
