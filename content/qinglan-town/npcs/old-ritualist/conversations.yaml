            - type: add_fact
              key: conversation_old_ritualist_daily_33_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 是。别小看送水，夜里拎桶的人最容易被误伤。 话到这里就够了，剩下的，出了门自会见分晓。
