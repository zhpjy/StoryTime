    - id: node_merchant
      speaker: npc_old_ritualist
      text: 最怕不是欠得多，是欠得久。旧账一翻，谁都道自己有理。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_merchant_close
          text: 我记下了，人情要还，风险也要算。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_10_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 会。人情变仇，只差一句“你当年也欠我”。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_10_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 会。有人宁可忍病，也不愿再添一笔欠情。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢挖。
