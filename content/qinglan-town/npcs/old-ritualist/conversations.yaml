        not_equals: true
- id: conversation_old_ritualist_daily_43
  npcId: npc_old_ritualist
  title: 给远方留话
  entryNodeId: node_entry
  priority: 18
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 周敬忽然问你，若能给远方的人留句话，你会写什么。 这个问题来得突兀，却不像玩笑。
      replies:
