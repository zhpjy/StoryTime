  npcId: npc_old_ritualist
  title: 夜半细响
  entryNodeId: node_entry
  priority: 47
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 香灰落进炉里的细响之外，夜里还有几声道不清的动静。 周敬说最近没人睡得太沉。
