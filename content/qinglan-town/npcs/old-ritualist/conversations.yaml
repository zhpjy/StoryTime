              key: conversation_old_ritualist_daily_29_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 先挡风，再问责。人病着的时候，风比道理快。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
