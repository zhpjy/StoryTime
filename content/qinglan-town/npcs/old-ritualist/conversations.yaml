- id: conversation_old_ritualist_daily_41
  npcId: npc_old_ritualist
  title: 两道门
  entryNodeId: node_entry
  priority: 20
  nodes:
    - id: node_entry
      speaker: npc_old_ritualist
      text: 话题从镇门绕到祠堂，像绕不开两道门。 周敬说一道门管活人进出，一道门管旧事出入。
      replies:
