            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_old_ritualist
      text: 真货常藏在夸张里。阁下别听他们怎么骂，听他们反复提到什么。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_merchant_close
          text: 我记下了，人情要还，风险也要算。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_09_completed
              value: true
    - id: node_warrior
      speaker: npc_old_ritualist
      text: 会。人一怕，就要找个能看见的人出气。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_warrior_close
          text: 明白。人稳住了，路才稳得住。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_09_completed
              value: true
    - id: node_doctor
      speaker: npc_old_ritualist
      text: 已经有了。有人把病道成报应，这比发热还难治。 话到这里就够了，剩下的，出了门自会见分晓。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢挖。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_old_ritualist_daily_09_completed
