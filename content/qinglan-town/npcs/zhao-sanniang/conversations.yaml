        not_equals: true
- id: conversation_zhao_sanniang_daily_10
  npcId: npc_zhao_sanniang
  title: 账薄情重
  entryNodeId: node_entry
  priority: 51
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 酒账同人情账被压在手边，纸页边缘已经卷起。赵三娘说账本记得清，人情却总算不明白。
      replies:
        - id: reply_as_merchant
          text: 账清才不会乱，你最怕哪笔账爆出来？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 人情账要是逼到头，会不会变成仇？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 欠账的人会不会因此拖着不求助？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 最怕不是欠得多，是欠得久。旧账一翻，谁都说自己有理。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_10_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 会。人情变仇，只差一句“你当年也欠我”。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_10_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 会。有人宁可忍病，也不愿再添一笔欠情。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
