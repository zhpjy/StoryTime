      - all:
          - fact: time.day
            greater_than_or_equal: 12
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_zhao_sanniang_daily_34_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_35
  npcId: npc_zhao_sanniang
  title: 坏信有序
  entryNodeId: node_entry
  priority: 26
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 坏消息像排队一样，一个接一个进门。赵三娘说最怕的不是坏消息，是大家不知道先处理哪个。
      replies:
        - id: reply_as_merchant
          text: 先保路、粮、药三个节点。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 先保人，再保门，再保物。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 先救急症，再控传染，再安人心。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 你的顺序能听。路断则粮药断，粮药断则人心断。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_35_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 人保住，门和物才有意义。别反过来。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_35_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 这就是救治的顺序。镇子也像一个病人。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_35_completed
              value: true
  conditions:
