          - fact: time.day
            greater_than_or_equal: 12
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_zhao_sanniang_daily_35_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_36
  npcId: npc_zhao_sanniang
  title: 避口成线
  entryNodeId: node_entry
  priority: 25
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 有人一听旧案后在后堂躲过一夜的人就换了话头，换得太快。赵三娘说避得太急，本身就是线头。
      replies:
        - id: reply_as_merchant
          text: 避谈的人可能怕旧账影响生意。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 避谈的人可能清楚凶险在哪。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 避谈的人可能见过病根。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 生意、名声、亲人，都可能让人闭嘴。你要分清是哪一种。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_36_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 清楚凶险的人未必坏，有时只是活得太久，怕了。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_36_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 见过病根的人最怕再闻见同样气味。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_36_completed
              value: true
