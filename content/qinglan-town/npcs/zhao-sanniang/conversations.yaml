          - fact: time.segment
            equals: noon
      - fact: facts.conversation_zhao_sanniang_daily_11_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_12
  npcId: npc_zhao_sanniang
  title: 旧庙余烬
  entryNodeId: node_entry
  priority: 49
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 旧案后在后堂躲过一夜的人这个话头一出来，赵三娘的手慢了一拍。赵三娘说旧庙的事，镇里不是没人知道，是没人愿意说全。
      replies:
        - id: reply_as_merchant
          text: 旧庙牵着哪条旧账？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 谁会为了旧庙动刀？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 旧庙和病、药有没有牵连？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 牵着命账，也牵着名声账。两种账都比银钱难讨。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_12_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 拔刀的人未必最恨，最怕的人才会先动手。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_12_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 有牵连。至少酒里泡的跌打药和年轻时多嘴害人的一夜都绕不开它。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_12_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 4
          - fact: time.segment
            equals: night
      - fact: facts.conversation_zhao_sanniang_daily_12_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_13
  npcId: npc_zhao_sanniang
  title: 纸上安民
  entryNodeId: node_entry
  priority: 48
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 邻桌有人念着新贴的告示，念到一半就笑不出来了。赵三娘说告示写得齐整，日子却不照字走。
      replies:
        - id: reply_as_merchant
          text: 告示会影响交易和价格吗？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 告示能让人守规矩吗？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 告示有没有安排病人和弱者？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 会影响一阵。可要是消息、酒坛和后堂那扇门跟不上，纸上的价就只是纸。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_13_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 能让想守规矩的人有个台阶，拦不住已经急红眼的人。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_13_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 写了几句，远远不够。真正照顾人的，是谁肯把门打开。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_13_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 5
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_zhao_sanniang_daily_13_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_14
  npcId: npc_zhao_sanniang
  title: 夜声难辨
  entryNodeId: node_entry
  priority: 47
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 前堂骰子落碗的脆声之外，夜里还有几声说不清的动静。赵三娘说最近没人睡得太沉。
      replies:
        - id: reply_as_merchant
          text: 夜里有没有异常车马或陌生人？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 夜里哪个方向最该有人守？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 夜里病人会不会无人照应？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 有。不是每辆车都会报号，也不是每个脚印都往门里走。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_14_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 守酒肆后巷，也守人心最松的后门。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_14_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 会。夜里一句“明早再说”，有时就等不到明早。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_14_completed
              value: true
  conditions:
    all:
