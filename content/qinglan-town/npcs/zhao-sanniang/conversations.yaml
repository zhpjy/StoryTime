            greater_than_or_equal: 12
          - fact: time.segment
            equals: night
      - fact: facts.conversation_zhao_sanniang_daily_36_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_37
  npcId: npc_zhao_sanniang
  title: 帮忙添乱
  entryNodeId: node_entry
  priority: 24
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 赵三娘看着你，像是在判断你这次会伸手还是伸脚绊人。赵三娘说帮忙二字，说起来容易，做歪了就是添乱。
      replies:
        - id: reply_as_merchant
          text: 我先问需要什么，再动资源。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 我先听安排，再动手。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 我先看症状，再开方。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 这样才像能做事的人。别把自己的好心摆在别人的急处前面。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_37_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 能听安排的武人，比只会冲的强。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_37_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 看症状再开方，这道理要是人人都懂，镇里少一半乱事。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_37_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 13
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_zhao_sanniang_daily_37_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_38
  npcId: npc_zhao_sanniang
  title: 旧物记事
  entryNodeId: node_entry
  priority: 23
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 柜台下那副算盘被赵三娘拿起又放下，像一段话没说出口。赵三娘说旧物留得久了，就会替人记事。
      replies:
        - id: reply_as_merchant
          text: 旧物要是能作凭证，就别让它丢了。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 旧物要是会惹祸，就该有人护着。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 旧物上的痕迹有时能说明伤从何来。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 凭证也要看交给谁。交错了，凭证就是把柄。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_38_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 护东西不难，难的是护住拿着它的人。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_38_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 你看得细。火痕、药味、血渍，旧物都可能记得。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_38_completed
              value: true
