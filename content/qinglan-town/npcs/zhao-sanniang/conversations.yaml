            greater_than_or_equal: 11
          - fact: time.segment
            equals: night
      - fact: facts.conversation_zhao_sanniang_daily_33_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_34
  npcId: npc_zhao_sanniang
  title: 让步难先
  entryNodeId: node_entry
  priority: 27
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 赵三娘看着两拨人互不相让，叹了口气。赵三娘说谁都觉得自己让一步就会被吞掉。
      replies:
        - id: reply_as_merchant
          text: 让步要换确定的回报，不可空让。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 有时要有人站中间，双方才退得下去。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 病人面前不该争谁更委屈。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 回报可以不是钱，是明日还愿意坐下来谈。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_34_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 站中间的人最容易挨骂。可没人站，事就会往刀上走。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_34_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 这话该让他们都听听。咳声不会等他们吵完。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_34_completed
              value: true
  conditions:
