        not_equals: true
- id: conversation_zhao_sanniang_daily_09
  npcId: npc_zhao_sanniang
  title: 门前飞语
  entryNodeId: node_entry
  priority: 52
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 前堂那些压嗓子的客人在邻桌压低声音，说到你来时又散开。赵三娘说镇上闲话跑得比马还快。
      replies:
        - id: reply_as_merchant
          text: 闲话里有没有能当线头的真货？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 闲话会不会引出冲突？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 闲话会让病人不敢就医。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 真货常藏在夸张里。你别听他们怎么骂，听他们反复提到什么。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_09_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 会。人一怕，就要找个能看见的人出气。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_09_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 已经有了。有人把病说成报应，这比发热还难治。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_09_completed
              value: true
