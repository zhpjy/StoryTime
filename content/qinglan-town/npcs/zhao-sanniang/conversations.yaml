  title: 两道门
  entryNodeId: node_entry
  priority: 20
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 话题从镇门绕到祠堂，像绕不开两道门。赵三娘说一道门管活人进出，一道门管旧事出入。
      replies:
        - id: reply_as_merchant
          text: 两道门都影响路。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 两道门都需要有人守。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 两道门都关系人心。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 路不只在地上，也在大家愿不愿意相信彼此。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_41_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 守门不只是挡人，也是不让怕事的人随手上锁。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_41_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 人心堵住，病也好得慢。你们医者最该懂。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_41_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 14
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_zhao_sanniang_daily_41_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_42
  npcId: npc_zhao_sanniang
  title: 小争执
  entryNodeId: node_entry
  priority: 19
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 旁边起了一场小争执，很快又被人劝开。赵三娘说小争执要是没人管，就会学会长大。
      replies:
        - id: reply_as_merchant
          text: 争执多半因为分配不明。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 争执刚起时最好压住。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 争执会让病人更慌。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 分配明白，人就算不满，也知道该找谁说。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_42_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 压住不是吼住，是让双方都有台阶。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_42_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 慌会传，比病还快。你要是能安一句，就是帮忙。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_42_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 14
          - fact: time.segment
            equals: night
      - fact: facts.conversation_zhao_sanniang_daily_42_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_43
  npcId: npc_zhao_sanniang
  title: 寄语远人
  entryNodeId: node_entry
  priority: 18
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 赵三娘忽然问你，要是能给远方的人留句话，你会写什么。 这个问题来得突兀，却不像玩笑。
      replies:
        - id: reply_as_merchant
          text: 我会写路况和价钱，也写人是否平安。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 我会写别轻信太安静的路。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 我会写水要烧开，病要早看。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 平安这两个字，比价钱更难写真。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_43_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 这句能救命。太安静的路，总有人先替你清过声音。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_43_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 朴素，却管用。许多人死在不肯早看。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_43_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 15
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_zhao_sanniang_daily_43_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_44
  npcId: npc_zhao_sanniang
  title: 怕字难认
  entryNodeId: node_entry
  priority: 17
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 赵三娘把话说得平稳，手却在柜台下那副算盘旁停住。赵三娘说镇里很多人怕，却不愿承认自己怕。
      replies:
        - id: reply_as_merchant
          text: 害怕会推高价钱。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 害怕会让人先下手。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 害怕会让人藏病。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 价钱只是表面。真正涨的是彼此的防备。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_44_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 先下手的人常说自己是自保。你要看他保的到底是什么。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_44_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 藏病最祸端。藏到后来，不止害自己。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_44_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 15
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_zhao_sanniang_daily_44_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_45
  npcId: npc_zhao_sanniang
  title: 补衣留线
  entryNodeId: node_entry
  priority: 16
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 有人袖口补了三种颜色的线，看上去有些狼狈。赵三娘说日子破了，人就学会把不合适的布缝在一起。
      replies:
        - id: reply_as_merchant
          text: 修补总比全丢了强。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 补过的地方也是弱点。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 补得好，伤口也能长上。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 强是强，可补线也要结实。只图看着完整，扯一下就开。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_45_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 弱点不是罪，装作没弱点才凶险。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_45_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 长上以后还会留疤。留疤不丢人，怕的是反复撕开。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_45_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 15
          - fact: time.segment
            equals: night
      - fact: facts.conversation_zhao_sanniang_daily_45_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_46
  npcId: npc_zhao_sanniang
  title: 湿柴新烟
  entryNodeId: node_entry
  priority: 15
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 远处有人烧湿柴，烟味忽然重了起来。赵三娘说烟味最会骗人，像旧火又像新火。
      replies:
        - id: reply_as_merchant
          text: 旧火要是变成新烟，说明有人在翻旧账。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 烟能遮眼，也能暴露位置。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 烟会让咳症更重。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 有人翻旧账，也有人想让你以为是旧账自己烧起来。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_46_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 看风向。烟往哪边去，人多半也往哪边藏。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_46_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 先让咳得厉害的人避开。查案也要给活人让路。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_46_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 16
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_zhao_sanniang_daily_46_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_47
  npcId: npc_zhao_sanniang
  title: 作证押身
  entryNodeId: node_entry
  priority: 14
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 话说到证人时，空气像被按住。赵三娘说作证不是说一句话，是把往后日子押上去。
      replies:
        - id: reply_as_merchant
          text: 证词要能互相印证，不可只靠胆子。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 作证的人需要护住。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 作证的人也会怕，也会病。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 印证越多，单个人背的压力越小。这是正经办法。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_47_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 护住不是站在他旁边亮刀，也包括让他家里有饭。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_47_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 是。吓坏的人说不清话，先让他能睡一觉。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_47_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 16
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_zhao_sanniang_daily_47_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_48
  npcId: npc_zhao_sanniang
  title: 一碗药
  entryNodeId: node_entry
  priority: 13
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 酒里泡的跌打药被端过去，路上有人下意识让了让。赵三娘说一碗药端给谁，也会有人觉得不公平。
      replies:
        - id: reply_as_merchant
          text: 分配标准要提前说清。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 不公平会引出冲突。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 轻重缓急得由病情决定。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 标准说清，怨气少一半。剩下一半，靠人慢慢劝。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_48_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 冲突常从一句“凭什么他先”开始。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_48_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 病情决定，这是底线。要是让关系决定，药就变味了。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_48_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 16
          - fact: time.segment
            equals: night
      - fact: facts.conversation_zhao_sanniang_daily_48_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_49
  npcId: npc_zhao_sanniang
  title: 风里名字
  entryNodeId: node_entry
  priority: 12
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 风声里夹着几个名字，听不真切。赵三娘说名字一旦被风带走，就会变成别人嘴里的刀。
      replies:
        - id: reply_as_merchant
          text: 没核实的名字不可写进账。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 没核实的名字不可当靶子。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 没核实的名字不可当病因。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
