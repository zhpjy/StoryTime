          - fact: time.day
            greater_than_or_equal: 13
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_zhao_sanniang_daily_38_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_39
  npcId: npc_zhao_sanniang
  title: 静处听雷
  entryNodeId: node_entry
  priority: 22
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 周围忽然安静了一小会儿，像镇子终于喘了口气。赵三娘说安静不一定是平安，也可能是大家都在等下一声响。
      replies:
        - id: reply_as_merchant
          text: 安静时最适合安排后路。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 安静时最该查哨。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 安静时最该补睡和熬药。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 后路要在没人看见时安排好，真乱起来就晚了。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_39_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 查哨，也查谁突然不在原处。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_39_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 对，能休息时不休息，下一波来时就只剩硬撑。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_39_completed
              value: true
  conditions:
