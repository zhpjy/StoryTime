            greater_than_or_equal: 13
          - fact: time.segment
            equals: night
      - fact: facts.conversation_zhao_sanniang_daily_39_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_40
  npcId: npc_zhao_sanniang
  title: 借物难还
  entryNodeId: node_entry
  priority: 21
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 有人来借消息、酒坛和后堂那扇门，话说得客气，手却攥得很紧。赵三娘等那人走远，才看向你。
      replies:
        - id: reply_as_merchant
          text: 借和抢之间，只差还不还。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 手攥太紧，多半已经急了。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 借东西要是为救急，可以登记。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 你说得现实。现在每一次借出，都要想好明日怎么要回来。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_40_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 急未必坏，怕的是有人利用他的急。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_40_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 登记能让人觉得公平，也能让后来的人少吵两句。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_40_completed
