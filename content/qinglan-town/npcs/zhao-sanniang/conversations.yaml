          - fact: time.day
            greater_than_or_equal: 5
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_zhao_sanniang_daily_14_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_15
  npcId: npc_zhao_sanniang
  title: 老幼先安
  entryNodeId: node_entry
  priority: 46
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 前堂那些压嗓子的客人里，有人扶着老人，也有人牵着孩子。赵三娘看着他们，说镇子的好坏先落在这些人身上。
      replies:
        - id: reply_as_merchant
          text: 物资要先给谁才不乱？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 护送时先护哪一类人？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 老人孩子要分开照看。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 先给不能等的人，再给能维持秩序的人。别让分配看起来像偏心。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_15_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 先护走不快的。能跑的人还有路，走不动的人只有别人。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_15_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 对。小孩病急，老人病沉，混在一起只会互相拖。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_15_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 5
          - fact: time.segment
            equals: night
      - fact: facts.conversation_zhao_sanniang_daily_15_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_16
  npcId: npc_zhao_sanniang
  title: 旧名如刺
  entryNodeId: node_entry
  priority: 45
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 赵三娘提到一个旧名字，又很快把话收住。 那名字像一根刺，没人愿意碰得太深。
      replies:
        - id: reply_as_merchant
          text: 名字要是能对上旧账，就不该含糊。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 名字要是指向活人，我得清楚凶险。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 旧名字也可能是病根线头。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 你要对账，就别只问名字，还要问他最后被谁看见。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_16_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 凶险在问出口后。许多人怕的不是名字，是有人还记得。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_16_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 有时一个名字比一味药难找，但找到后，方子才完整。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_16_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 6
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_zhao_sanniang_daily_16_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_17
  npcId: npc_zhao_sanniang
  title: 一桶清水
  entryNodeId: node_entry
  priority: 44
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 有人拎着水桶经过，桶沿晃出一圈水光。赵三娘说水看着清，不代表来路清。
      replies:
        - id: reply_as_merchant
          text: 水源要是出问题，铺面和货队都会停。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 谁能靠近水源而不被盘问？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 水源得查，病常从这里起。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 一停就不是一家铺子的事。你要是查水，先查谁最近改了取水点。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_17_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 挑水人、送货人、巡夜人，都能靠近。最不起眼的最难查。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_17_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 你说到要处了。病要是沿水走，药铺再忙也只是追着尾巴跑。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_17_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 6
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_zhao_sanniang_daily_17_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_18
  npcId: npc_zhao_sanniang
  title: 灯油将尽
  entryNodeId: node_entry
  priority: 43
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 一盏灯的油快见底，火苗缩成豆大一点。赵三娘说灯一暗，人就容易做错事。
      replies:
        - id: reply_as_merchant
          text: 我能调灯油，但要知道最缺哪里。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 黑处最适合藏刀。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 病人夜里也需要灯。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 最缺的不是灯油，是愿意把灯点在别人门口的人。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_18_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 藏刀也藏眼泪。夜里生变，天亮后人人都说没看见。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_18_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 是。没灯，连药量都容易看错，更别说分辨脸色。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_18_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 6
          - fact: time.segment
            equals: night
      - fact: facts.conversation_zhao_sanniang_daily_18_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_19
  npcId: npc_zhao_sanniang
  title: 小事不小
  entryNodeId: node_entry
  priority: 42
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 把酒坛封泥按紧的空当，赵三娘顺路把旁边的东西摆正。赵三娘问你愿不愿意帮一个不显眼的小忙。
      replies:
        - id: reply_as_merchant
          text: 小忙也要讲清要送到谁手里。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 小忙要是有风险，我先走前面。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 小忙要是关系病人，我现在就去。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 送给来往商旅和喝闷酒的巡守，别让太多人看见。不是见不得光，是怕被传歪。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_19_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 不用拔刀，帮我看住后路就行。有时候不让人挤上来，比冲出去更难。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_19_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 关系不大，却能省一条腿脚。病人那边，少等一刻都是好事。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_19_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 7
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_zhao_sanniang_daily_19_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_20
  npcId: npc_zhao_sanniang
  title: 看脸听心
  entryNodeId: node_entry
  priority: 41
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 前堂那些压嗓子的客人从旁边经过，脸色各不相同。赵三娘说最近看人脸，比听人话更准。
      replies:
        - id: reply_as_merchant
          text: 看脸色能看出谁要囤货？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 看脸色能看出谁要闹事？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 看脸色能看出谁在硬撑。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 能。眼睛总往消息、酒坛和后堂那扇门上飘的人，多半心里已经起了算盘。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_20_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 能。真正要闹的人常不喊，喊得最大声的反而等别人先动。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_20_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 能。硬撑的人最怕被叫住，你要是温和些，他们才肯承认。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_20_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 7
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_zhao_sanniang_daily_20_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_21
  npcId: npc_zhao_sanniang
  title: 咳声入堂
  entryNodeId: node_entry
  priority: 40
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 远处传来一阵咳声，几个人下意识退开半步。赵三娘皱了皱眉，说怕病也怕被病名吓坏。
      replies:
        - id: reply_as_merchant
          text: 要是恐慌传开，买卖会先崩。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 恐慌会让人不听号令。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 退开不是办法，要分症状。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 买卖崩了，粮药也会断。你要是能说服人别乱传，等于保住半条路。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_21_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 对。怕到极处，人会把救他的人也当敌人。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_21_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 分得清，心就稳一半。你来说，他们比听我说更容易信。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_21_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 7
          - fact: time.segment
            equals: night
      - fact: facts.conversation_zhao_sanniang_daily_21_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_22
  npcId: npc_zhao_sanniang
  title: 缺口旧器
  entryNodeId: node_entry
  priority: 39
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 柜台下那副算盘边缘有一处旧缺口，像用久了也舍不得换。赵三娘说镇上许多东西都是这样，破了还得用。
      replies:
        - id: reply_as_merchant
          text: 旧器物能撑，旧规矩未必能撑。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 破口不补，迟早伤手。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 旧伤不看，也会反复疼。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 你们外来人看得快，本地人舍不得。舍不得有时是情分，有时是祸端。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_22_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 补也要看谁来补。手太重，器物没补好，先碎了。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_22_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 疼久了，人会把疼当成日常。镇子也是。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_22_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 8
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_zhao_sanniang_daily_22_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_23
  npcId: npc_zhao_sanniang
  title: 谎从何起
  entryNodeId: node_entry
  priority: 38
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 一句传闻被重复了三遍，每次都多一个细节。赵三娘说谎话不怕新，怕的是有人故意让它像真话。
      replies:
        - id: reply_as_merchant
          text: 假消息会害车队，我要辨源头。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 撒谎的人往往躲在后面。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 假病因会害死人。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 源头常常不在说得最大声的人那里，而在第一个问“你听说了吗”的人那里。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_23_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 躲在后面，也会留下目的。看谎话想把人赶向哪里。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_23_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 是。病因一错，药越勤，错得越深。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_23_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 8
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_zhao_sanniang_daily_23_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_24
  npcId: npc_zhao_sanniang
  title: 信字难写
  entryNodeId: node_entry
  priority: 37
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 赵三娘看了看周围，像是在衡量哪句话能放出来。赵三娘说现在不是没人开口，是没人敢担保谁可信。
      replies:
        - id: reply_as_merchant
          text: 信任也要有抵押，谁的抵押最实？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 我看行动，不看漂亮话。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 肯让人看病的人，至少还有求生心。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 抵押最实的是退路。没退路的人，说真话也可能变卦。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_24_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 行动要看连续几天，不看一时热血。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_24_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 求生心很真，可求生也会让人隐瞒。别全信，也别全疑。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_24_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 8
          - fact: time.segment
            equals: night
      - fact: facts.conversation_zhao_sanniang_daily_24_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_25
  npcId: npc_zhao_sanniang
  title: 镇外影近
  entryNodeId: node_entry
  priority: 36
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 有人提到镇外，周围立刻静了一瞬。赵三娘说镇外不是远方，是随时会推门进来的事。
      replies:
        - id: reply_as_merchant
          text: 外来的货和人，哪一个更可疑？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 外头的威胁已经进镇了吗？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 外来人有没有被妥善安置？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 货不会自己撒谎，人会。可货上留下的痕迹，比人嘴可靠。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_25_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 进来了。不是人人拿刀才叫威胁，有人带的是恐慌和口信。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_25_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 安置得不够。挤在一起，再小的病也会被放大。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_25_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 9
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_zhao_sanniang_daily_25_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_26
  npcId: npc_zhao_sanniang
  title: 午后人困
  entryNodeId: node_entry
  priority: 35
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 日头偏过去，赵三娘的动作慢了一点。赵三娘说人累的时候最容易答应不该答应的事。
      replies:
        - id: reply_as_merchant
          text: 疲惫会让人卖掉底线。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 疲惫会让守卫露空。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 疲惫会让病情恶化。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 底线不是一下卖掉的，是一点点让出去的。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_26_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 露空时最怕有人正等着。你要是能替人歇一刻，就能补一个缺口。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_26_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 你说得对。许多人不是病倒，是熬倒。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_26_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 9
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_zhao_sanniang_daily_26_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_27
  npcId: npc_zhao_sanniang
  title: 信未出门
  entryNodeId: node_entry
  priority: 34
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 柜台下那副算盘旁压着一张折好的纸，纸角已经起毛。赵三娘说有些信写好了，却不知道还能不能送到。
      replies:
        - id: reply_as_merchant
          text: 我能带信，但要知道收信人在哪条路上。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 要是送信有凶险，先说凶险来自谁。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 信要是关系病人家属，别再拖。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 能带当然好。可路上要是有人查，别把信和账本放在一起。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_27_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 凶险来自想知道别人说了什么的人。如今一句家常，也可能被当成证词。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_27_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 关系家属，也关系人心。人要是不知道亲人死活，会先在心里病起来。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_27_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 9
          - fact: time.segment
            equals: night
      - fact: facts.conversation_zhao_sanniang_daily_27_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_28
  npcId: npc_zhao_sanniang
  title: 童言破局
  entryNodeId: node_entry
  priority: 33
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 有个孩子在旁边问了一句大人都不敢问的话。赵三娘沉默片刻，说孩子常常比大人诚实。
      replies:
        - id: reply_as_merchant
          text: 孩子问的是米还是路？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 孩子问的是谁会护住他们？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 孩子问的是病会不会死？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 问的是明天还有没有饭。这个问题比任何账都难。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_28_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 问的是守门的人会不会也跑。你看，孩子知道害怕什么。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_28_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 问的是会不会传给娘亲。你要是听见了，就别用空话糊弄。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_28_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 10
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_zhao_sanniang_daily_28_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_29
  npcId: npc_zhao_sanniang
  title: 墙破风入
  entryNodeId: node_entry
  priority: 32
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 邻桌的墙根有一块新补的泥，颜色还没干透。赵三娘说墙会破，规矩也会破。
      replies:
        - id: reply_as_merchant
          text: 破口要是能走私货，就会有人利用。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 破墙也是防线缺口。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 破墙透风，病人受不了。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 利用的人一定有，不一定是大奸大恶，也可能只是饿急了。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_29_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 缺口要补，也要看谁常在附近徘徊。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_29_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 先挡风，再问责。人病着的时候，风比道理快。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_29_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 10
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_zhao_sanniang_daily_29_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_30
  npcId: npc_zhao_sanniang
  title: 价里争命
  entryNodeId: node_entry
  priority: 31
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 客人嘴里的粮价和路价的话头又被人翻出来，声音越来越尖。赵三娘说讨价还价本是日常，如今却像吵命。
      replies:
        - id: reply_as_merchant
          text: 价要稳，得先稳供给。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 吵到动手前会有什么征兆？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 买不起药和米的人会同时变多。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 供给是一头，信任是另一头。只补一头，价还会乱。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_30_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 征兆是没人再听完整句话，只听见自己吃亏。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_30_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 会。所以救病不能只靠药铺，也得靠米袋。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_30_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 10
          - fact: time.segment
            equals: night
      - fact: facts.conversation_zhao_sanniang_daily_30_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_31
  npcId: npc_zhao_sanniang
  title: 夜半足音
  entryNodeId: node_entry
  priority: 30
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 昨夜的脚步声还被人挂在嘴边，说法却不一样。赵三娘说半夜走路的人，不一定是贼，也可能是怕白天被看见。
      replies:
        - id: reply_as_merchant
          text: 夜里运货的人通常有不得已的理由。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 半夜脚步要查，但不可先惊动。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 夜里求药的人也会偷偷走。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 理由有真有假。看他们绕开什么，比看他们搬什么更有用。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_31_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 你说得对。先记路，再问人，别一嗓子把线头喊散了。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_31_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 求药的人怕欠账，也怕被人说染病。你要是拦，记得先问急不急。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_31_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 11
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_zhao_sanniang_daily_31_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_32
  npcId: npc_zhao_sanniang
  title: 旧日慢话
  entryNodeId: node_entry
  priority: 29
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 年轻时多嘴害人的一夜被提起时，赵三娘的神色软了一点。赵三娘说从前也不是没有难处，只是大家还肯慢慢说。
      replies:
        - id: reply_as_merchant
          text: 从前商路最安稳的时候靠什么？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 从前巡守和镇民怎么互相信？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 从前病人如何互相照应？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 靠熟人，也靠不把每一文钱都逼到尽头。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_32_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 靠说到做到。守门的人不乱拿，进门的人不乱闯。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_32_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 靠邻里。谁家熬药，隔壁会送水，不会先问报酬。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
