# YAML 兼容 JSON 格式，可直接由制作工具解析
- id: conversation_zhao_first_meet
  npcId: npc_zhao_sanniang
  title: 空碗迎客
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 1
      - fact: facts.conversation_zhao_first_meet_completed
        not_equals: true
  priority: 100
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 赵三娘把一只空酒碗推到你面前，碗沿缺了一小口。她眼皮也不抬，只说：进门是客，开口就有价。
      replies:
        - id: reply_as_merchant
          text: 价钱可以谈，消息得见真章。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 虚话别往刀口上送。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 热闹不问，只问会害人的消息。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 她笑了笑，像听见算盘珠落定。真消息贵，半真半假的便宜；你要哪一种？这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_first_meet_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 她指尖在碗沿一敲，声轻却硬。刀口吓不住酒肆，真有本事，就先学会小声问。余下的慢慢说，墙薄，风也会偷听。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_first_meet_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 她抬眼看你，目光像扫过药柜。会害人的消息多着呢，先问病，问粮，还是问山路上的死人？这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_first_meet_completed
              value: true
- id: conversation_zhao_bandit_info
  npcId: npc_zhao_sanniang
  title: 黑岭风声
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: player.state.money
            greater_than_or_equal: 15
      - fact: facts.conversation_zhao_bandit_info_completed
        not_equals: true
  priority: 99
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 她把后堂门掩了半扇，前堂笑声顿时像被刀背压低。黑岭盗不只在山里，镇里的咳嗽、算盘响，他们也听。
      replies:
        - id: reply_as_merchant
          text: 他们盯的是哪几路货队？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 内应常在哪些地方露面？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 他们劫药，是为救命，还是为逼人？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 他们盯带旧木箱的货队，也盯忽然改道的人。要是带货，账本别写得太干净；江湖上太干净的东西，反倒惹眼。这话先收，酒肆墙薄。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          effects:
            - type: add_fact
              key: player_bought_bandit_contact_clue
              value: true
            - type: change_variable
              key: truth_progress
              delta: 5
            - type: add_fact
              key: conversation_zhao_bandit_info_completed
              value: true
          endConversation: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 内应不爱站黑处，爱站有灯的地方。白日衣冠整齐的人，夜里也会替山里递口信。这话先收，酒肆墙薄。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          effects:
            - type: add_fact
              key: player_bought_bandit_contact_clue
              value: true
            - type: change_variable
              key: truth_progress
              delta: 5
            - type: add_fact
              key: conversation_zhao_bandit_info_completed
              value: true
          endConversation: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 两样都有。有人抢药救命，也有人握着药逼人低头。药香到了恶人手里，也能变成绳索。这话先收，酒肆墙薄。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          effects:
            - type: add_fact
              key: player_bought_bandit_contact_clue
              value: true
            - type: change_variable
              key: truth_progress
              delta: 5
            - type: add_fact
              key: conversation_zhao_bandit_info_completed
              value: true
          endConversation: true
- id: conversation_zhao_sell_bandit_info
  npcId: npc_zhao_sanniang
  title: 后堂旧痕
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: relationship.player.npc_zhao_sanniang.trust
            greater_than_or_equal: 30
      - fact: facts.conversation_zhao_sell_bandit_info_completed
        not_equals: true
  priority: 98
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 她擦碗的手停住，指腹按着那道缺口，像按住一段旧伤。她问你：后堂翻出的旧事，你护得住几个人？
      replies:
        - id: reply_as_merchant
          text: 旧事要是牵动商路，风险就不能含糊。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 当年真有人躲在这里？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 那人身上有伤吗？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 风险不在路上，在认得路的人嘴里。要是只想避损，就别往下问；问下去，账上写的就不只是银钱。这话先收，酒肆墙薄。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          effects:
            - type: add_fact
              key: zhao_sold_old_temple_clue
              value: true
            - type: change_variable
              key: truth_progress
              delta: 8
            - type: add_fact
              key: conversation_zhao_sell_bandit_info_completed
              value: true
          endConversation: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 你问得直，像刀背拍门。是，有人来过，衣摆带烟味，手里攥着不该在他手里的东西。这话先收，酒肆墙薄。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          effects:
            - type: add_fact
              key: zhao_sold_old_temple_clue
              value: true
            - type: change_variable
              key: truth_progress
              delta: 8
            - type: add_fact
              key: conversation_zhao_sell_bandit_info_completed
              value: true
          endConversation: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 伤是有的，烧伤，也像被人一路拖过。我那时不懂医，只懂闭嘴能活。这话先收，酒肆墙薄。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          effects:
            - type: add_fact
              key: zhao_sold_old_temple_clue
              value: true
            - type: change_variable
              key: truth_progress
              delta: 8
            - type: add_fact
              key: conversation_zhao_sell_bandit_info_completed
              value: true
          endConversation: true
- id: conversation_zhao_old_case
  npcId: npc_zhao_sanniang
  title: 旧案酒价
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: variables.truth_progress
            greater_than_or_equal: 15
      - fact: facts.conversation_zhao_old_case_completed
        not_equals: true
  priority: 97
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 她拨了两下算盘，清脆得像给旧案标价。旧庙那场火，镇里的老人都记得，只是不肯记得太清。
      replies:
        - id: reply_as_merchant
          text: 要多少价，才肯把记得的说全？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 他们怕的是谁？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 记不清的地方，常藏着病根。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 钱买得开头，买不到结尾。结尾要靠你让他们相信，说完还能活。余下的慢慢说，酒肆墙薄。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          effects:
            - type: add_fact
              key: old_case_rumor_heard
              value: true
            - type: change_variable
              key: truth_progress
              delta: 5
            - type: add_fact
              key: conversation_zhao_old_case_completed
              value: true
          endConversation: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 怕的人有坐上座的，也有端酒碗的。别小看胆小鬼，见过真相的人，往往最会低头。余下的慢慢说，酒肆墙薄。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          effects:
            - type: add_fact
              key: old_case_rumor_heard
              value: true
            - type: change_variable
              key: truth_progress
              delta: 5
            - type: add_fact
              key: conversation_zhao_old_case_completed
              value: true
          endConversation: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 你这说法我喜欢。病根在祠堂、镇门和旧庙之间，酒肆不过先闻见那股味。余下的慢慢说，酒肆墙薄。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          effects:
            - type: add_fact
              key: old_case_rumor_heard
              value: true
            - type: change_variable
              key: truth_progress
              delta: 5
            - type: add_fact
              key: conversation_zhao_old_case_completed
              value: true
          endConversation: true
- id: conversation_zhao_low_trust
  npcId: npc_zhao_sanniang
  title: 冷脸问话
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: relationship.player.npc_zhao_sanniang.suspicion
            greater_than_or_equal: 35
      - fact: facts.conversation_zhao_low_trust_completed
        not_equals: true
  priority: 96
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 她把酒碗收回去，脸上的笑像灯芯被掐灭。她问：你是来买话，还是来抢话？
      replies:
        - id: reply_as_merchant
          text: 不抢货，也不抢话；按规矩换。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 我不拿无辜人的命逼供。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 逼出来的话要是害死人，宁可不听。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 那还有得谈。规矩摆在这里：话可以卖，人不能卖。记住这条，门才还开着。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_low_trust_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 记住你这句话。酒肆每张桌子后头，都有一家老小要活，不是给人试胆的地方。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_low_trust_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 难得有人这么说。若真要听，我挑不伤人的说法；江湖路窄，话也得留活口。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_low_trust_completed
              value: true
- id: conversation_zhao_sanniang_daily_06
  npcId: npc_zhao_sanniang
  title: 晨砧碎语
  entryNodeId: node_entry
  priority: 55
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 这间老酒肆一早就不得安生，前堂骰子落碗的脆声。赵三娘一边擦着一只缺口酒碗，一边示意你有话便快些讲。
      replies:
        - id: reply_as_merchant
          text: 且先问今日的买卖和路上动静。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 且问这里最需要防的是什么。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 且先问有没有人身体不适。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 买卖看着是买卖，背后全是人心。今日最该留意的，是客人嘴里的粮价和路价。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_06_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 要防的不只刀，还有慌。说错一句话就会引火上身；谣言一旦成真，谁都别想安稳。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_06_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 有不适的人不少，只是许多人怕花钱，先忍着。你要是肯看，先从前堂那些压嗓子的客人看起。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_06_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 2
          - fact: time.segment
            equals: night
      - fact: facts.conversation_zhao_sanniang_daily_06_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_07
  npcId: npc_zhao_sanniang
  title: 潮风小疾
  entryNodeId: node_entry
  priority: 54
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 酒旗被风拍得啪啪响，连柜台下那副算盘都像沾了潮气。赵三娘说这种天气最容易把小患拖成大祸。
      replies:
        - id: reply_as_merchant
          text: 潮气会不会影响货物和储备？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 坏天气会让巡守和防备更难吗？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 受潮后最该防哪种病症？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 会。货坏了还能赔，消息、酒坛和后堂那扇门坏了，赔的就是人命和信任。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_07_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 难。风雨一遮，脚印、火光和人声都会骗人。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_07_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 先防寒热和咳症。别让前堂那些压嗓子的客人在风口等太久。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_07_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 3
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_zhao_sanniang_daily_07_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_08
  npcId: npc_zhao_sanniang
  title: 半碟咸豆
  entryNodeId: node_entry
  priority: 53
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 一碟咸豆和温酒摆在旁边，热气很快散了。赵三娘看了一眼饭食，说如今吃饭也像是做选择。
      replies:
        - id: reply_as_merchant
          text: 粮价这样下去，小户人家还能撑几天？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 饿急的人会先冲哪里？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 吃不饱会让病势更糟。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 撑几天要看米价，也看谁愿意先分一点出来。酒账同人情账比官样告示更管用。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_08_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 先冲看得见粮食的地方，再冲他们觉得没人护的地方。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_08_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 对。药能压病，饭才托命。没有一碟咸豆和温酒，药下去也虚。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_08_completed
              value: true
