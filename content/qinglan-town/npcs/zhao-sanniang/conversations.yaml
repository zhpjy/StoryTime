            greater_than_or_equal: 4
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_zhao_sanniang_daily_10_completed
        not_equals: true
- id: conversation_zhao_sanniang_daily_11
  npcId: npc_zhao_sanniang
  title: 山路来信
  entryNodeId: node_entry
  priority: 50
  nodes:
    - id: node_entry
      speaker: npc_zhao_sanniang
      text: 外头有人提到酒肆后巷，声音立刻低了下去。赵三娘说山路从来不只运货，也运消息。
      replies:
        - id: reply_as_merchant
          text: 哪种消息最影响货队？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 山路上现在最像陷阱的是哪里？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 山路会不会带来新的病根？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_zhao_sanniang
      text: 影响最大的不是匪，是不知道谁和匪有来往。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_merchant_close
          text: 这账我记下，情分和风险都要算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_11_completed
              value: true
    - id: node_warrior
      speaker: npc_zhao_sanniang
      text: 最像陷阱的是人人都说安全的那段。太安静了。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_warrior_close
          text: 明白，先稳人心，再稳去路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_11_completed
              value: true
    - id: node_doctor
      speaker: npc_zhao_sanniang
      text: 会。水、草药、货布，都可能把病带进镇。这话先咽回半截。酒肆墙薄，隔墙也有耳。
      replies:
        - id: reply_doctor_close
          text: 记下了，先救急症，再寻病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_zhao_sanniang_daily_11_completed
