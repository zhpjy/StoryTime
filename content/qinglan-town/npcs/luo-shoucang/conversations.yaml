- id: conversation_luo_shoucang_daily_30
  npcId: npc_luo_shoucang
  title: 市声争命
  entryNodeId: node_entry
  priority: 31
  nodes:
    - id: node_entry
      speaker: npc_luo_shoucang
      text: 集市上的粮价又被喊高，声调尖得像要割人。罗守仓道：讨价还价本是日常，如今倒像在吵命。
      replies:
        - id: reply_as_merchant
          text: 价要稳，得先稳供给，账才好落笔。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 吵到动手前会有什么征兆？，也好先防一步。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 买不起药和米的人会同时变多，救人不能迟。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_luo_shoucang
      text: 供给是一头，信任是另一头。只补一头，价还会乱。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_merchant_close
          text: 这笔账记下了；人情和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_30_completed
              value: true
    - id: node_warrior
      speaker: npc_luo_shoucang
      text: 征兆是没人再听完整句话，只听见自己吃亏。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心的乱，再护住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_30_completed
              value: true
    - id: node_doctor
      speaker: npc_luo_shoucang
      text: 会。所以救病不能只靠药铺，也得靠米袋。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
