            - type: add_fact
              key: conversation_luo_shoucang_daily_35_completed
              value: true
    - id: node_doctor
      speaker: npc_luo_shoucang
      text: 这就是救治的顺序。镇子也像一个病人。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
