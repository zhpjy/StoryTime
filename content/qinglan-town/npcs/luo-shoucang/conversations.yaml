        - id: reply_as_warrior
          text: 避谈的人可能知道凶险在哪，也好先防一步。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 避谈的人可能见过病根，救人不能迟。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_luo_shoucang
      text: 生意、名声、亲人，都可能让人闭嘴。你要分清是哪一种。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
