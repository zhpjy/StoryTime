        not_equals: true
- id: conversation_luo_shoucang_daily_32
  npcId: npc_luo_shoucang
  title: 旧日慢话
  entryNodeId: node_entry
  priority: 29
  nodes:
    - id: node_entry
      speaker: npc_luo_shoucang
      text: 提起年轻时见过饿疯的人群，他神色软了半分。罗守仓道：从前也难，只是大家还肯坐下慢慢说。
      replies:
