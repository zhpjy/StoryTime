  npcId: npc_luo_shoucang
  title: 老幼在前
  entryNodeId: node_entry
  priority: 46
  nodes:
    - id: node_entry
      speaker: npc_luo_shoucang
      text: 赊米的人群里，老人被扶着，孩子被牵着。罗守仓望了一会儿道：一个地方好不好，先压在这些人肩上。
      replies:
        - id: reply_as_merchant
          text: 物资要先给谁才不乱？，账才好落笔。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 护送时先护哪一类人？，也好先防一步。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 老人孩子要分开照看，救人不能迟。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_luo_shoucang
      text: 先给不能等的人，再给能维持秩序的人。别让分配看起来像偏心。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_merchant_close
          text: 这笔账记下了；人情和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_15_completed
              value: true
    - id: node_warrior
      speaker: npc_luo_shoucang
      text: 先护走不快的。能跑的人还有路，走不动的人只有别人。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心的乱，再护住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_15_completed
              value: true
    - id: node_doctor
      speaker: npc_luo_shoucang
      text: 对。小孩病急，老人病沉，混在一起只会互相拖。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢查。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_15_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 5
          - fact: time.segment
            equals: night
      - fact: facts.conversation_luo_shoucang_daily_15_completed
        not_equals: true
- id: conversation_luo_shoucang_daily_16
  npcId: npc_luo_shoucang
  title: 旧名如刺
  entryNodeId: node_entry
  priority: 45
  nodes:
    - id: node_entry
      speaker: npc_luo_shoucang
      text: 罗守仓提到一个旧名字，又像吞了半口冷茶般收住。那名字横在那里，像一根没人愿碰的刺。
      replies:
        - id: reply_as_merchant
          text: 名字若能对上旧账，就不该含糊，账才好落笔。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 名字若指向活人，我得知道凶险，也好先防一步。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 旧名字也可能是病根线头，救人不能迟。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_luo_shoucang
      text: 你要对账，就别只问名字，还要问他最后被谁看见。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_merchant_close
          text: 这笔账记下了；人情和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_16_completed
              value: true
    - id: node_warrior
      speaker: npc_luo_shoucang
      text: 凶险在问出口后。许多人怕的不是名字，是有人还记得。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心的乱，再护住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_16_completed
              value: true
    - id: node_doctor
      speaker: npc_luo_shoucang
      text: 有时一个名字比一味药难找，但找到后，方子才完整。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
