        not_equals: true
- id: conversation_luo_shoucang_daily_31
  npcId: npc_luo_shoucang
  title: 夜脚无声
  entryNodeId: node_entry
  priority: 30
  nodes:
    - id: node_entry
      speaker: npc_luo_shoucang
      text: 昨夜的脚步声还挂在众人口边，几个人说法各异。罗守仓道：半夜走路的未必是贼，也可能怕白天被看见。
      replies:
