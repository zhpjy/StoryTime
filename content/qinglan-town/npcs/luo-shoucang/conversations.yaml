            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 小忙若有风险，我先走前面，也好先防一步。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 小忙若关系病人，我现在就去，救人不能迟。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_luo_shoucang
      text: 送给排队买米的妇人，别让太多人看见。不是见不得光，是怕被传歪。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_merchant_close
          text: 这笔账记下了；人情和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_19_completed
              value: true
    - id: node_warrior
      speaker: npc_luo_shoucang
      text: 不用拔刀，帮我看住后路就行。有时候不让人挤上来，比冲出去更难。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心的乱，再护住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_19_completed
              value: true
    - id: node_doctor
      speaker: npc_luo_shoucang
      text: 关系不大，却能省一条腿脚。病人那边，少等一刻都是好事。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢查。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_19_completed
              value: true
  conditions:
