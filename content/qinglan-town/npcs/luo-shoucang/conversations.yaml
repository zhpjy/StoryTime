              key: conversation_luo_shoucang_daily_08_completed
              value: true
    - id: node_warrior
      speaker: npc_luo_shoucang
      text: 先冲看得见粮食的地方，再冲他们觉得没人护的地方。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
