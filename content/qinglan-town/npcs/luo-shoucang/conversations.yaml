          text: 夜里运货的人通常有不得已的理由，账才好落笔。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 半夜脚步要查，但不可先惊动，也好先防一步。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 夜里求药的人也会偷偷走，救人不能迟。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_luo_shoucang
      text: 理由有真有假。看他们绕开什么，比看他们搬什么更有用。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_merchant_close
          text: 这笔账记下了；人情和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_31_completed
              value: true
    - id: node_warrior
      speaker: npc_luo_shoucang
      text: 你说得对。先记路，再问人，别一嗓子把线头喊散了。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心的乱，再护住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_31_completed
              value: true
    - id: node_doctor
      speaker: npc_luo_shoucang
      text: 求药的人怕欠账，也怕被人说染病。你若拦，记得先问急不急。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢查。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_31_completed
              value: true
