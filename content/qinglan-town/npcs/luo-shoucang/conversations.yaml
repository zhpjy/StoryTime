        not_equals: true
- id: conversation_luo_shoucang_daily_21
  npcId: npc_luo_shoucang
  title: 一阵咳声
  entryNodeId: node_entry
  priority: 40
  nodes:
    - id: node_entry
      speaker: npc_luo_shoucang
      text: 远处一阵咳声响起，几个人下意识退了半步。罗守仓皱眉道：怕病可以，别先被病名吓散了魂。
      replies:
