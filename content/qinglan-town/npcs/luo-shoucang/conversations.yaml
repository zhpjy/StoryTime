            equals: night
      - fact: facts.conversation_luo_shoucang_daily_33_completed
        not_equals: true
- id: conversation_luo_shoucang_daily_34
  npcId: npc_luo_shoucang
  title: 谁先退步
  entryNodeId: node_entry
  priority: 27
  nodes:
    - id: node_entry
      speaker: npc_luo_shoucang
      text: 两拨人互不相让，像两把没出鞘的刀顶在一起。罗守仓叹道：谁都怕先退一步，便被吞得干净。
