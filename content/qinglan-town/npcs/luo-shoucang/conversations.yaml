          - fact: time.day
            greater_than_or_equal: 6
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_luo_shoucang_daily_16_completed
        not_equals: true
- id: conversation_luo_shoucang_daily_17
  npcId: npc_luo_shoucang
  title: 清水来路
  entryNodeId: node_entry
  priority: 44
  nodes:
    - id: node_entry
      speaker: npc_luo_shoucang
      text: 有人拎桶经过，水光在桶沿晃了一圈。罗守仓道：水看着清，来路未必清。
      replies:
        - id: reply_as_merchant
          text: 水源若出问题，铺面和货队都会停，账才好落笔。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 谁能靠近水源而不被盘问？，也好先防一步。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 水源须得查，病常从这里起，救人不能迟。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_luo_shoucang
      text: 一停就不是一家铺子的事。你若查水，先查谁最近改了取水点。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_merchant_close
          text: 这笔账记下了；人情和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_17_completed
              value: true
    - id: node_warrior
      speaker: npc_luo_shoucang
      text: 挑水人、送货人、巡夜人，都能靠近。最不起眼的最难查。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心的乱，再护住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_17_completed
              value: true
    - id: node_doctor
      speaker: npc_luo_shoucang
      text: 你说到要处了。病若沿水走，药铺再忙也只是追着尾巴跑。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢查。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_17_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 6
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_luo_shoucang_daily_17_completed
        not_equals: true
- id: conversation_luo_shoucang_daily_18
  npcId: npc_luo_shoucang
  title: 灯油将尽
  entryNodeId: node_entry
  priority: 43
  nodes:
    - id: node_entry
      speaker: npc_luo_shoucang
      text: 灯油快尽，火苗缩成豆大。罗守仓盯着那点光道：灯一暗，人就容易把心里的暗处当成路。
      replies:
        - id: reply_as_merchant
          text: 能调灯油，但要知道最缺哪里，账才好落笔。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 黑处最适合藏刀，也好先防一步。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 病人夜里也需要灯，救人不能迟。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_luo_shoucang
      text: 最缺的不是灯油，是愿意把灯点在别人门口的人。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_merchant_close
          text: 这笔账记下了；人情和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_18_completed
              value: true
    - id: node_warrior
      speaker: npc_luo_shoucang
      text: 藏刀也藏眼泪。夜里生变，天亮后人人都说没看见。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心的乱，再护住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_18_completed
              value: true
    - id: node_doctor
      speaker: npc_luo_shoucang
      text: 是。没灯，连药量都容易看错，更别说分辨脸色。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢查。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_18_completed
              value: true
  conditions:
