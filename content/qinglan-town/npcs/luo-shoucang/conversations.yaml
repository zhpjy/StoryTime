            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 有时要有人站中间，双方才退得下去，也好先防一步。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 病人面前不该争谁更委屈，救人不能迟。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_luo_shoucang
      text: 回报可以不是钱，是明日还愿意坐下来谈。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_merchant_close
          text: 这笔账记下了；人情和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_34_completed
              value: true
    - id: node_warrior
      speaker: npc_luo_shoucang
      text: 站中间的人最容易挨骂。可没人站，事就会往刀上走。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心的乱，再护住脚下的路。
          endConversation: true
