# YAML 兼容 JSON 格式，可直接由制作工具解析
- id: conversation_luo_first_meet
  npcId: npc_luo_shoucang
  title: 斗中白米
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 1
      - fact: facts.conversation_luo_first_meet_completed
        not_equals: true
  priority: 100
  nodes:
    - id: node_entry
      speaker: npc_luo_shoucang
      text: 罗守仓举起米斗，白米在斗里细细一响，像刀鞘里露了半寸寒光。他压低声音：早一刻买米，晚一刻买命，这世道已经差不多了。
      replies:
        - id: reply_as_merchant
          text: 粮价涨得太快，路上的价，到底占了几分？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 米铺真被冲了，你这些人守得住几步？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 病人要米汤，能否先留一批细米？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_luo_shoucang
      text: 路价三成，恐慌五成，剩下两成，是人心自己往上添的。我会拨算盘，却拨不开这乱世的手。
      replies:
        - id: reply_merchant_close
          text: 这笔账记下了；人情和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_first_meet_completed
              value: true
    - id: node_warrior
      speaker: npc_luo_shoucang
      text: 守不住。米袋比人命轻，可饿急的人不认这个理。我能锁门，却锁不住众人的眼。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心的乱，再护住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_first_meet_completed
              value: true
    - id: node_doctor
      speaker: npc_luo_shoucang
      text: 留得出。但你得替我挡住那些借病人名头倒米的人。救命米若成了生意，便比刀还冷。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢查。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_first_meet_completed
              value: true
- id: conversation_luo_deny_grain
  npcId: npc_luo_shoucang
  title: 门前饥声
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: facts.grain_shortage_rumor_happened
            equals: true
      - fact: facts.conversation_luo_deny_grain_completed
        not_equals: true
  priority: 99
  nodes:
    - id: node_entry
      speaker: npc_luo_shoucang
      text: 门外人影挤着门槛，他反手扣紧后仓的锁，脸色比米袋还沉。他道：别光盯着我一家仓，山路一断，谁家的底气都薄。
      replies:
        - id: reply_as_merchant
          text: 若能找来车队进粮，你肯按平价先放一批吗？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 传闻再烧下去，砸门只是早晚。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 饥饿会拖重病势，别只看仓底。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_luo_shoucang
      text: 你真能带粮进来，我就放一批；空话却别往柜上搁。米袋轻，担子重。
      replies:
        - id: reply_merchant_close
          text: 这笔账记下了；人情和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_deny_grain_completed
              value: true
    - id: node_warrior
      speaker: npc_luo_shoucang
      text: 我知道。所以夜里睡不踏实，钥匙压在枕下，翻身都怕硌醒自己。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心的乱，再护住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_deny_grain_completed
              value: true
    - id: node_doctor
      speaker: npc_luo_shoucang
      text: 我也看人。可仓一空，明日饿的人更多。你们看病讲缓急，我守仓也是。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢查。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_deny_grain_completed
              value: true
- id: conversation_luo_confess
  npcId: npc_luo_shoucang
  title: 仓钥吐实
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: facts.luo_hidden_grain_found
            equals: true
      - fact: facts.conversation_luo_confess_completed
        not_equals: true
  priority: 98
  nodes:
    - id: node_entry
      speaker: npc_luo_shoucang
      text: 他终于摊开掌心，后仓钥匙硌出一道红痕。他道：米是藏了，可我不是拿它看人饿死。
      replies:
        - id: reply_as_merchant
          text: 藏米未必是罪，借乱抬价才伤人命。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 你若不放粮，抢粮的人会先找这扇门。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 你给自己留后路，也该给病人留一口粥。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_luo_shoucang
      text: 你说得容易。粮一散，人情也散；到最后，谁都觉得自己被亏待。
      replies:
        - id: reply_merchant_close
          text: 这笔账记下了；人情和风险，一样不能糊涂。
          effects:
            - type: change_relationship
              source: player
              target: npc_luo_shoucang
              path: trust
              delta: 5
            - type: add_fact
              key: conversation_luo_confess_completed
              value: true
          endConversation: true
    - id: node_warrior
      speaker: npc_luo_shoucang
      text: 我怕的正是这个。不是怕你，是怕门外那些人，变成我记忆里那副模样。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心的乱，再护住脚下的路。
          effects:
            - type: change_relationship
              source: player
              target: npc_luo_shoucang
              path: trust
              delta: 5
            - type: add_fact
              key: conversation_luo_confess_completed
              value: true
          endConversation: true
    - id: node_doctor
      speaker: npc_luo_shoucang
      text: 细米我放。只是别让他们知道后仓还剩多少，否则药铺也压不住这股心火。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢查。
          effects:
            - type: change_relationship
              source: player
              target: npc_luo_shoucang
              path: trust
              delta: 5
            - type: add_fact
              key: conversation_luo_confess_completed
              value: true
          endConversation: true
- id: conversation_luo_ask_protection
  npcId: npc_luo_shoucang
  title: 闩门开仓
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: facts.luo_asked_protection
            equals: true
      - fact: facts.conversation_luo_ask_protection_completed
        not_equals: true
  priority: 97
  nodes:
    - id: node_entry
      speaker: npc_luo_shoucang
      text: 罗守仓把门闩推了又推，像推一桩压心多年的旧案。他道：米铺若能保住，我也不是铁石心肠。
      replies:
        - id: reply_as_merchant
          text: 我可替你立放粮账，别让好事变成抢仓。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 我守门，你按约开仓。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 先放给病户和抱孩子的人。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_luo_shoucang
      text: 账要写细：谁领、领多少、凭什么领。字若不清，刀就会替人说话。
      replies:
        - id: reply_merchant_close
          text: 这笔账记下了；人情和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_ask_protection_completed
              value: true
    - id: node_warrior
      speaker: npc_luo_shoucang
      text: 你守门，我开仓。若有人趁乱抢第二袋，也别怪我翻脸。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心的乱，再护住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_ask_protection_completed
              value: true
    - id: node_doctor
      speaker: npc_luo_shoucang
      text: 可以。病户先领，孩子其次，壮劳力明日来换工粮。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢查。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_ask_protection_completed
              value: true
- id: conversation_luo_release_grain
  npcId: npc_luo_shoucang
  title: 平价放粮
  entryNodeId: node_entry
  conditions:
    all:
      - any:
          - fact: facts.luo_is_hiding_grain
            equals: true
          - fact: facts.luo_hidden_grain_found
            equals: true
      - fact: facts.luo_released_grain
        not_equals: true
  priority: 99
  nodes:
    - id: node_entry
      speaker: npc_luo_shoucang
      text: 罗守仓守在柜台后，手指按着算盘不动。他看着门外排队的人，说粮一放，镇上未必记他的好，却一定记得他仓里还有粮。
      replies:
        - id: reply_release_by_account
          text: 分批平价卖，账目公开，别让人以为你趁乱施舍。
          nextNodeId: node_release_account
        - id: reply_release_by_guard
          text: 让巡守在门前维持队列，先保住米铺不乱。
          nextNodeId: node_release_guard
        - id: reply_release_by_sick
          text: 先给病户和流民棚留口粮，其他人按户登记。
          nextNodeId: node_release_sick
    - id: node_release_account
      speaker: npc_luo_shoucang
      text: 他拨了两下算盘，像是在给自己找一条退路。若账能写明，骂声至少不会全砸在门板上。
      replies:
        - id: reply_confirm_release_account
          text: 就按这法子办，粮价先压下来。
          nextNodeId: node_release_confirm
    - id: node_release_guard
      speaker: npc_luo_shoucang
      text: 他看向门口，终于松开柜台下的锁钥。有人维持队列，他才敢把后仓开一道缝。
      replies:
        - id: reply_confirm_release_guard
          text: 我去招呼巡守，你把米袋备好。
          nextNodeId: node_release_confirm
    - id: node_release_sick
      speaker: npc_luo_shoucang
      text: 他沉默片刻，低声说病户若先断粮，米铺迟早被怨气堵死。这个账，他认。
      replies:
        - id: reply_confirm_release_sick
          text: 先救最急的人，剩下的再细分。
          nextNodeId: node_release_confirm
    - id: node_release_confirm
      speaker: npc_luo_shoucang
      text: 后仓门闩响了一声。罗守仓把第一袋米推出来，脸色仍沉，但集市门前的火气终于低了几分。
      replies:
        - id: reply_confirm_luo_release_grain
          text: 这笔账以后再算，今日先让人有饭吃。
          effects:
            - type: add_fact
              key: shen_help_request_seen
              value: true
            - type: change_variable
              key: food_price
              delta: -20
            - type: change_variable
              key: refugee_pressure
              delta: -8
            - type: change_variable
              key: town_order
              delta: 4
            - type: change_relationship
              source: player
              target: npc_luo_shoucang
              path: trust
              delta: 8
            - type: add_fact
              key: luo_released_grain
              value: true
          endConversation: true
- id: conversation_luo_low_trust
  npcId: npc_luo_shoucang
  title: 算盘藏锋
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: relationship.player.npc_luo_shoucang.suspicion
            greater_than_or_equal: 35
      - fact: facts.conversation_luo_low_trust_completed
        not_equals: true
  priority: 96
  nodes:
    - id: node_entry
      speaker: npc_luo_shoucang
      text: 他一掌按住算盘，珠子不响，眼神却亮得像在验银。他道：别拿我的米铺，替谁换一块好名声。
      replies:
        - id: reply_as_merchant
          text: 名声若换不成活路，不过是街头一阵响。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 我不要虚名，只要少死人。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 我要的不是名声，是能熬粥的米。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_luo_shoucang
      text: 这话才像懂买卖。若真懂活路，就别逼我把仓底全亮在众人眼前。
      replies:
        - id: reply_merchant_close
          text: 这笔账记下了；人情和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_low_trust_completed
              value: true
    - id: node_warrior
      speaker: npc_luo_shoucang
      text: 少死人，也包括我铺里的伙计。你能护住他们，我才敢开这扇门。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心的乱，再护住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_low_trust_completed
              value: true
    - id: node_doctor
      speaker: npc_luo_shoucang
      text: 米可以给。你拿得走，也得管得住排队的人。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢查。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_low_trust_completed
              value: true
- id: conversation_luo_shoucang_daily_06
  npcId: npc_luo_shoucang
  title: 晨铺算盘
  entryNodeId: node_entry
  priority: 55
  nodes:
    - id: node_entry
      speaker: npc_luo_shoucang
      text: 米铺清早便起了响动，算盘珠子一串急雨。罗守仓把米面拨平，抬眼道：有话趁早，今日的米不等人。
      replies:
        - id: reply_as_merchant
          text: 先问今日的买卖和路上动静，账才好落笔。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 先问这里最需要防的是什么，也好先防一步。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 先问可有人身体不适，救人不能迟。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_luo_shoucang
      text: 买卖看着是买卖，背后全是人心。今日最该留意的，是集市上越喊越高的粮价。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_merchant_close
          text: 这笔账记下了；人情和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_06_completed
              value: true
    - id: node_warrior
      speaker: npc_luo_shoucang
      text: 要防的不只刀，还有慌。米铺被抢后的巷子一旦成真，谁都别想安稳。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心的乱，再护住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_06_completed
              value: true
    - id: node_doctor
      speaker: npc_luo_shoucang
      text: 有不适的人不少，只是许多人怕花钱，先忍着。你若肯看，先从等着赊半升米的街坊看起。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢查。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_06_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 2
          - fact: time.segment
            equals: night
      - fact: facts.conversation_luo_shoucang_daily_06_completed
        not_equals: true
- id: conversation_luo_shoucang_daily_07
  npcId: npc_luo_shoucang
  title: 潮脚入门
  entryNodeId: node_entry
  priority: 54
  nodes:
    - id: node_entry
      speaker: npc_luo_shoucang
      text: 湿脚印一路踩到门边，米袋最怕潮，人心也怕。罗守仓拭着米斗道：小病小患，拖久了都能成祸。
      replies:
        - id: reply_as_merchant
          text: 潮气会否影响货物和储备？，账才好落笔。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 坏天气会让巡守和防备更难吗？，也好先防一步。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 受潮后最该防哪类病症？，救人不能迟。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_luo_shoucang
      text: 会。货坏了还能赔，米粮和后仓钥匙坏了，赔的就是人命和信任。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_merchant_close
          text: 这笔账记下了；人情和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_07_completed
              value: true
    - id: node_warrior
      speaker: npc_luo_shoucang
      text: 难。风雨一遮，脚印、火光和人声都会骗人。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心的乱，再护住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
