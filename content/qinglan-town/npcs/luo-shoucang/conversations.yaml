            greater_than_or_equal: 12
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_luo_shoucang_daily_35_completed
        not_equals: true
- id: conversation_luo_shoucang_daily_36
  npcId: npc_luo_shoucang
  title: 避谈线头
  entryNodeId: node_entry
  priority: 25
  nodes:
    - id: node_entry
      speaker: npc_luo_shoucang
      text: 有人一听后仓暗藏的米，便忙不迭换话。罗守仓道：避得太急，自己就是线头。
      replies:
