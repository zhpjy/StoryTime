            greater_than_or_equal: 7
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_luo_shoucang_daily_19_completed
        not_equals: true
- id: conversation_luo_shoucang_daily_20
  npcId: npc_luo_shoucang
  title: 街坊脸色
  entryNodeId: node_entry
  priority: 41
  nodes:
    - id: node_entry
      speaker: npc_luo_shoucang
      text: 赊米的街坊从旁经过，人人脸上都藏着话。罗守仓道：近来看脸，比听话还准。
      replies:
