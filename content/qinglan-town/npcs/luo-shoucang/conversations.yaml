    - id: node_merchant
      speaker: npc_luo_shoucang
      text: 撑几天要看米价，也看谁愿意先分一点出来。赊粮账和进货账比官样告示更管用。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
