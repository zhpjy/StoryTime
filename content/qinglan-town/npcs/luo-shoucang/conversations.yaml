            greater_than_or_equal: 6
          - fact: time.segment
            equals: night
      - fact: facts.conversation_luo_shoucang_daily_18_completed
        not_equals: true
- id: conversation_luo_shoucang_daily_19
  npcId: npc_luo_shoucang
  title: 顺手小事
  entryNodeId: node_entry
  priority: 42
  nodes:
    - id: node_entry
      speaker: npc_luo_shoucang
      text: 他掸去算盘珠上的米糠，顺手把旁边东西摆正。罗守仓道：有个小忙，不显眼，却误不得。
      replies:
