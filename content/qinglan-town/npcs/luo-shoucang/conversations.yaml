        not_equals: true
- id: conversation_luo_shoucang_daily_33
  npcId: npc_luo_shoucang
  title: 粗碗热水
  entryNodeId: node_entry
  priority: 28
  nodes:
    - id: node_entry
      speaker: npc_luo_shoucang
      text: 热水倒进粗碗，白气一缕缕升起。罗守仓道：热水不值钱，可乱世里，连这点热气都难得。
      replies:
        - id: reply_as_merchant
          text: 热水和柴火也要纳入调度，账才好落笔。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 送水的人也要护住，也好先防一步。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 热水能救很多小病，救人不能迟。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_luo_shoucang
      text: 你若能调柴火，许多怨气会少一半。冷饭冷水最磨人。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_merchant_close
          text: 这笔账记下了；人情和风险，一样不能糊涂。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_33_completed
              value: true
    - id: node_warrior
      speaker: npc_luo_shoucang
      text: 是。别小看送水，夜里拎桶的人最容易被误伤。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_warrior_close
          text: 明白。先压住人心的乱，再护住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_luo_shoucang_daily_33_completed
              value: true
    - id: node_doctor
      speaker: npc_luo_shoucang
      text: 对。许多药不是没有方子，是没人有热水慢慢服。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
        - id: reply_doctor_close
          text: 记下了。急症先救，病根慢慢查。
          endConversation: true
