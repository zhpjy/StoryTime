            - type: add_fact
              key: conversation_luo_shoucang_daily_34_completed
              value: true
    - id: node_doctor
      speaker: npc_luo_shoucang
      text: 这话该让他们都听听。咳声不会等他们吵完。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
