            - type: add_fact
              key: conversation_luo_shoucang_daily_21_completed
              value: true
    - id: node_doctor
      speaker: npc_luo_shoucang
      text: 分得清，心就稳一半。你来说，他们比听我说更容易信。 江湖上账可写清，人心却常隔着一层米糠；我看得明白，未必拨得开。
      replies:
