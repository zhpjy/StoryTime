        not_equals: true
- id: conversation_xiao_wan_daily_43
  npcId: npc_xiao_wan
  title: 远方留话
  entryNodeId: node_entry
  priority: 18
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 小宛忽然问你，若能给远方的人留句话，你会写什么。 这个问题来得突兀，却不像玩笑。
      replies:
        - id: reply_as_merchant
