- id: conversation_xiao_wan_daily_41
  npcId: npc_xiao_wan
  title: 两道门
  entryNodeId: node_entry
  priority: 20
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 话题从镇门绕到祠堂，像绕不开两说门。 小宛说一说门管活人进出，一说门管旧事出入。
      replies:
        - id: reply_as_merchant
          text: 两说门都影响路。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 两说门都需要有人守。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 两说门都关系人心。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 路不只在地上，也在大家愿不愿意相信彼此。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_41_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 守门不只是挡人，也是不让怕事的人随手上锁。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_41_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 人心堵住，病也好得慢。你们医者最该懂。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
