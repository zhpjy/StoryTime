              key: conversation_xiao_wan_daily_36_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 见过病根的人最怕再闻到同样味说。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
