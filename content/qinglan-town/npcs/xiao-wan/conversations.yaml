          - fact: time.day
            greater_than_or_equal: 6
          - fact: time.segment
            equals: night
      - fact: facts.conversation_xiao_wan_daily_18_completed
        not_equals: true
- id: conversation_xiao_wan_daily_19
  npcId: npc_xiao_wan
  title: 小差事
  entryNodeId: node_entry
  priority: 42
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 把散开的布结重新系紧的空当，小宛顺路把旁边的东西摆正。 小宛问你愿不愿意帮一个不显眼的小忙。
      replies:
        - id: reply_as_merchant
          text: 小忙也要讲清要送到谁手里。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 小忙若有风险，我先走前面。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 小忙若关系病人，我现在就去。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 送给棚子里的流民婶子，别让太多人看见。不是见不得光，是怕被传歪。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_19_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 不用拔刀，帮我看住后路就行。有时候不让人挤上来，比冲出去更难。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_19_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 关系不大，却能省一条腿脚。病人那边，少等一刻都是好事。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_19_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 7
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_xiao_wan_daily_19_completed
        not_equals: true
- id: conversation_xiao_wan_daily_20
  npcId: npc_xiao_wan
  title: 街坊脸色
  entryNodeId: node_entry
  priority: 41
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 和她一起等粥的孩子从旁边经过，脸色各不相同。 小宛说最近看人脸，比听人话更准。
      replies:
        - id: reply_as_merchant
          text: 看脸色能看出谁要囤货？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 看脸色能看出谁要闹事？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 看脸色能看出谁在硬撑。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 能。眼睛总往半块饼和一处能睡的棚上飘的人，多半心里已经起了算盘。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_20_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 能。真正要闹的人常不喊，喊得最大声的反而等别人先动。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_20_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 能。硬撑的人最怕被叫住，你若温和些，他们才肯承认。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_20_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 7
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_xiao_wan_daily_20_completed
        not_equals: true
- id: conversation_xiao_wan_daily_21
  npcId: npc_xiao_wan
  title: 咳声惊人
  entryNodeId: node_entry
  priority: 40
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 远处传来一阵咳声，几个人下意识退开半步。 小宛皱了皱眉，说怕病也怕被病名吓坏。
      replies:
        - id: reply_as_merchant
          text: 若恐慌传开，买卖会先崩。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 恐慌会让人不听号令。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 退开不是办法，要分症状。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 买卖崩了，粮药也会断。你若能说服人别乱传，等于保住半条路。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_21_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 对。怕到极处，人会把救他的人也当敌人。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_21_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 分得清，心就稳一半。你来说，他们比听我说更容易信。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_21_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 7
          - fact: time.segment
            equals: night
      - fact: facts.conversation_xiao_wan_daily_21_completed
        not_equals: true
- id: conversation_xiao_wan_daily_22
  npcId: npc_xiao_wan
  title: 旧器有缺
  entryNodeId: node_entry
  priority: 39
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 一个旧布包边缘有一说旧缺口，像用久了也舍不得换。 小宛说镇上许多东西都是这样，破了还得用。
      replies:
        - id: reply_as_merchant
          text: 旧器物能撑，旧规矩未必能撑。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 破口不补，迟早伤手。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 旧伤不看，也会反复疼。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 你们外来人看得快，本地人舍不得。舍不得有时是情分，有时是祸端。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_22_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 补也要看谁来补。手太重，器物没补好，先碎了。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_22_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 疼久了，人会把疼当成日常。镇子也是。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_22_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 8
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_xiao_wan_daily_22_completed
        not_equals: true
- id: conversation_xiao_wan_daily_23
  npcId: npc_xiao_wan
  title: 谎从何起
  entryNodeId: node_entry
  priority: 38
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 一句传闻被重复了三遍，每次都多一个细节。 小宛说谎话不怕新，怕的是有人故意让它像真话。
      replies:
        - id: reply_as_merchant
          text: 假消息会害车队，我要辨源头。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 撒谎的人往往躲在后面。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 假病因会害死人。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 源头常常不在说得最大声的人那里，而在第一个问“你听说了吗”的人那里。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_23_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 躲在后面，也会留下目的。看谎话想把人赶向哪里。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_23_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 是。病因一错，药越勤，错得越深。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_23_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 8
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_xiao_wan_daily_23_completed
        not_equals: true
- id: conversation_xiao_wan_daily_24
  npcId: npc_xiao_wan
  title: 信谁一分
  entryNodeId: node_entry
  priority: 37
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 小宛看了看周围，像是在衡量哪句话能放出来。 小宛说现在不是没人说话，是没人敢担保谁可信。
      replies:
        - id: reply_as_merchant
          text: 信任也要有抵押，谁的抵押最实？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 在下看行动，不看漂亮话。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 肯让人看病的人，至少还有求生心。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 抵押最实的是退路。没退路的人，说真话也可能变卦。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_24_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 行动要看连续几天，不看一时热血。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
