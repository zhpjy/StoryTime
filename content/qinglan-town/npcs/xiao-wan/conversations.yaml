              key: conversation_xiao_wan_daily_36_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 知说凶险的人未必坏，有时只是活得太久，怕了。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
