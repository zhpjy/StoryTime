        not_equals: true
- id: conversation_xiao_wan_daily_36
  npcId: npc_xiao_wan
  title: 避谈即线
  entryNodeId: node_entry
  priority: 25
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 有人一听黑岭盗手上的旧庙纹样铜牌就换了话头，换得太快。 小宛说避得太急，本身就是线头。
