          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_37_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 看症状再开方，这说理若人人都懂，镇里少一半乱事。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
