        not_equals: true
- id: conversation_xiao_wan_daily_17
  npcId: npc_xiao_wan
  title: 清水暗流
  entryNodeId: node_entry
  priority: 44
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 有人拎着水桶经过，桶沿晃出一圈水光。 小宛说水看着清，不代表来路清。
      replies:
        - id: reply_as_merchant
          text: 水源若出问题，铺面和货队都会停。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 谁能靠近水源而不被盘问？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 水源须得查，病常从这里起。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 一停就不是一家铺子的事。你若查水，先查谁最近改了取水点。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_17_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 挑水人、送货人、巡夜人，都能靠近。最不起眼的最难查。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_17_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 你说到要处了。病若沿水走，药铺再忙也只是追着尾巴跑。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_17_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 6
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_xiao_wan_daily_17_completed
        not_equals: true
- id: conversation_xiao_wan_daily_18
  npcId: npc_xiao_wan
  title: 灯油将尽
  entryNodeId: node_entry
  priority: 43
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 一盏灯的油快见底，火苗缩成豆大一点。 小宛说灯一暗，人就容易做错事。
      replies:
        - id: reply_as_merchant
          text: 在下能调灯油，但要知说最缺哪里。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 黑处最适合藏刀。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 病人夜里也需要灯。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 最缺的不是灯油，是愿意把灯点在别人门口的人。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_18_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 藏刀也藏眼泪。夜里生变，天亮后人人都说没看见。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_18_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 是。没灯，连药量都容易看错，更别说分辨脸色。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_18_completed
              value: true
  conditions:
    all:
