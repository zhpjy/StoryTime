              key: conversation_xiao_wan_daily_45_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 弱点不是罪，装作没弱点才凶险。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_45_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 长上以后还会留疤。留疤不丢人，怕的是反复撕开。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_45_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 15
          - fact: time.segment
            equals: night
      - fact: facts.conversation_xiao_wan_daily_45_completed
        not_equals: true
- id: conversation_xiao_wan_daily_46
  npcId: npc_xiao_wan
  title: 旧火新烟
  entryNodeId: node_entry
  priority: 15
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 远处有人烧湿柴，烟味忽然重了起来。 小宛说烟味最会骗人，像旧火又像新火。
      replies:
        - id: reply_as_merchant
          text: 旧火若变成新烟，说明有人在翻旧账。
