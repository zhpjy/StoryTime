              key: conversation_xiao_wan_daily_16_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 有时一个名字比一味药难找，但找到后，方子才完整。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
