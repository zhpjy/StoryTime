            greater_than_or_equal: 9
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_xiao_wan_daily_26_completed
        not_equals: true
- id: conversation_xiao_wan_daily_27
  npcId: npc_xiao_wan
  title: 未寄之信
  entryNodeId: node_entry
  priority: 34
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 一个旧布包旁压着一张折好的纸，纸角已经起毛。 小宛说有些信写好了，却不知说还能不能送到。
      replies:
        - id: reply_as_merchant
          text: 在下能带信，但要知说收信人在哪条路上。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 若送信有凶险，先说凶险来自谁。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 信若关系病人家属，别再拖。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 能带当然好。可路上若有人查，别把信和账本放在一起。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_27_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 凶险来自想知说别人说了什么的人。如今一句家常，也可能被当成证词。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_27_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 关系家属，也关系人心。人若不知说亲人死活，会先在心里病起来。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_27_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 9
          - fact: time.segment
            equals: night
      - fact: facts.conversation_xiao_wan_daily_27_completed
        not_equals: true
- id: conversation_xiao_wan_daily_28
  npcId: npc_xiao_wan
  title: 孩子直问
  entryNodeId: node_entry
  priority: 33
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 有个孩子在旁边问了一句大人都不敢问的话。 小宛沉默片刻，说孩子常常比大人诚实。
      replies:
        - id: reply_as_merchant
          text: 孩子问的是米还是路？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 孩子问的是谁会护住他们？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 孩子问的是病会否死？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 问的是明天还有没有饭。这个问题比任何账都难。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_28_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 问的是守门的人会不会也跑。你看，孩子知说害怕什么。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_28_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 问的是会不会传给娘亲。你若听见了，就别用空话糊弄。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_28_completed
              value: true
  conditions:
    all:
