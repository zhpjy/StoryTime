          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_11_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 最像陷阱的是人人都说安全的那段。太安静了。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_11_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 会。水、草药、货布，都可能把病带进镇。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_11_completed
              value: true
  conditions:
