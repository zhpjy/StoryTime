          - fact: time.day
            greater_than_or_equal: 15
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_xiao_wan_daily_43_completed
        not_equals: true
- id: conversation_xiao_wan_daily_44
  npcId: npc_xiao_wan
  title: 怕字难认
  entryNodeId: node_entry
  priority: 17
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 小宛把话说得平稳，手却在一个旧布包旁停住。 小宛说镇里很多人怕，却不愿承认自己怕。
      replies:
        - id: reply_as_merchant
          text: 害怕会推高价钱。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 害怕会让人先下手。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 害怕会让人藏病。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 价钱只是表面。真正涨的是彼此的防备。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_44_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 先下手的人常说自己是自保。你要看他保的到底是什么。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_44_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 藏病最祸端。藏到后来，不止害自己。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
