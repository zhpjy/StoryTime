          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_09_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 会。人一怕，就要找个能看见的人出气。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_09_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 已经有了。有人把病说成报应，这比发热还难治。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_09_completed
              value: true
  conditions:
