# YAML 兼容 JSON 格式，可直接由制作工具解析
- id: conversation_xiao_wan_first_meet
  npcId: npc_xiao_wan
  title: 镇门寒影
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 1
      - fact: facts.conversation_xiao_wan_first_meet_completed
        not_equals: true
  priority: 100
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 小宛缩在门洞旁，布包被她抱得很紧。 她低声说自己不进镇，只在门边等人。
      replies:
        - id: reply_as_merchant
          text: 能给你买点吃的，也能帮你打听亲人。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 谁赶你，我可以去问清楚。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 你先让我看看可有受寒。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 吃的我会收下，可找人的话你别骗人。我爹说过，青岚镇有人认路。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_first_meet_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 你别吓他们。吓完他们，我晚上还是没地方睡。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_first_meet_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 我不发热，就是冷。你别把药给我一个人，棚里还有个小孩咳得厉害。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_first_meet_completed
              value: true
- id: conversation_xiao_wan_hungry
  npcId: npc_xiao_wan
  title: 热粥一碗
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: variables.food_price
            greater_than_or_equal: 120
      - fact: facts.conversation_xiao_wan_hungry_completed
        not_equals: true
  priority: 99
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 她盯着粥棚的锅，眼睛却不敢一直看。 她低声说自己可以跑腿，只要一点吃的。
      replies:
        - id: reply_as_merchant
          text: 我给你饭，不要你拿命跑凶险路。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 跑腿可以，但只能在镇里。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 先吃粥，再说跑腿。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 那我替你看摊也行吗？我会数铜钱，不会偷。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_hungry_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 镇里我认得一点路。镇外不去，那里有拿刀的人。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_hungry_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 我慢点吃。以前吃太急，肚子会疼。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_hungry_completed
              value: true
- id: conversation_xiao_wan_clue
  npcId: npc_xiao_wan
  title: 山路疑箱
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: relationship.player.npc_xiao_wan.trust
            greater_than_or_equal: 20
      - fact: facts.conversation_xiao_wan_clue_completed
        not_equals: true
  priority: 98
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 她左右看了看，声音低得几乎被风吹散。 她低声说自己见过一队人把箱子往破庙方向搬。
      replies:
        - id: reply_as_merchant
          text: 箱子像货箱，还是像藏东西的旧木箱？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 那些人有几把刀，走哪条岔路？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 箱子里可有药味或草叶味？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 旧木箱，角上包着黑皮，不像新货。我记得，因为他们骂我挡路。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          effects:
            - type: add_fact
              key: xiao_wan_bandit_clue
              value: true
            - type: add_item
              itemId: item_bandit_token
              count: 1
            - type: change_variable
              key: truth_progress
              delta: 5
            - type: add_fact
              key: conversation_xiao_wan_clue_completed
              value: true
          endConversation: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 四个人，两个有刀，一个手上有铜牌。他们走有枯树的那条。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          effects:
            - type: add_fact
              key: xiao_wan_bandit_clue
              value: true
            - type: add_item
              itemId: item_bandit_token
              count: 1
            - type: change_variable
              key: truth_progress
              delta: 5
            - type: add_fact
              key: conversation_xiao_wan_clue_completed
              value: true
          endConversation: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 有点苦味，像药，也像潮木头。那天我饿得厉害，不敢靠近。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          effects:
            - type: add_fact
              key: xiao_wan_bandit_clue
              value: true
            - type: add_item
              itemId: item_bandit_token
              count: 1
            - type: change_variable
              key: truth_progress
              delta: 5
            - type: add_fact
              key: conversation_xiao_wan_clue_completed
              value: true
          endConversation: true
- id: conversation_xiao_wan_low_trust
  npcId: npc_xiao_wan
  title: 好心与赶人
  entryNodeId: node_entry
  conditions:
    all:
      - all:
          - fact: relationship.player.npc_xiao_wan.suspicion
            greater_than_or_equal: 30
      - fact: facts.conversation_xiao_wan_low_trust_completed
        not_equals: true
  priority: 97
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 她把布包往身后藏，眼神里全是试探。 她低声说大人说帮忙的时候，常像是在赶人走。
      replies:
        - id: reply_as_merchant
          text: 不赶你。我可以写个名字，让粥棚认你。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 我说话粗，但不会把你丢回山里。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 我帮你，是因为你也该有地方睡。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 写名字有用吗？有名字的人，是不是就不会被赶走？ 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_low_trust_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 你别发火。有人发火的时候，我总想跑。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_low_trust_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 有地方睡就好。门洞夜里风太大，我怕布包里的东西也冻坏。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_low_trust_completed
              value: true
- id: conversation_xiao_wan_daily_05
  npcId: npc_xiao_wan
  title: 布包旧物
  entryNodeId: node_entry
  priority: 56
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 她摸了摸布包，像确认里面的东西还在。 她低声说那不是值钱东西，只是不能丢。
      replies:
        - id: reply_as_merchant
          text: 值不值钱不重要，能否帮你找人更重要。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 没人会抢你的包，我在这儿。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 若里面有药或吃的，别放坏了。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 里面有我娘的针线，还有我爹写的一个地名。我认字不多。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_05_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 你站远一点就行。你站太近，别人会以为我惹了事。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_05_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 没有药，只有一小包盐。我爹说饿的时候别一下吃完。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_05_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 2
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_xiao_wan_daily_05_completed
        not_equals: true
- id: conversation_xiao_wan_daily_06
  npcId: npc_xiao_wan
  title: 夜墙根的问候
  entryNodeId: node_entry
  priority: 55
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 镇门墙根一早就不得安生，肚子饿时咕噜噜响。 小宛一边把旧布包抱在怀里，一边示意你有话便快些讲。
      replies:
        - id: reply_as_merchant
          text: 且先问今日的买卖和路上动静。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 且问这里最需要防的是什么。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 且先问可有人身体不适。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 买卖看着是买卖，背后全是人心。今日最该留意的，是集市上闻得到却买不起的米香。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_06_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 要防的不只刀，还有慌。被赶回山路的夜晚一旦成真，谁都别想安稳。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_06_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 有不适的人不少，只是许多人怕花钱，先忍着。你若肯看，先从和她一起等粥的孩子看起。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_06_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 2
          - fact: time.segment
            equals: night
      - fact: facts.conversation_xiao_wan_daily_06_completed
        not_equals: true
- id: conversation_xiao_wan_daily_07
  npcId: npc_xiao_wan
  title: 风冷小患
  entryNodeId: node_entry
  priority: 54
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 风一吹，门洞里更冷，连一个旧布包都像沾了潮气。 小宛说这种天气最容易把小患拖成大祸。
      replies:
        - id: reply_as_merchant
          text: 潮气会否影响货物和储备？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 坏天气会让巡守和防备更难吗？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 受潮后最该防哪类病症？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 会。货坏了还能赔，半块饼和一处能睡的棚坏了，赔的就是人命和信任。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_07_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 难。风雨一遮，脚印、火光和人声都会骗人。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_07_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 先防寒热和咳症。别让和她一起等粥的孩子在风口等太久。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_07_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 3
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_xiao_wan_daily_07_completed
        not_equals: true
- id: conversation_xiao_wan_daily_08
  npcId: npc_xiao_wan
  title: 一饭之重
  entryNodeId: node_entry
  priority: 53
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 一碗热粥摆在旁边，热气很快散了。 小宛看了一眼饭食，说如今吃饭也像在做选择。
      replies:
        - id: reply_as_merchant
          text: 粮价这样下去，小户人家还能撑几天？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 饿急的人会先冲哪里？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 吃不饱会让病势更糟。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 撑几天要看米价，也看谁愿意先分一点出来。她记在心里的亲人名字比官样告示更管用。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_08_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 先冲看得见粮食的地方，再冲他们觉得没人护的地方。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_08_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 对。药能压病，饭才托命。没有一碗热粥，药下去也虚。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
