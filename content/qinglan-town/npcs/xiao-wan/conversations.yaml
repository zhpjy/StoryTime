              key: conversation_xiao_wan_daily_24_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 求生心很真，可求生也会让人隐瞒。别全信，也别全疑。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
