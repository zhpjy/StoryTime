            greater_than_or_equal: 3
          - fact: time.segment
            equals: night
      - fact: facts.conversation_xiao_wan_daily_09_completed
        not_equals: true
- id: conversation_xiao_wan_daily_10
  npcId: npc_xiao_wan
  title: 账簿人情
  entryNodeId: node_entry
  priority: 51
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 她记在心里的亲人名字被压在手边，纸页边缘已经卷起。 小宛说账本记得清，人情却总算不明白。
      replies:
        - id: reply_as_merchant
