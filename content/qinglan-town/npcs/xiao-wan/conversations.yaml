            - type: add_fact
              key: conversation_xiao_wan_daily_34_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 这话该让他们都听听。咳声不会等他们吵完。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
