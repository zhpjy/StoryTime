            greater_than_or_equal: 5
          - fact: time.segment
            equals: night
      - fact: facts.conversation_xiao_wan_daily_15_completed
        not_equals: true
- id: conversation_xiao_wan_daily_16
  npcId: npc_xiao_wan
  title: 旧名如刺
  entryNodeId: node_entry
  priority: 45
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 小宛提到一个旧名字，又很快把话收住。 那名字像一根刺，没人愿意碰得太深。
      replies:
        - id: reply_as_merchant
          text: 名字若能对上旧账，就不该含糊。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 名字若指向活人，我得知说凶险。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 旧名字也可能是病根线头。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 你要对账，就别只问名字，还要问他最后被谁看见。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_16_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 凶险在问出口后。许多人怕的不是名字，是有人还记得。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
