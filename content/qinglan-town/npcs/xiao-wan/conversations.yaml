  title: 药碗归谁
  entryNodeId: node_entry
  priority: 13
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 给咳嗽孩子留的一包药粉被端过去，路上有人下意识让了让。 小宛说一碗药端给谁，也会有人觉得不公平。
