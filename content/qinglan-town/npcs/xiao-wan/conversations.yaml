              key: conversation_xiao_wan_daily_35_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 人保住，门和物才有意义。别反过来。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_35_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 这就是救治的顺序。镇子也像一个病人。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
