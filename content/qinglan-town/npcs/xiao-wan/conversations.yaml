        not_equals: true
- id: conversation_xiao_wan_daily_25
  npcId: npc_xiao_wan
  title: 镇外影入
  entryNodeId: node_entry
  priority: 36
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 有人提到镇外，周围立刻静了一瞬。 小宛说镇外不是远方，是随时会推门进来的事。
      replies:
        - id: reply_as_merchant
          text: 外来的货和人，哪一个更可疑？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 外头的威胁已经进镇了吗？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 外来人可有被妥善安置？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 货不会自己说谎，人会。可货上留下的痕迹，比人嘴可靠。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_25_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 进来了。不是人人拿刀才叫威胁，有人带的是恐慌和口信。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_25_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 安置得不够。挤在一起，再小的病也会被放大。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_25_completed
              value: true
  conditions:
    all:
