        not_equals: true
- id: conversation_xiao_wan_daily_45
  npcId: npc_xiao_wan
  title: 补衣三线
  entryNodeId: node_entry
  priority: 16
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 有人袖口补了三种颜色的线，看上去有些狼狈。 小宛说日子破了，人就学会把不合适的布缝在一起。
      replies:
