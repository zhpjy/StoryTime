        not_equals: true
- id: conversation_xiao_wan_daily_34
  npcId: npc_xiao_wan
  title: 退一步难
  entryNodeId: node_entry
  priority: 27
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 小宛看着两拨人互不相让，叹了口气。 小宛说谁都觉得自己让一步就会被吞掉。
