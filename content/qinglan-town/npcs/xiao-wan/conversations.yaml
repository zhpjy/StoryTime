          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_12_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 拔刀的人未必最恨，最怕的人才会先动手。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_12_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 有牵连。至少给咳嗽孩子留的一包药粉和父亲说镇里有药铺和米铺都绕不开它。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_12_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 4
          - fact: time.segment
            equals: night
      - fact: facts.conversation_xiao_wan_daily_12_completed
        not_equals: true
- id: conversation_xiao_wan_daily_13
  npcId: npc_xiao_wan
  title: 告示纸薄
  entryNodeId: node_entry
  priority: 48
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 不远处有人念着新贴的告示，念到一半就笑不出来了。 小宛说告示写得齐整，日子却不照字走。
      replies:
