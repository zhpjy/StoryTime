        not_equals: true
- id: conversation_xiao_wan_daily_38
  npcId: npc_xiao_wan
  title: 旧物记事
  entryNodeId: node_entry
  priority: 23
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 一个旧布包被小宛拿起又放下，像一段话没说出口。 小宛说旧物留得久了，就会替人记事。
