            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 人情账若逼到头，会否变成仇？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 欠账的人会否因此拖着不求助？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 最怕不是欠得多，是欠得久。旧账一翻，谁都说自己有理。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_10_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 会。人情变仇，只差一句“你当年也欠我”。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_10_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 会。有人宁可忍病，也不愿再添一笔欠情。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_10_completed
              value: true
  conditions:
