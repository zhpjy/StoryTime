        not_equals: true
- id: conversation_xiao_wan_daily_09
  npcId: npc_xiao_wan
  title: 门前飞语
  entryNodeId: node_entry
  priority: 52
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 和她一起等粥的孩子在不远处压低声音，说到你来时又散开。 小宛说镇上闲话跑得比马还快。
      replies:
