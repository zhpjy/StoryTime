              key: conversation_xiao_wan_daily_34_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 站中间的人最容易挨骂。可没人站，事就会往刀上走。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
