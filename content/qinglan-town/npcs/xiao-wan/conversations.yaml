          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_42_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 压住不是吼住，是让双方都有台阶。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_42_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 慌会传，比病还快。你若能安一句，就是帮忙。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
