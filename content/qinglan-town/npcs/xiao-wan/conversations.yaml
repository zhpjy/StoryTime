            greater_than_or_equal: 4
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_xiao_wan_daily_10_completed
        not_equals: true
- id: conversation_xiao_wan_daily_11
  npcId: npc_xiao_wan
  title: 山路风声
  entryNodeId: node_entry
  priority: 50
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 外头有人提到她一路走来的山路，声音立刻低了下去。 小宛说山路从来不只运货，也运消息。
      replies:
