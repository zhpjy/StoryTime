            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 牵着命账，也牵着名声账。两种账都比银钱难讨。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
