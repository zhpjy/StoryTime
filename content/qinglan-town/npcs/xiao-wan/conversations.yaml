          text: 闲话会否引出冲突？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 闲话会让病人不敢就医。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 真货常藏在夸张里。你别听他们怎么骂，听他们反复提到什么。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
