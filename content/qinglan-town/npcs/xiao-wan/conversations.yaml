            greater_than_or_equal: 16
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_xiao_wan_daily_46_completed
        not_equals: true
- id: conversation_xiao_wan_daily_47
  npcId: npc_xiao_wan
  title: 作证押日
  entryNodeId: node_entry
  priority: 14
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 话说到证人时，空气像被按住。 小宛说作证不是说一句话，是把往后日子押上去。
      replies:
        - id: reply_as_merchant
