          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 避谈的人可能见过病根。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 生意、名声、亲人，都可能让人闭嘴。你要分清是哪一种。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
