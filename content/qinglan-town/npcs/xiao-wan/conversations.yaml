            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 告示可有安排病人和弱者？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 会影响一阵。可若半块饼和一处能睡的棚跟不上，纸上的价就只是纸。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_13_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 能让想守规矩的人有个台阶，拦不住已经急红眼的人。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_13_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 写了几句，远远不够。真正照顾人的，是谁肯把门打开。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_13_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 5
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_xiao_wan_daily_13_completed
        not_equals: true
- id: conversation_xiao_wan_daily_14
  npcId: npc_xiao_wan
  title: 夜声未歇
  entryNodeId: node_entry
  priority: 47
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 肚子饿时咕噜噜响之外，夜里还有几声说不清的动静。 小宛说最近没人睡得太沉。
      replies:
        - id: reply_as_merchant
