            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 夜里病人会否无人照应？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 有。不是每辆车都会报号，也不是每个脚印都往门里走。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_14_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 守她一路走来的山路，也守人心最松的后门。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_14_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 会。夜里一句“明早再说”，有时就等不到明早。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_14_completed
              value: true
  conditions:
    all:
