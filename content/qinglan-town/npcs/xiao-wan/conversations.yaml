- id: conversation_xiao_wan_daily_33
  npcId: npc_xiao_wan
  title: 热水不易
  entryNodeId: node_entry
  priority: 28
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 热水被倒进粗碗里，碗沿冒着白气。 小宛说热水不值钱，可乱起来时，连热水都难得。
      replies:
