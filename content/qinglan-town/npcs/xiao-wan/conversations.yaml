              key: conversation_xiao_wan_daily_39_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 对，能休息时不休息，下一波来时就只剩硬撑。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
