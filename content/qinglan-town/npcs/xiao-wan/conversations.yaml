            equals: noon
      - fact: facts.conversation_xiao_wan_daily_41_completed
        not_equals: true
- id: conversation_xiao_wan_daily_42
  npcId: npc_xiao_wan
  title: 小争将长
  entryNodeId: node_entry
  priority: 19
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 旁边起了一场小争执，很快又被人劝开。 小宛说小争执若没人管，就会学会长大。
      replies:
