          - fact: time.day
            greater_than_or_equal: 9
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_xiao_wan_daily_25_completed
        not_equals: true
- id: conversation_xiao_wan_daily_26
  npcId: npc_xiao_wan
  title: 午后人倦
  entryNodeId: node_entry
  priority: 35
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 日头偏过去，小宛的动作慢了一点。 小宛说人累的时候最容易答应不该答应的事。
      replies:
        - id: reply_as_merchant
          text: 疲惫会让人卖掉底线。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 疲惫会让守卫露空。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 疲惫会让病情恶化。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 底线不是一下卖掉的，是一点点让出去的。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_26_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 露空时最怕有人正等着。你若能替人歇一刻，就能补一个缺口。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_26_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 你说得对。许多人不是病倒，是熬倒。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_26_completed
              value: true
  conditions:
