          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_33_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 是。别小看送水，夜里拎桶的人最容易被误伤。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_33_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 对。许多药不是没有方子，是没人有热水慢慢服。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
