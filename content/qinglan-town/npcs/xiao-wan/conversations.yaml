            greater_than_or_equal: 4
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_xiao_wan_daily_11_completed
        not_equals: true
- id: conversation_xiao_wan_daily_12
  npcId: npc_xiao_wan
  title: 旧庙铜影
  entryNodeId: node_entry
  priority: 49
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 黑岭盗手上的旧庙纹样铜牌这个话头一出来，小宛的手慢了一拍。 小宛说旧庙的事，镇里不是没人知说，是没人愿意说全。
