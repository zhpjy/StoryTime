            greater_than_or_equal: 11
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_xiao_wan_daily_31_completed
        not_equals: true
- id: conversation_xiao_wan_daily_32
  npcId: npc_xiao_wan
  title: 旧日慢话
  entryNodeId: node_entry
  priority: 29
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 父亲说镇里有药铺和米铺被提起时，小宛的神色软了一点。 小宛说从前也不是没有难处，只是大家还肯慢慢说。
      replies:
        - id: reply_as_merchant
          text: 从前商路最安稳的时候靠什么？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 从前巡守和镇民怎么互相信？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 从前病人如何互相照应？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 靠熟人，也靠不把每一文钱都逼到尽头。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_32_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 靠说到做到。守门的人不乱拿，进门的人不乱闯。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_32_completed
              value: true
    - id: node_doctor
