          - fact: time.day
            greater_than_or_equal: 5
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_xiao_wan_daily_14_completed
        not_equals: true
- id: conversation_xiao_wan_daily_15
  npcId: npc_xiao_wan
  title: 老幼先安
  entryNodeId: node_entry
  priority: 46
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 和她一起等粥的孩子里，有人扶着老人，也有人牵着孩子。 小宛看着他们，说镇子的好坏先落在这些人身上。
      replies:
        - id: reply_as_merchant
          text: 物资要先给谁才不乱？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 护送时先护哪一类人？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 老人孩子要分开照看。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_xiao_wan
      text: 先给不能等的人，再给能维持秩序的人。别让分配看起来像偏心。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_merchant_close
          text: 好，我记下。这份人情和险处，都得算明白。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_15_completed
              value: true
    - id: node_warrior
      speaker: npc_xiao_wan
      text: 先护走不快的。能跑的人还有路，走不动的人只有别人。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_warrior_close
          text: 我明白。先稳住人心，再稳住脚下的路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_xiao_wan_daily_15_completed
              value: true
    - id: node_doctor
      speaker: npc_xiao_wan
      text: 对。小孩病急，老人病沉，混在一起只会互相拖。 这话小宛先记下。江湖路长，真假好坏，还得慢慢看。
      replies:
        - id: reply_doctor_close
          text: 我记下。先救眼前急症，再查背后病根。
