        not_equals: true
- id: conversation_xiao_wan_daily_35
  npcId: npc_xiao_wan
  title: 坏信先后
  entryNodeId: node_entry
  priority: 26
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 坏消息像排队一样，一个接一个进门。 小宛说最怕的不是坏消息，是大家不知说先处理哪个。
      replies:
