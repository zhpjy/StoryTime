        not_equals: true
- id: conversation_xiao_wan_daily_37
  npcId: npc_xiao_wan
  title: 伸手莫乱
  entryNodeId: node_entry
  priority: 24
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 小宛看着你，像是在判断你这次会伸手还是伸脚绊人。 小宛说帮忙二字，说起来容易，做歪了就是添乱。
