          - fact: time.day
            greater_than_or_equal: 10
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_xiao_wan_daily_28_completed
        not_equals: true
- id: conversation_xiao_wan_daily_29
  npcId: npc_xiao_wan
  title: 破墙新泥
  entryNodeId: node_entry
  priority: 32
  nodes:
    - id: node_entry
      speaker: npc_xiao_wan
      text: 不远处的墙根有一块新补的泥，颜色还没干透。 小宛说墙会破，规矩也会破。
      replies:
        - id: reply_as_merchant
          text: 破口若能走私货，就会有人利用。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
