            greater_than_or_equal: 11
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_qian_sao_daily_31_completed
        not_equals: true
- id: conversation_qian_sao_daily_32
  npcId: npc_qian_sao
  title: 伸手添乱
  entryNodeId: node_entry
  priority: 29
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 钱嫂看着你，像是在判断你这次会伸手还是伸脚绊人。 钱嫂低声说帮忙二字，说起来容易，做歪了就是添乱。
      replies:
        - id: reply_as_merchant
          text: 先问需要什么，再动资源。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 先听安排，再动手。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 先看症状，再开方。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 这样才像能做事的人。别把自己的好心摆在别人的急处前面。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_32_completed
              value: true
