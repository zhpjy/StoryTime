          - fact: time.day
            greater_than_or_equal: 9
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_qian_sao_daily_25_completed
        not_equals: true
- id: conversation_qian_sao_daily_26
  npcId: npc_qian_sao
  title: 半夜脚步
  entryNodeId: node_entry
  priority: 35
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 昨夜的脚步声还被人挂在嘴边，说法却不一样。 钱嫂低声说半夜走路的人，不一定是贼，也可能是怕白天被看见。
      replies:
        - id: reply_as_merchant
          text: 夜里运货的人通常有不得已的理由。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 半夜脚步要查，但不可先惊动。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 夜里求药的人也会偷偷走。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 理由有真有假。看他们绕开什么，比看他们搬什么更有用。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_26_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 你说得对。先记路，再问人，别一嗓子把线头喊散了。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_26_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 求药的人怕欠账，也怕被人说染病。你若拦，记得先问急不急。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_26_completed
              value: true
  conditions:
