        not_equals: true
- id: conversation_qian_sao_daily_41
  npcId: npc_qian_sao
  title: 旧火新烟
  entryNodeId: node_entry
  priority: 20
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 远处有人烧湿柴，烟味忽然重了起来。 钱嫂低声说烟味最会骗人，像旧火又像新火。
      replies:
        - id: reply_as_merchant
          text: 旧火若变成新烟，说明有人在翻旧账。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 烟能遮眼，也能暴露位置。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 烟会让咳症更重。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 有人翻旧账，也有人想让你以为是旧账自己烧起来。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_41_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 看风向。烟往哪边去，人多半也往哪边藏。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_41_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 先让咳得厉害的人避开。查案也要给活人让路。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_41_completed
              value: true
