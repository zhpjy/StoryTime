        not_equals: true
- id: conversation_qian_sao_daily_45
  npcId: npc_qian_sao
  title: 收摊暮色
  entryNodeId: node_entry
  priority: 16
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 天色往晚里沉，民居区粥棚的影子被拉长。 钱嫂低声说白天的话到了夜里，会换一副脸。
      replies:
        - id: reply_as_merchant
          text: 夜里最容易出现私下交易。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 夜里最容易出事。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 夜里最怕急症。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 私下交易不可怕，可怕的是交易内容和镇子的命绑在一起。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_45_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 生变前总有预兆，只是白天没人愿意承认。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_45_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 急症要提前备。人心也是，别等彻底乱了才找药。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
