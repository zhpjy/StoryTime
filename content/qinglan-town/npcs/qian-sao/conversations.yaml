        not_equals: true
- id: conversation_qian_sao_daily_19
  npcId: npc_qian_sao
  title: 信字难写
  entryNodeId: node_entry
  priority: 42
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 钱嫂看了看周围，像是在衡量哪句话能放出来。 钱嫂低声说现在不是没人敢开口，是没人敢担保谁可信。
      replies:
        - id: reply_as_merchant
          text: 信任也要有抵押，谁的抵押最实？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 看行动，不看漂亮话。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 肯让人看病的人，至少还有求生心。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 抵押最实的是退路。没退路的人，说真话也可能变卦。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_19_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 行动要看连续几天，不看一时热血。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_19_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 求生心很真，可求生也会让人隐瞒。别全信，也别全疑。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
          endConversation: true
          effects:
