          - fact: time.segment
            equals: noon
      - fact: facts.conversation_qian_sao_daily_20_completed
        not_equals: true
- id: conversation_qian_sao_daily_21
  npcId: npc_qian_sao
  title: 午后力尽
  entryNodeId: node_entry
  priority: 40
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 日头偏过去，钱嫂的动作慢了一点。 钱嫂低声说人累的时候最容易答应不该答应的事。
      replies:
