            greater_than_or_equal: 15
          - fact: time.segment
            equals: night
      - fact: facts.conversation_qian_sao_daily_45_completed
        not_equals: true
- id: conversation_qian_sao_daily_46
  npcId: npc_qian_sao
  title: 笑声似哭
  entryNodeId: node_entry
  priority: 15
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 有人笑了一声，笑完自己也觉得不合时宜。 钱嫂低声说人太紧时，笑也像哭。
      replies:
        - id: reply_as_merchant
          text: 紧绷的人很容易做错买卖。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 紧绷的人也容易误伤。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 紧绷久了会垮。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 错买卖还能补，错把人当敌人就难补。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_46_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 所以动手前要多看一眼。那一眼能救命。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_46_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 垮之前常有征兆，手抖、睡不着、听不得响。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
          endConversation: true
          effects:
            - type: add_fact
