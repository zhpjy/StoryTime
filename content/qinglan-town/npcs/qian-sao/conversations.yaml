          - fact: time.day
            greater_than_or_equal: 3
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_qian_sao_daily_08_completed
        not_equals: true
- id: conversation_qian_sao_daily_09
  npcId: npc_qian_sao
  title: 夜半异响
  entryNodeId: node_entry
  priority: 52
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 粥锅边沿噗噗冒泡之外，夜里还有几声道不清的动静。 钱嫂低声说最近没人睡得太沉。
      replies:
        - id: reply_as_merchant
          text: 夜里可有异常车马或陌生人？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 夜里哪个方向最该有人守？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 夜里病人会否无人照应？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 有。不是每辆车都会报来路，也不是每个脚印都往门里走。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_09_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 守民居区通往镇门的小巷，也守人心最松的后门。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_09_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 会。夜里一句“明早再说”，有时就等不到明早。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_09_completed
              value: true
  conditions:
