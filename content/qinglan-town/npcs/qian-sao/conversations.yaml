          - fact: time.day
            greater_than_or_equal: 10
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_qian_sao_daily_28_completed
        not_equals: true
- id: conversation_qian_sao_daily_29
  npcId: npc_qian_sao
  title: 让步之难
  entryNodeId: node_entry
  priority: 32
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 钱嫂看着两拨人互不相让，叹了口气。 钱嫂低声说谁都觉得自己让一步就会被吞掉。
      replies:
        - id: reply_as_merchant
          text: 让步要换确定的回报，不可空让。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 有时要有人站中间，双方才退得下去。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 病人面前不该争谁更委屈。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 回报可以不是钱，是明日还愿意坐下来谈。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_29_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 站中间的人最容易挨骂。可没人站，事就会往刀上走。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_29_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 这话该让他们都听听。咳声不会等他们吵完。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_29_completed
              value: true
  conditions:
