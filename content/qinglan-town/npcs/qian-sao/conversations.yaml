          - fact: time.segment
            equals: morning
      - fact: facts.conversation_qian_sao_daily_22_completed
        not_equals: true
- id: conversation_qian_sao_daily_23
  npcId: npc_qian_sao
  title: 孩子真问
  entryNodeId: node_entry
  priority: 38
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 有个孩子在旁边问了一句大人都不敢问的话。 钱嫂沉默片刻，说孩子常常比大人诚实。
      replies:
