        not_equals: true
- id: conversation_qian_sao_daily_27
  npcId: npc_qian_sao
  title: 荒年旧情
  entryNodeId: node_entry
  priority: 34
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 上一次荒年挨家借米的日子被提起时，钱嫂的神色软了一点。 钱嫂低声说从前也不是没有难处，只是大家还肯慢慢说。
      replies:
        - id: reply_as_merchant
          text: 从前商路最安稳的时候靠什么？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 从前巡守和镇民怎么互相信？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 从前病人如何互相照应？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 靠熟人，也靠不把每一文钱都逼到尽头。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_27_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 靠说到做到。守门的人不乱拿，进门的人不乱闯。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_27_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 靠邻里。谁家熬药，隔壁会送水，不会先问报酬。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_27_completed
              value: true
  conditions:
    all:
