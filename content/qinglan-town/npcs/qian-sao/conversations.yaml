          - fact: time.day
            greater_than_or_equal: 10
          - fact: time.segment
            equals: night
      - fact: facts.conversation_qian_sao_daily_30_completed
        not_equals: true
- id: conversation_qian_sao_daily_31
  npcId: npc_qian_sao
  title: 避话之人
  entryNodeId: node_entry
  priority: 30
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 有人一听谁家夜里偷偷送粮给山里人就换了话头，换得太快。 钱嫂低声说避得太急，本身就是线头。
      replies:
        - id: reply_as_merchant
          text: 避谈的人可能怕旧账影响生意。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 避谈的人可能知道凶险在哪。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 避谈的人可能见过病根。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 生意、名声、亲人，都可能让人闭嘴。你要分清是哪一种。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_31_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 知道凶险的人未必坏，有时只是活得太久，怕了。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_31_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 见过病根的人最怕再闻到同样味道。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
