        - id: reply_as_doctor
          text: 外来人可有被妥善安置？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 货不会自己说谎，人会。可货上留下的痕迹，比人嘴可靠。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
