          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_20_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 进来了。不是人人拿刀才叫威胁，有人带的是恐慌和口信。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_20_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 安置得不够。挤在一起，再小的病也会被放大。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
