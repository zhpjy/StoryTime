            greater_than_or_equal: 7
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_qian_sao_daily_19_completed
        not_equals: true
- id: conversation_qian_sao_daily_20
  npcId: npc_qian_sao
  title: 镇外影近
  entryNodeId: node_entry
  priority: 41
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 有人提到镇外，周围立刻静了一瞬。 钱嫂低声说镇外不是远方，是随时会推门进来的事。
      replies:
