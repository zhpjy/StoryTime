            greater_than_or_equal: 15
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_qian_sao_daily_43_completed
        not_equals: true
- id: conversation_qian_sao_daily_44
  npcId: npc_qian_sao
  title: 风里人名
  entryNodeId: node_entry
  priority: 17
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 风声里夹着几个名字，听不真切。 钱嫂低声说名字一旦被风带走，就会变成别人嘴里的刀。
      replies:
