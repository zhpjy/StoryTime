- id: conversation_qian_sao_daily_18
  npcId: npc_qian_sao
  title: 谎话来处
  entryNodeId: node_entry
  priority: 43
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 一句传闻被重复了三遍，每次都多一个细节。 钱嫂低声说谎话不怕新，怕的是有人故意让它像真话。
      replies:
