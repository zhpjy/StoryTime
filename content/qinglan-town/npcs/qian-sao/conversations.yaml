              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 露空时最怕有人正等着。你若能替人歇一刻，就能补一个缺口。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_21_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 你说得对。许多人不是病倒，是熬倒。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
