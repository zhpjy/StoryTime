    - id: node_merchant
      speaker: npc_qian_sao
      text: 利用的人一定有，不一定是大奸大恶，也可能只是饿急了。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
