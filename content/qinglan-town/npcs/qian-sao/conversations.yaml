        not_equals: true
- id: conversation_qian_sao_daily_43
  npcId: npc_qian_sao
  title: 药碗归谁
  entryNodeId: node_entry
  priority: 18
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 给孩子兑药的热水被端过去，路上有人下意识让了让。 钱嫂低声说一碗药端给谁，也会有人觉得不公平。
      replies:
        - id: reply_as_merchant
          text: 分配标准要提前说清。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 不公平会引出冲突。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 轻重缓急须得由病情决定。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 标准说清，怨气少一半。剩下一半，靠人慢慢劝。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_43_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 冲突常从一句“凭什么他先”开始。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_43_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 病情决定，这是底线。若让关系决定，药就变味了。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
