          - fact: time.day
            greater_than_or_equal: 9
          - fact: time.segment
            equals: night
      - fact: facts.conversation_qian_sao_daily_27_completed
        not_equals: true
- id: conversation_qian_sao_daily_28
  npcId: npc_qian_sao
  title: 热水一碗
  entryNodeId: node_entry
  priority: 33
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 热水被倒进粗碗里，碗沿冒着白气。 钱嫂低声说热水不值钱，可乱起来时，连热水都难得。
      replies:
        - id: reply_as_merchant
          text: 热水和柴火也要纳入调度。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 送水的人也要护住。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 热水能救很多小病。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 你若能调柴火，许多怨气会少一半。冷饭冷水最磨人。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_28_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 是。别小看送水，夜里拎桶的人最容易被误伤。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_28_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 对。许多药不是没有方子，是没人有热水慢慢服。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
