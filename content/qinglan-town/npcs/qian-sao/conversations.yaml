      - all:
          - fact: time.day
            greater_than_or_equal: 3
          - fact: time.segment
            equals: night
      - fact: facts.conversation_qian_sao_daily_09_completed
        not_equals: true
- id: conversation_qian_sao_daily_10
  npcId: npc_qian_sao
  title: 老幼在前
  entryNodeId: node_entry
  priority: 51
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 排队等粥的邻里里，有人扶着老人，也有人牵着孩子。 钱嫂看着他们，说镇子的好坏先落在这些人身上。
      replies:
        - id: reply_as_merchant
          text: 物资要先给谁才不乱？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 护送时先护哪一类人？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 老人孩子要分开照看。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 先给不能等的人，再给能维持秩序的人。别让分配看起来像偏心。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_10_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 先护走不快的。能跑的人还有路，走不动的人只有别人。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_10_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 对。小孩病急，老人病沉，混在一起只会互相拖。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_10_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 4
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_qian_sao_daily_10_completed
        not_equals: true
- id: conversation_qian_sao_daily_11
  npcId: npc_qian_sao
  title: 旧名如刺
  entryNodeId: node_entry
  priority: 50
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 钱嫂提到一个旧名字，又很快把话收住。 那名字像一根刺，没人愿意碰得太深。
      replies:
        - id: reply_as_merchant
          text: 名字若能对上旧账，就不该含糊。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 名字若指向活人，我得知道凶险。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 旧名字也可能是病根线头。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 你要对账，就别只问名字，还要问他最后被谁看见。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_11_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 凶险在问出口后。许多人怕的不是名字，是有人还记得。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_11_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 有时一个名字比一味药难找，但找到后，方子才完整。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_11_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 4
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_qian_sao_daily_11_completed
        not_equals: true
- id: conversation_qian_sao_daily_12
  npcId: npc_qian_sao
  title: 水桶清浊
  entryNodeId: node_entry
  priority: 49
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 有人拎着水桶经过，桶沿晃出一圈水光。 钱嫂低声说水看着清，不代表来路清。
      replies:
        - id: reply_as_merchant
          text: 水源若出问题，铺面和货队都会停。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 谁能靠近水源而不被盘问？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 水源须得查，病常从这里起。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 一停就不是一家铺子的事。你若查水，先查谁最近改了取水点。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_12_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 挑水人、送货人、巡夜人，都能靠近。最不起眼的最难查。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_12_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 你说到要处了。病若沿水走，药铺再忙也只是追着尾巴跑。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_12_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 4
          - fact: time.segment
            equals: night
      - fact: facts.conversation_qian_sao_daily_12_completed
        not_equals: true
- id: conversation_qian_sao_daily_13
  npcId: npc_qian_sao
  title: 灯油将尽
  entryNodeId: node_entry
  priority: 48
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 一盏灯的油快见底，火苗缩成豆大一点。 钱嫂低声说灯一暗，人就容易做错事。
      replies:
        - id: reply_as_merchant
          text: 能调灯油，但要知道最缺哪里。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 黑处最适合藏刀。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 病人夜里也需要灯。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 最缺的不是灯油，是愿意把灯点在别人门口的人。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_13_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 藏刀也藏眼泪。夜里生变，天亮后人人都说没看见。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_13_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 是。没灯，连药量都容易看错，更别说分辨脸色。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_13_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 5
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_qian_sao_daily_13_completed
        not_equals: true
- id: conversation_qian_sao_daily_14
  npcId: npc_qian_sao
  title: 顺手小事
  entryNodeId: node_entry
  priority: 47
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 把柴火往灶膛里推的空当，钱嫂顺路把旁边的东西摆正。 钱嫂问你愿不愿意帮一个不显眼的小忙。
      replies:
        - id: reply_as_merchant
          text: 小忙也要讲清要送到谁手里。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 小忙若有风险，我先走前面。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 小忙若关系病人，我现在就去。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 送给隔壁咳嗽的王婶，别让太多人看见。不是见不得光，是怕被传歪。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_14_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 不用拔刀，帮我看住后路就行。有时候不让人挤上来，比冲出去更难。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_14_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 关系不大，却能省一条腿脚。病人那边，少等一刻都是好事。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_14_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 5
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_qian_sao_daily_14_completed
        not_equals: true
- id: conversation_qian_sao_daily_15
  npcId: npc_qian_sao
  title: 看脸识心
  entryNodeId: node_entry
  priority: 46
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 排队等粥的邻里从旁边经过，脸色各不相同。 钱嫂低声说最近看人脸，比听人话更准。
      replies:
        - id: reply_as_merchant
          text: 看脸色能看出谁要囤货？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 看脸色能看出谁要闹事？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 看脸色能看出谁在硬撑。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 能。眼睛总往粥米、柴火和热水上飘的人，多半心里已经起了算盘。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_15_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 能。真正要闹的人常不喊，喊得最大声的反而等别人先动。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_15_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 能。硬撑的人最怕被叫住，你若温和些，他们才肯承认。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_15_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 5
          - fact: time.segment
            equals: night
      - fact: facts.conversation_qian_sao_daily_15_completed
        not_equals: true
- id: conversation_qian_sao_daily_16
  npcId: npc_qian_sao
  title: 咳声惊巷
  entryNodeId: node_entry
  priority: 45
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 远处传来一阵咳声，几个人下意识退开半步。 钱嫂皱了皱眉，说怕病也怕被病名吓坏。
      replies:
        - id: reply_as_merchant
          text: 若恐慌传开，买卖会先崩。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 恐慌会让人不听号令。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 退开不是办法，要分症状。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 买卖崩了，粮药也会断。你若能说服人别乱传，等于保住半条路。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_16_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 对。怕到极处，人会把救他的人也当敌人。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
