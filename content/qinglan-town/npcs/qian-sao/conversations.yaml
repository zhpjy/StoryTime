              key: conversation_qian_sao_daily_40_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 长上以后还会留疤。留疤不丢人，怕的是反复撕开。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
