            greater_than_or_equal: 16
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_qian_sao_daily_47_completed
        not_equals: true
- id: conversation_qian_sao_daily_48
  npcId: npc_qian_sao
  title: 钥匙轻响
  entryNodeId: node_entry
  priority: 13
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 钥匙声轻轻一响，周围几个人都抬了抬眼。 钱嫂低声说现在每把钥匙都像能打开祸端。
      replies:
        - id: reply_as_merchant
          text: 钥匙管的是货，也是信任。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 钥匙该在可靠的人手里。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 锁住的若是药和病案，就要慎重。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 信任比锁贵。锁坏了能换，信任坏了难补。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_48_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 可靠不是不害怕，是害怕也不乱开门。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_48_completed
