            equals: noon
      - fact: facts.conversation_qian_sao_daily_41_completed
        not_equals: true
- id: conversation_qian_sao_daily_42
  npcId: npc_qian_sao
  title: 作证押身
  entryNodeId: node_entry
  priority: 19
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 话说到证人时，空气像被按住。 钱嫂低声说作证不是说一句话，是把往后日子押上去。
      replies:
        - id: reply_as_merchant
          text: 证词要能互相印证，不可只靠胆子。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 作证的人需要护住。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 作证的人也会怕，也会病。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 印证越多，单个人背的压力越小。这是正经办法。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_42_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 护住不是站在他旁边亮刀，也包括让他家里有饭。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_42_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 是。吓坏的人说不清话，先让他能睡一觉。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
