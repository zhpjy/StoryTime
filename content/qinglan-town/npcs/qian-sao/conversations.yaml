          - fact: time.segment
            equals: night
      - fact: facts.conversation_qian_sao_daily_21_completed
        not_equals: true
- id: conversation_qian_sao_daily_22
  npcId: npc_qian_sao
  title: 未送之信
  entryNodeId: node_entry
  priority: 39
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 一把木勺旁压着一张折好的纸，纸角已经起毛。 钱嫂低声说有些信写好了，却不知道还能不能送到。
      replies:
