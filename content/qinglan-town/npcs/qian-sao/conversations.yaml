          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_18_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 躲在后面，也会留下目的。看谎话想把人赶向哪里。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_18_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 是。病因一错，药越勤，错得越深。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
