          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_22_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 凶险来自想知道别人说了什么的人。如今一句家常，也可能被当成证词。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_22_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 关系家属，也关系人心。人若不知亲人死活，会先在心里病起来。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
