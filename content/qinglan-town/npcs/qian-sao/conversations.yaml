- id: conversation_qian_sao_daily_25
  npcId: npc_qian_sao
  title: 米价如刀
  entryNodeId: node_entry
  priority: 36
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 米铺门口排队的人越来越长的话头又被人翻出来，声音越来越尖。 钱嫂低声说讨价还价本是日常，如今却像吵命。
      replies:
        - id: reply_as_merchant
          text: 价要稳，得先稳供给。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 吵到动手前会有什么征兆？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 买不起药和米的人会同时变多。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 供给是一头，信任是另一头。只补一头，价还会乱。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_25_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 征兆是没人再听完整句话，只听见自己吃亏。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_25_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 会。所以救病不能只靠药铺，也得靠米袋。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_25_completed
              value: true
  conditions:
