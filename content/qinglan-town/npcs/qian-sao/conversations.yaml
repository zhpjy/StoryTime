- id: conversation_qian_sao_daily_17
  npcId: npc_qian_sao
  title: 木勺旧缺
  entryNodeId: node_entry
  priority: 44
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 一把木勺边缘有一道旧缺口，像用久了也舍不得换。 钱嫂低声说镇上许多东西都是这样，破了还得用。
      replies:
        - id: reply_as_merchant
          text: 旧器物能撑，旧规矩未必能撑。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 破口不补，迟早伤手。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 旧伤不看，也会反复疼。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 你们外来人看得快，本地人舍不得。舍不得有时是情分，有时是祸端。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_17_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 补也要看谁来补。手太重，器物没补好，先碎了。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_17_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 疼久了，人会把疼当成日常。镇子也是。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
