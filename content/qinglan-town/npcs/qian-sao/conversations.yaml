            greater_than_or_equal: 16
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_qian_sao_daily_46_completed
        not_equals: true
- id: conversation_qian_sao_daily_47
  npcId: npc_qian_sao
  title: 明日未必等
  entryNodeId: node_entry
  priority: 14
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 钱嫂把没做完的事往旁边挪了挪。 钱嫂低声说有些事只能留给明天，但明天未必肯等。
      replies:
        - id: reply_as_merchant
          text: 明天要先保哪条线？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 明天要先防哪里？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 明天要先看谁？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 先保民居区通往镇门的小巷，再保粥米、柴火和热水。这两样一断，别的全是空话。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_47_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 先防看似安静的地方。乱处人人盯着，静处才容易漏。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_47_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 先看撑了一夜的人。能撑一夜，不代表还能撑一天。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
          endConversation: true
          effects:
