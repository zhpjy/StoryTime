        - id: reply_as_doctor
          text: 疲惫会让病情恶化。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 底线不是一下卖掉的，是一点点让出去的。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
