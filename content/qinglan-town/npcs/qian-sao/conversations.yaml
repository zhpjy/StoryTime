          - fact: time.day
            greater_than_or_equal: 10
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_qian_sao_daily_29_completed
        not_equals: true
- id: conversation_qian_sao_daily_30
  npcId: npc_qian_sao
  title: 坏信先后
  entryNodeId: node_entry
  priority: 31
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 坏消息像排队一样，一个接一个进门。 钱嫂低声说最怕的不是坏消息，是大家不知道先处理哪个。
      replies:
        - id: reply_as_merchant
          text: 先保路、粮、药三个节点。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 先保人，再保门，再保物。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 先救急症，再控传染，再安人心。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 你的顺序能听。路断则粮药断，粮药断则人心断。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_30_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 人保住，门和物才有意义。别反过来。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_30_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 这就是救治的顺序。镇子也像一个病人。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_30_completed
              value: true
