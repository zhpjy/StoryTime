# YAML 兼容 JSON 格式，可直接由制作工具解析
- id: conversation_qian_sao_daily_01
  npcId: npc_qian_sao
  title: 晨锅起烟
  entryNodeId: node_entry
  priority: 60
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 民居区粥棚一早就不得安生，粥锅边沿噗噗冒泡。 钱嫂一边搅着一锅薄粥，一边示意你有话便快些讲。
      replies:
        - id: reply_as_merchant
          text: 且先问今日的买卖和路上动静。
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 且问这里最需要防的是什么。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 且先问可有人身体不适。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 买卖看着是买卖，背后全是人心。今日最该留意的，是米铺门口排队的人越来越长。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_01_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 要防的不只刀，还有慌。流民棚夜里被赶的风险一旦成真，谁都别想安稳。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_01_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 有不适的人不少，只是许多人怕花钱，先忍着。你若肯看，先从排队等粥的邻里看起。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_01_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 1
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_qian_sao_daily_01_completed
        not_equals: true
- id: conversation_qian_sao_daily_02
  npcId: npc_qian_sao
  title: 湿风入灶
  entryNodeId: node_entry
  priority: 59
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 灶烟被湿风压得散不开，连一把木勺都像沾了潮气。 钱嫂低声说这种天气最容易把小患拖成大祸。
      replies:
        - id: reply_as_merchant
          text: 潮气会否影响货物和储备？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 坏天气会让巡守和防备更难吗？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 受潮后最该防哪类病症？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 会。货坏了还能赔，粥米、柴火和热水坏了，赔的就是人命和信任。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_02_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 难。风雨一遮，脚印、火光和人声都会骗人。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_02_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 先防寒热和咳症。别让排队等粥的邻里在风口等太久。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_02_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 1
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_qian_sao_daily_02_completed
        not_equals: true
- id: conversation_qian_sao_daily_03
  npcId: npc_qian_sao
  title: 一碗薄粥
  entryNodeId: node_entry
  priority: 58
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 稀粥和咸菜根摆在旁边，热气很快散了。 钱嫂看了一眼饭食，说如今吃饭也像在做选择。
      replies:
        - id: reply_as_merchant
          text: 粮价这样下去，小户人家还能撑几天？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 饿急的人会先冲哪里？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 吃不饱会让病势更糟。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 撑几天要看米价，也看谁愿意先分一点出来。她心里记的赊米人情比官样告示更管用。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_03_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 先冲看得见粮食的地方，再冲他们觉得没人护的地方。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_03_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 对。药能压病，饭才托命。没有稀粥和咸菜根，药下去也虚。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_03_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 1
          - fact: time.segment
            equals: night
      - fact: facts.conversation_qian_sao_daily_03_completed
        not_equals: true
- id: conversation_qian_sao_daily_04
  npcId: npc_qian_sao
  title: 门前风声
  entryNodeId: node_entry
  priority: 57
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 排队等粥的邻里在不远处压低声音，说到你来时又散开。 钱嫂低声说镇上闲话跑得比马还快。
      replies:
        - id: reply_as_merchant
          text: 闲话里可有能当线头的真货？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 闲话会否引出冲突？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 闲话会让病人不敢就医。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 真货常藏在夸张里。你别听他们怎么骂，听他们反复提到什么。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_04_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 会。人一怕，就要找个能看见的人出气。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_04_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 已经有了。有人把病说成报应，这比发热还难治。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_04_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 2
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_qian_sao_daily_04_completed
        not_equals: true
- id: conversation_qian_sao_daily_05
  npcId: npc_qian_sao
  title: 旧账人情
  entryNodeId: node_entry
  priority: 56
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 她心里记的赊米人情被压在手边，纸页边缘已经卷起。 钱嫂低声说账本记得清，人情却总算不明白。
      replies:
        - id: reply_as_merchant
          text: 账清才不会乱，你最怕哪笔账爆出来？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 人情账若逼到头，会否变成仇？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 欠账的人会否因此拖着不求助？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 最怕不是欠得多，是欠得久。旧账一翻，谁都说自己有理。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_05_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 会。人情变仇，只差一句“你当年也欠我”。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_05_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 会。有人宁可忍病，也不愿再添一笔欠情。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_05_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 2
          - fact: time.segment
            equals: noon
      - fact: facts.conversation_qian_sao_daily_05_completed
        not_equals: true
- id: conversation_qian_sao_daily_06
  npcId: npc_qian_sao
  title: 山路暗信
  entryNodeId: node_entry
  priority: 55
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 外头有人提到民居区通往镇门的小巷，声音立刻低了下去。 钱嫂低声说山路从来不只运货，也运消息。
      replies:
        - id: reply_as_merchant
          text: 哪类消息最影响货队？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 山路上现在最像陷阱的是哪里？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 山路会否带来新的病根？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 影响最大的不是匪，是不知道谁和匪有来往。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_06_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 最像陷阱的是人人都说安全的那段。太安静了。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_06_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 会。水、草药、货布，都可能把病带进镇。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_06_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 2
          - fact: time.segment
            equals: night
      - fact: facts.conversation_qian_sao_daily_06_completed
        not_equals: true
- id: conversation_qian_sao_daily_07
  npcId: npc_qian_sao
  title: 旧庙夜话
  entryNodeId: node_entry
  priority: 54
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 谁家夜里偷偷送粮给山里人这个话头一出来，钱嫂的手慢了一拍。 钱嫂低声说旧庙的事，镇里不是没人知道，是没人愿意说全。
      replies:
        - id: reply_as_merchant
          text: 旧庙牵着哪条旧账？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 谁会为了旧庙动刀？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 旧庙和病、药可有牵连？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 牵着命账，也牵着名声账。两种账都比银钱难讨。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_07_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 拔刀的人未必最恨，最怕的人才会先动手。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_07_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 有牵连。至少给孩子兑药的热水和上一次荒年挨家借米的日子都绕不开它。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_07_completed
              value: true
  conditions:
    all:
      - all:
          - fact: time.day
            greater_than_or_equal: 3
          - fact: time.segment
            equals: morning
      - fact: facts.conversation_qian_sao_daily_07_completed
        not_equals: true
- id: conversation_qian_sao_daily_08
  npcId: npc_qian_sao
  title: 纸上告示
  entryNodeId: node_entry
  priority: 53
  nodes:
    - id: node_entry
      speaker: npc_qian_sao
      text: 不远处有人念着新贴的告示，念到一半就笑不出来了。 钱嫂低声说告示写得齐整，日子却不照字走。
      replies:
        - id: reply_as_merchant
          text: 告示会影响交易和价格吗？
          conditions:
            fact: player.identity
            equals: identity_merchant
          nextNodeId: node_merchant
        - id: reply_as_warrior
          text: 告示能让人守规矩吗？
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 告示可有安排病人和弱者？
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 会影响一阵。可若粥米、柴火和热水跟不上，纸上的价就只是纸。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_08_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 能让想守规矩的人有个台阶，拦不住已经急红眼的人。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_warrior_close
          text: 明白。先稳人心，再稳脚下这条路。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_08_completed
              value: true
    - id: node_doctor
      speaker: npc_qian_sao
      text: 写了几句，远远不够。真正照顾人的，是谁肯把门打开。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_doctor_close
          text: 记下了。先救眼前急，再寻背后根。
          endConversation: true
          effects:
