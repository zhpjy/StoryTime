          text: 没核实的名字不可当靶子。
          conditions:
            fact: player.identity
            equals: identity_warrior
          nextNodeId: node_warrior
        - id: reply_as_doctor
          text: 没核实的名字不可当病因。
          conditions:
            fact: player.identity
            equals: identity_doctor
          nextNodeId: node_doctor
    - id: node_merchant
      speaker: npc_qian_sao
      text: 对。写错一个名字，后面整本账都歪。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
        - id: reply_merchant_close
          text: 记下了，人情要还，风险也要看清。
          endConversation: true
          effects:
            - type: add_fact
              key: conversation_qian_sao_daily_44_completed
              value: true
    - id: node_warrior
      speaker: npc_qian_sao
      text: 当靶子容易，收回箭难。 灶边的话不响，真到风雨拍门时，靠的偏是这些细小线索。
      replies:
