  "editorBackground": "青岚镇是一个依赖山路、药材和小宗商贸维持生计的封闭小镇，故事发生在连续三十天的危机窗口内。地理范围包括镇门、集市、回春药铺、望山酒肆、祠堂、民居区、青岚山林和破驿旧庙；这些地点彼此距离不远，但信息、资源和信任并不自由流动。镇中秩序由镇长、巡守、祠堂旧规、商户利益和普通镇民的人情网络共同维持，外部流民、盗匪、商路中断、粮价波动、疫病传闻和旧庙火案会持续冲击这套秩序。玩家身份可以偏向行商、武人或医者，但所有身份都必须受体力、金钱、声望、行动点、地点可达性和 NPC 信任约束，不能用单一能力直接解决所有问题。内容设计应围绕有限资源下的取舍：救治病患可能挤占调查时间，平抑粮价可能触动商户利益，追查旧案可能削弱镇内权威，压制匪患也可能推高恐慌。本内容包以现实人情、地方权力和危机决策为主，不设公开法术体系；可保留民俗、祭祀、传闻和对未知病源的误解，但不得让超自然力量直接替代人物动机、调查证据和因果后果。叙事基调克制、古风、低玄幻、重因果，允许灰色交易、隐瞒、误判、迟来的补救和局部代价，禁止无条件必死分支、无因果反转、万能援军和脱离小镇资源边界的解决方案。新增事件、会话和结局应给玩家留下可观察征兆、可追溯线索和至少一种提前干预路径，但不要在编辑背景中直接公开隐藏真相或最终幕后关系。",
