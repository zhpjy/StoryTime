name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Build and deploy this branch, tag, or commit SHA
        required: false
        default: main
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build content packs
        run: pnpm build:content-pack

      - name: Build game client
        env:
          TSS_PAGES_BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm --filter @tss/game-client build

      - name: Build story lab
        env:
          TSS_PAGES_BASE_PATH: /${{ github.event.repository.name }}/story-lab/
        run: pnpm --filter @tss/story-lab build

      - name: Assemble Pages artifact
        run: |
          mkdir -p .github/pages/story-lab
          cp -R apps/game-client/dist/. .github/pages/
          cp -R apps/story-lab/dist/. .github/pages/story-lab/
          touch .github/pages/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .github/pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
