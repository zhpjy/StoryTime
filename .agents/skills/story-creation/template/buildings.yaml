# 建筑列表。建筑是地点内更细的交互对象，可承载行动和独立状态。

- # id: 建筑唯一 ID，建议以 building_ 开头。
  id: "building_start_notice"
  # locationId: 所属地点 ID，应存在于 locations.yaml。
  locationId: "loc_start"
  # name: 建筑或交互对象显示名称。
  name: "公告栏"
  # type: 建筑分类，项目不限制枚举，建议使用英文语义标签。
  type: "notice_board"
  # state: 建筑运行时状态，可被 change_building_state 修改。
  state:
    status: "normal"
    locked: false
  # descriptions: 建筑描述；default 为兜底，也可加入 morning/noon/night 等键。
  descriptions:
    default: "公告栏上贴着能引出主线危机的消息。"
  # actionIds: 与该建筑直接相关的行动 ID，应存在于 actions.yaml。
  actionIds:
    - "action_gather_opening_news"
