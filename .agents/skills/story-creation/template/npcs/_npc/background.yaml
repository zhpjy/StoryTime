# 单个 NPC 的背景故事。此文件主要供内容生成、审核和角色一致性使用。

# role: 可选，说明该 NPC 在整个剧本中的功能定位。
role: "主线早期引导者，负责把玩家带入核心冲突。"

# publicStory: 公开经历。玩家或多数 NPC 容易知道的信息。
publicStory: "此人长期生活在故事地点，熟悉本地秩序和近期异常。"

# privateStory: 私下经历。需要建立关系或完成调查后才适合揭示。
privateStory: "此人知道一些公开说法之外的细节，但担心说出后牵连他人。"

# hiddenStory: 隐藏真相。通常关联秘密、关键事件或结局因果链。
hiddenStory: "此人与核心秘密存在间接联系，能在关键节点提供决定性线索。"

# designNote: 可选，给作者和审核者看的设计备注，不直接展示给玩家。
designNote: "不要让此 NPC 一次性说出全部真相，应分阶段揭示。"
